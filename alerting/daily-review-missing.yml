# daily-review-missing.yml — Alert when daily review doesn't fire by 6:30am
# Card #1807 | AC4
#
# The daily review summary runs at ~6:05am Eastern via LaunchAgent.
# If daily.review.completed is absent from chorus.log by 6:30am, something failed silently.
#
# Implementation: cron check at 6:30am scans today's chorus.log for the event.
# If missing, posts a red alert to Bridge.

name: daily-review-missing
description: Daily review did not complete by 6:30am Eastern
severity: warning
schedule: "30 6 * * *"  # 6:30am daily

check: |
  # Only check after 6:30am Eastern — before that, the review hasn't had time to run
  HOUR=$(TZ=America/New_York date '+%-H')
  MINUTE=$(TZ=America/New_York date '+%-M')
  if [ "$HOUR" -lt 6 ] || { [ "$HOUR" -eq 6 ] && [ "$MINUTE" -lt 30 ]; }; then
    echo "ok"
    exit 0
  fi
  # Look for ops.review.completed in today's chorus log
  TODAY=$(TZ=America/New_York date '+%Y-%m-%d')
  LOG="$HOME/Library/Logs/Chorus/chorus.log"
  if grep "ops.review.completed" "$LOG" 2>/dev/null | grep -q "$TODAY"; then
    echo "ok"
    exit 0
  fi
  echo "missing"
  exit 1

action: |
  # Cooldown: only fire once per day
  COOLDOWN_FILE="/tmp/alert-daily-review-$(TZ=America/New_York date '+%Y-%m-%d')"
  if [ -f "$COOLDOWN_FILE" ]; then
    exit 0
  fi
  touch "$COOLDOWN_FILE"
  # Post alert to Bridge — use printf for real newlines
  BRIDGE="http://localhost:3470/api/message"
  TIMESTAMP=$(TZ=America/New_York date '+%Y-%m-%d %H:%M')
  MSG=$(printf '🔴 **Alert** — %s\n\nDaily review did not fire by 6:30am. Check LaunchAgents and logs.' "$TIMESTAMP")
  curl -sf -X POST "$BRIDGE" \
    -H 'Content-Type: application/json' \
    -d "$(jq -n --arg text "$MSG" --arg from "silas" '{from: $from, text: $text}')" \
    &>/dev/null || true
