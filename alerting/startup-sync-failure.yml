# startup-sync-failure.yml — Alert when app startup SMS sync fails
# Card #2000
#
# Every app restart triggers SMS seed sync. It has failed on every
# boot today (2026-04-03) due to triple-quote escape bug in stored seeds.
# This is logged as "non-fatal" but masks real data loss.

name: startup-sync-failure
description: App startup SMS sync failed — stored seeds not loading
severity: warning
schedule: "*/5 * * * *"  # every 5 minutes

check: |
  NOW=$(date +%s)
  START=$(( NOW - 300 ))
  RESULT=$(curl -sf --max-time 5 -G "http://localhost:3102/loki/api/v1/query_range" \
    --data-urlencode 'query={job=~"gathering.*"} |~ "Startup SMS sync failed"' \
    --data-urlencode "start=${START}000000000" \
    --data-urlencode "end=${NOW}000000000" \
    --data-urlencode "limit=1" 2>/dev/null)
  COUNT=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum(len(r.get('values',[])) for r in d.get('data',{}).get('result',[])))" 2>/dev/null || echo "0")
  if [[ "$COUNT" == "0" ]]; then
    echo "ok"
    exit 0
  fi
  echo "failed:$COUNT"
  exit 1

action: |
  # Nudge Silas — alerts go to roles, not the Clearing
  NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/nudge"
  "$NUDGE" silas "startup-sync: FAILED — stored seeds not loading after app restart" --force 2>/dev/null || true
