# tunnel-down.yml — Alert when Cloudflare tunnel to lightlifeurbangardens.com is down
# Card #2016 | Silas
#
# The tunnel is the public entry point for SMS seeds via Twilio webhooks.
# When it dies, seeds silently stop arriving. Jeff discovers it, not the system.
# Failed silently at least twice (Feb 19, Mar 5).
# No prior history — this is the first alert rule for the tunnel.

name: tunnel-down
description: Cloudflare tunnel unreachable — seeds cannot arrive
severity: critical
schedule: "* * * * *"  # every cycle

check: |
  # Check the public URL health endpoint
  STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 "https://lightlifeurbangardens.com/health" 2>/dev/null || echo "000")
  if [ "$STATUS" = "200" ]; then
    echo "ok"
    exit 0
  fi
  # Also check if cloudflared process is running locally
  PID=$(launchctl list com.cloudflare.tunnel 2>/dev/null | grep '"PID"' | grep -o '[0-9]*')
  if [ -z "$PID" ]; then
    echo "tunnel-process-down"
    exit 1
  fi
  echo "tunnel-unreachable-$STATUS"
  exit 1

action: |
  # Cooldown: max once per 10 minutes
  COOLDOWN_FILE="/tmp/alert-tunnel-$(date '+%Y-%m-%d-%H')-$(( 10#$(date '+%M') / 10 ))"
  if [ -f "$COOLDOWN_FILE" ]; then
    exit 0
  fi
  touch "$COOLDOWN_FILE"
  # Post alert to Bridge
  BRIDGE="http://localhost:3470/api/message"
  TIMESTAMP=$(TZ=America/New_York date '+%Y-%m-%d %H:%M')
  MSG=$(printf '🔴 **Alert** — %s\n\nCloudflare tunnel is DOWN. Seeds cannot arrive via SMS.\n\nCheck: cloudflared service status\nFix: launchctl kickstart gui/$(id -u)/com.cloudflare.tunnel' "$TIMESTAMP")
  curl -sf -X POST "$BRIDGE" \
    -H 'Content-Type: application/json' \
    -d "$(jq -n --arg text "$MSG" --arg from "silas" '{from: $from, text: $text}')" \
    &>/dev/null || true
