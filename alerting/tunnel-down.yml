# tunnel-down.yml — Alert when Cloudflare tunnel to lightlifeurbangardens.com is down
# Card #2016 | Silas
#
# The tunnel is the public entry point for SMS seeds via Twilio webhooks.
# When it dies, seeds silently stop arriving. Jeff discovers it, not the system.
# Failed silently at least twice (Feb 19, Mar 5).
# No prior history — this is the first alert rule for the tunnel.

name: tunnel-down
description: Cloudflare tunnel unreachable — seeds cannot arrive
severity: critical
schedule: "* * * * *"  # every cycle

check: |
  # Check tunnel process first — if process is dead, that's a real outage
  PID=$(launchctl list com.cloudflare.tunnel 2>/dev/null | grep '"PID"' | grep -o '[0-9]*')
  if [ -z "$PID" ]; then
    echo "tunnel-process-down"
    exit 1
  fi
  # Process alive — check public URL with 3 retries over 60s
  # Connection cycling is normal (~4800 reconnects/day), only alert on sustained outage
  for attempt in 1 2 3; do
    STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "https://lightlifeurbangardens.com/health" 2>/dev/null || echo "000")
    if [ "$STATUS" = "200" ]; then
      echo "ok"
      exit 0
    fi
    [ "$attempt" -lt 3 ] && sleep 30
  done
  echo "tunnel-unreachable-sustained-$STATUS"
  exit 1

action: |
  # Cooldown: max once per 10 minutes
  COOLDOWN_FILE="/tmp/alert-tunnel-$(date '+%Y-%m-%d-%H')-$(( 10#$(date '+%M') / 10 ))"
  if [ -f "$COOLDOWN_FILE" ]; then
    exit 0
  fi
  touch "$COOLDOWN_FILE"
  # Auto-heal: restart the tunnel process
  launchctl kickstart -k gui/$(id -u)/com.cloudflare.tunnel 2>/dev/null || true
  sleep 10
  # Check if restart fixed it
  STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "https://lightlifeurbangardens.com/health" 2>/dev/null || echo "000")
  if [ "$STATUS" = "200" ]; then
    exit 0
  fi
  # Still down after restart — nudge Silas
  NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/nudge"
  "$NUDGE" silas "cloudflare-tunnel: DOWN — auto-restart failed, seeds unreachable" --force 2>/dev/null || true
