# app-down.yml — Alert when gathering-app is not responding
# Card #2000
#
# The app has no LaunchAgent — if the machine crashes or the process
# dies, nobody notices until Jeff sends a seed that vanishes.
# This checks every 2 minutes.

name: app-down
description: Gathering app is not responding on localhost:3000
severity: critical
schedule: "*/2 * * * *"  # every 2 minutes

check: |
  # Health check the app
  HTTP=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:3000/health 2>/dev/null || echo "000")
  if [[ "$HTTP" == "200" ]]; then
    echo "ok"
    exit 0
  fi
  echo "down:$HTTP"
  exit 1

action: |
  # Nudge Silas — alerts go to roles, not the Clearing
  NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/nudge"
  "$NUDGE" silas "gathering-app: DOWN — seeds, pods, API all unreachable. Fix: app-state.sh restart jeff-bridwell-personal-site, check ~/Library/Logs/gathering-app.log" --force 2>/dev/null || true
  curl -sf -X POST http://localhost:3470/api/message \
    -H 'Content-Type: application/json' \
    -d "$(jq -n --arg text '[alert] gathering-app DOWN' --arg from 'system' '{from: $from, text: $text}')" \
    &>/dev/null || true
