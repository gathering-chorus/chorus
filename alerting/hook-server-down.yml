# hook-server-down.yml — Alert when chorus-hooks server is not running
# Card #2008 follow-up | Wren requested JDI
#
# The hook server (com.chorus.hooks) is the compound loop engine.
# If it's down, no context injection, no gates, no guards.
# Jeff discovers it when a role stops working correctly.

name: hook-server-down
description: Chorus hook server is not running — compound loop broken
severity: critical
schedule: "* * * * *"  # every cycle

check: |
  # Check if hook server has a PID in launchctl
  PID=$(launchctl list com.chorus.hooks 2>/dev/null | grep '"PID"' | grep -o '[0-9]*')
  if [ -n "$PID" ]; then
    # Also verify socket exists
    if [ -S /tmp/chorus-hooks.sock ]; then
      echo "ok"
      exit 0
    fi
  fi
  echo "down"
  exit 1

action: |
  # Cooldown: max once per hour
  COOLDOWN_FILE="/tmp/alert-hook-server-$(date '+%Y-%m-%d-%H')"
  if [ -f "$COOLDOWN_FILE" ]; then
    exit 0
  fi
  touch "$COOLDOWN_FILE"
  # Nudge Silas — alerts go to roles, not the Clearing
  NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/nudge"
  "$NUDGE" silas "hook-server: DOWN — compound loop broken, no context injection, no gates" --force 2>/dev/null || true
