<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chorus Conceptual Model — Interactive</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #0f1117; color: #e0e0e0; overflow: hidden; }
  svg { width: 100vw; height: 100vh; }
  .node rect { cursor: grab; }
  .node rect:active { cursor: grabbing; }
  .node text { pointer-events: none; }
  .link { stroke-opacity: 0.6; fill: none; }
  .link-label { font-size: 9px; fill: #888; pointer-events: none; }
  .legend { position: fixed; bottom: 16px; left: 16px; display: flex; gap: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.7rem; color: #888; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .title { position: fixed; top: 16px; left: 16px; }
  .title h1 { font-size: 1.2rem; color: #e0e7ff; }
  .title p { font-size: 0.75rem; color: #888; }
  .tooltip { position: fixed; background: #1a1a2e; border: 1px solid #4f46e5; border-radius: 6px; padding: 10px 14px; font-size: 0.78rem; color: #e0e7ff; pointer-events: none; display: none; max-width: 280px; z-index: 10; }
  .tooltip .tt-title { font-weight: 700; color: #818cf8; margin-bottom: 4px; }
  .tooltip .tt-meta { color: #888; font-size: 0.7rem; }
</style>
</head>
<body>

<div class="title">
  <h1>Chorus Conceptual Model</h1>
  <p>Drag nodes to reposition &bull; Hover for details &bull; v0.1</p>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#4f46e5;"></div>Structural</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e;"></div>Domain</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b;"></div>Service</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c084fc;"></div>Practice</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fbbf24;"></div>Governance</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Constraint</div>
  <div class="legend-item"><div class="legend-dot" style="background:#60a5fa;"></div>Responsibility</div>
  <div class="legend-item"><div class="legend-dot" style="background:#06b6d4;"></div>Infrastructure</div>
</div>

<svg id="graph"></svg>

<script>
const nodes = [
  { id: "Product", group: "structural", count: 6, desc: "Gathering → Chorus → Bridge, Clearing, Board, Convergence", props: "hasValueStream, hasProduct (recursive)", w: 130, h: 55 },
  { id: "ValueStream", group: "structural", count: 3, desc: "Personal (min-hrs), Life (wks-yrs), Chorus (hrs-sessions)", props: "rhythm, hasPhase", w: 140, h: 55 },
  { id: "Phase", group: "structural", count: 18, desc: "8 Personal + 5 Life + 5 Chorus. Each is a stance.", props: "stance, order, nextPhase, ownedByRole", w: 110, h: 55 },
  { id: "Domain", group: "domain", count: 43, desc: "22 Gathering + 19 Chorus. Bounded contexts.", props: "layer, status, disposition, servesValueStream, primaryPhase, belongsToProduct", w: 120, h: 55 },
  { id: "Service", group: "service", count: 12, desc: "Running infrastructure. God Service = Gathering App (8 domains).", props: "language, dataStore, port, experience, tier, disposition, operatesIn, supportsStream, dependsOn, ownedBy, runsOn, readsFrom, writesTo", w: 120, h: 55 },
  { id: "Practice", group: "practice", count: 30, desc: "14 skills (product surface) + 16 disciplines", props: "affinityWith, appliesTo", w: 120, h: 55 },
  { id: "Role", group: "governance", count: 3, desc: "Wren (PM), Silas (Arch/Ops), Kade (Eng)", props: "ownsDomain, hasConstraint, hasResponsibility", w: 110, h: 55 },
  { id: "Constraint", group: "constraint", count: 9, desc: "Lifecycle: Feedback → Lesson → Rule. Queryable by hooks.", props: "label, status (feedback/lesson/rule)", w: 130, h: 55 },
  { id: "Responsibility", group: "responsibility", count: 3, desc: "Named duties: diagnose, verify, own stability", props: "label", w: 140, h: 55 },
  { id: "Decision", group: "governance", count: 5, desc: "5 modeled, 100+ in archive. Governance acts.", props: "affects, constrains, supersedes, createdBy, status", w: 120, h: 55 },
  { id: "Machine", group: "infra", count: 2, desc: "Library (M1, primary) and Bedroom (M2 Pro, secondary)", props: "label, ip", w: 120, h: 55 },
  { id: "DataSource", group: "infra", count: 4, desc: "Fuseki TDB2, SQLite WAL, SOLID Pods, Filesystem", props: "label", w: 130, h: 55 },
  { id: "Card", group: "domain", count: "~200", desc: "Unit of work. Connects decisions to domains via services.", props: "cardInDomain, cardInPhase, assignedTo, hasExperience, inSequence", w: 110, h: 55 },
  { id: "Brief", group: "domain", count: "~40", desc: "Cross-role communication. Replaces Jeff as relay.", props: "briefFrom, briefTo, briefAboutDomain", w: 110, h: 55 },
  { id: "Pattern", group: "practice", count: 9, desc: "Direction, Ideation, Demo, Triage, SWAT, Gemba, Clearing, Story, Reflection", props: "detectedIn", w: 120, h: 55 },
  { id: "Sequence", group: "structural", count: 4, desc: "hardening, style, sparql, flow-tests", props: "touchesDomain", w: 120, h: 55 },
  { id: "Experience", group: "governance", count: "~12", desc: "Jeff's voice. Validated lifecycle: untested → verified → broken.", props: "statement, experienceFor, status", w: 130, h: 55 },
  { id: "Story", group: "governance", count: 4, desc: "Product inputs: Never Say Oops, Blueprint, Staples KM, Few Not Many", props: "storyConnectsTo, storyInforms", w: 110, h: 55 },
  { id: "NonFunctionals", group: "gap", count: 0, desc: "Exists but empty — no individuals wired yet.", props: "idempotency, observability, errorVisibility, monitoring", w: 150, h: 55 }
];

const links = [
  { source: "Product", target: "ValueStream", label: "hasValueStream", color: "#4f46e5" },
  { source: "Product", target: "Product", label: "hasProduct", color: "#818cf8", self: true },
  { source: "Domain", target: "Product", label: "belongsToProduct", color: "#22c55e" },
  { source: "ValueStream", target: "Phase", label: "hasPhase", color: "#4f46e5" },
  { source: "Phase", target: "Phase", label: "nextPhase", color: "#818cf8", self: true },
  { source: "Phase", target: "Role", label: "ownedByRole", color: "#fbbf24" },
  { source: "Domain", target: "ValueStream", label: "servesValueStream", color: "#22c55e" },
  { source: "Domain", target: "Phase", label: "primaryPhase", color: "#22c55e", dashed: true },
  { source: "Service", target: "Domain", label: "operatesIn", color: "#f59e0b" },
  { source: "Service", target: "ValueStream", label: "supportsStream", color: "#f59e0b", dashed: true },
  { source: "Service", target: "Role", label: "ownedBy", color: "#f59e0b" },
  { source: "Service", target: "Service", label: "dependsOn", color: "#f87171", self: true },
  { source: "Service", target: "NonFunctionals", label: "hasNonFunctionals", color: "#555", dashed: true },
  { source: "Service", target: "Machine", label: "runsOn", color: "#f59e0b" },
  { source: "Service", target: "DataSource", label: "readsFrom / writesTo", color: "#f59e0b", dashed: true },
  { source: "Practice", target: "Domain", label: "appliesTo", color: "#c084fc" },
  { source: "Practice", target: "Phase", label: "affinityWith", color: "#c084fc", dashed: true },
  { source: "Role", target: "Domain", label: "ownsDomain", color: "#fbbf24" },
  { source: "Role", target: "Constraint", label: "hasConstraint", color: "#f87171" },
  { source: "Role", target: "Responsibility", label: "hasResponsibility", color: "#60a5fa" },
  { source: "Decision", target: "Domain", label: "affects", color: "#fde68a" },
  { source: "Decision", target: "Service", label: "constrains", color: "#fde68a", dashed: true },
  { source: "Decision", target: "Decision", label: "supersedes", color: "#fbbf24", self: true },
  { source: "Card", target: "Domain", label: "cardInDomain", color: "#22c55e" },
  { source: "Card", target: "Phase", label: "cardInPhase", color: "#22c55e", dashed: true },
  { source: "Card", target: "Role", label: "assignedTo", color: "#fbbf24" },
  { source: "Card", target: "Experience", label: "hasExperience", color: "#fbbf24" },
  { source: "Card", target: "Sequence", label: "inSequence", color: "#4f46e5" },
  { source: "Brief", target: "Role", label: "from / to", color: "#fbbf24" },
  { source: "Brief", target: "Domain", label: "aboutDomain", color: "#22c55e", dashed: true },
  { source: "Pattern", target: "Phase", label: "detectedIn", color: "#c084fc" },
  { source: "Sequence", target: "Domain", label: "touchesDomain", color: "#4f46e5" },
  { source: "Experience", target: "Service", label: "experienceFor", color: "#fbbf24" },
  { source: "Story", target: "Domain", label: "connectsTo", color: "#fde68a" },
  { source: "Story", target: "Decision", label: "informs", color: "#fde68a", dashed: true }
];

const colors = {
  structural: "#4f46e5",
  domain: "#22c55e",
  service: "#f59e0b",
  practice: "#c084fc",
  governance: "#fbbf24",
  constraint: "#f87171",
  responsibility: "#60a5fa",
  infra: "#06b6d4",
  gap: "#555"
};

const fillColors = {
  structural: "#1a1a3e",
  domain: "#0f1f17",
  service: "#1f1a0f",
  practice: "#1a0f2e",
  governance: "#1f1a0f",
  constraint: "#1f0f0f",
  responsibility: "#0f1a2e",
  infra: "#0f1a1f",
  gap: "#151515"
};

const width = window.innerWidth;
const height = window.innerHeight;

// Initial positions in a sensible layout
const initPos = {
  Product: { x: 150, y: 80 },
  ValueStream: { x: 450, y: 80 },
  Phase: { x: 750, y: 80 },
  Sequence: { x: 450, y: 200 },
  Domain: { x: 200, y: 320 },
  Card: { x: 450, y: 320 },
  Brief: { x: 650, y: 320 },
  Service: { x: 200, y: 500 },
  Machine: { x: 80, y: 620 },
  DataSource: { x: 300, y: 620 },
  NonFunctionals: { x: 200, y: 700 },
  Practice: { x: 500, y: 500 },
  Pattern: { x: 650, y: 500 },
  Experience: { x: 500, y: 620 },
  Role: { x: 850, y: 320 },
  Constraint: { x: 900, y: 500 },
  Responsibility: { x: 1050, y: 500 },
  Decision: { x: 850, y: 620 },
  Story: { x: 700, y: 700 }
};

nodes.forEach(n => {
  const p = initPos[n.id] || { x: width/2, y: height/2 };
  n.x = p.x;
  n.y = p.y;
  n.fx = p.x;
  n.fy = p.y;
});

const svg = d3.select("#graph");

// Arrow markers
const defs = svg.append("defs");
Object.entries(colors).forEach(([key, color]) => {
  defs.append("marker")
    .attr("id", `arrow-${key}`)
    .attr("viewBox", "0 0 10 10")
    .attr("refX", 10)
    .attr("refY", 5)
    .attr("markerWidth", 8)
    .attr("markerHeight", 8)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M 0 0 L 10 5 L 0 10 z")
    .attr("fill", color);
});
// Extra markers for specific link colors
["#4f46e5","#818cf8","#22c55e","#f59e0b","#f87171","#fbbf24","#fde68a","#c084fc","#60a5fa","#555"].forEach(c => {
  const id = "arrow-" + c.replace("#","");
  defs.append("marker")
    .attr("id", id)
    .attr("viewBox", "0 0 10 10")
    .attr("refX", 10)
    .attr("refY", 5)
    .attr("markerWidth", 7)
    .attr("markerHeight", 7)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M 0 0 L 10 5 L 0 10 z")
    .attr("fill", c);
});

const linkGroup = svg.append("g").attr("class", "links");
const nodeGroup = svg.append("g").attr("class", "nodes");

// Draw links
const linkEls = linkGroup.selectAll("g")
  .data(links.filter(l => !l.self))
  .join("g");

linkEls.append("line")
  .attr("class", "link")
  .attr("stroke", d => d.color)
  .attr("stroke-width", d => d.dashed ? 1 : 1.5)
  .attr("stroke-dasharray", d => d.dashed ? "5,3" : null)
  .attr("marker-end", d => `url(#arrow-${d.color.replace("#","")})`);

linkEls.append("text")
  .attr("class", "link-label")
  .text(d => d.label);

// Draw self-referential links as text labels only
const selfLinks = linkGroup.selectAll("g.self-link")
  .data(links.filter(l => l.self))
  .join("g")
  .attr("class", "self-link");

selfLinks.append("text")
  .attr("class", "link-label")
  .text(d => `↻ ${d.label}`)
  .attr("fill", d => d.color);

// Draw nodes
const nodeEls = nodeGroup.selectAll("g")
  .data(nodes)
  .join("g")
  .attr("class", "node")
  .call(d3.drag()
    .on("start", dragstarted)
    .on("drag", dragged)
    .on("end", dragended));

nodeEls.append("rect")
  .attr("width", d => d.w)
  .attr("height", d => d.h)
  .attr("x", d => -d.w/2)
  .attr("y", d => -d.h/2)
  .attr("rx", 8)
  .attr("fill", d => fillColors[d.group])
  .attr("stroke", d => colors[d.group])
  .attr("stroke-width", d => d.group === "gap" ? 1 : 2)
  .attr("stroke-dasharray", d => d.group === "gap" ? "4,3" : null);

nodeEls.append("text")
  .attr("text-anchor", "middle")
  .attr("y", -8)
  .attr("fill", d => colors[d.group])
  .attr("font-weight", "700")
  .attr("font-size", "13px")
  .text(d => d.id);

nodeEls.append("text")
  .attr("text-anchor", "middle")
  .attr("y", 8)
  .attr("fill", "#888")
  .attr("font-size", "10px")
  .text(d => `${d.count} individual${d.count !== 1 ? 's' : ''}`);

// Tooltip
const tooltip = d3.select("#tooltip");

nodeEls.on("mouseover", (event, d) => {
  tooltip.style("display", "block")
    .html(`<div class="tt-title">${d.id}</div><div>${d.desc}</div><div class="tt-meta" style="margin-top:6px;">Properties: ${d.props}</div>`);
}).on("mousemove", (event) => {
  tooltip.style("left", (event.clientX + 16) + "px")
    .style("top", (event.clientY - 10) + "px");
}).on("mouseout", () => {
  tooltip.style("display", "none");
});

function updatePositions() {
  nodeEls.attr("transform", d => `translate(${d.x},${d.y})`);

  linkEls.each(function(d) {
    const src = nodes.find(n => n.id === d.source);
    const tgt = nodes.find(n => n.id === d.target);
    if (!src || !tgt) return;
    d3.select(this).select("line")
      .attr("x1", src.x).attr("y1", src.y)
      .attr("x2", tgt.x).attr("y2", tgt.y);
    d3.select(this).select("text")
      .attr("x", (src.x + tgt.x) / 2)
      .attr("y", (src.y + tgt.y) / 2 - 4);
  });

  selfLinks.each(function(d) {
    const src = nodes.find(n => n.id === d.source);
    if (!src) return;
    d3.select(this).select("text")
      .attr("x", src.x + src.w/2 + 8)
      .attr("y", src.y);
  });
}

function dragstarted(event, d) {
  d3.select(this).raise();
}

function dragged(event, d) {
  d.x = d.fx = event.x;
  d.y = d.fy = event.y;
  updatePositions();
}

function dragended(event, d) {
  // Keep position fixed
}

updatePositions();
</script>
</body>
</html>
