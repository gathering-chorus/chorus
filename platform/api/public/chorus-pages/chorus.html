<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chorus — Shared Awareness | Jeff Bridwell</title>
    <link rel="stylesheet" href="/css/gathering.css">
    <style>
        :root {
            --bg-color: #0a0a0f;
            --text-color: #c9d1d9;
            --card-bg: #1a1a2e;
            --primary-color: #c084fc;
            --accent-color: #c084fc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f !important;
            background-color: #0a0a0f !important;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', monospace;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .nav-bar {
            position: relative;
            z-index: 50;
            padding: 0 2rem;
            background: #0a0a0f;
        }
        .nav-bar nav a { color: rgba(255, 255, 255, 0.75); }
        .nav-bar nav a:hover, .nav-bar nav a.active { color: white; }
        .nav-bar nav .logout-link { color: #f87171; }
        .nav-bar nav .logout-link:hover { color: #fca5a5; }
        .nav-bar .dropdown-content {
            background-color: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-bar .dropdown-content a { color: rgba(255, 255, 255, 0.75); }
        .nav-bar .dropdown-content a:hover { background-color: rgba(255, 255, 255, 0.1); color: white; }
        .nav-bar .dropdown-content a.disabled-link { color: rgba(255, 255, 255, 0.3); }

        .canvas-wrap {
            width: 100%;
            height: calc(100vh - 60px);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: calc(100vh - 60px);
        }

        .glow-green { filter: drop-shadow(0 0 6px #4ade80) drop-shadow(0 0 12px #4ade8066); }
        .glow-blue { filter: drop-shadow(0 0 6px #60a5fa) drop-shadow(0 0 12px #60a5fa66); }
        .glow-orange { filter: drop-shadow(0 0 6px #fb923c) drop-shadow(0 0 12px #fb923c66); }
        .glow-purple { filter: drop-shadow(0 0 6px #c084fc) drop-shadow(0 0 12px #c084fc66); }
        .glow-gold { filter: drop-shadow(0 0 6px #fbbf24) drop-shadow(0 0 12px #fbbf2466); }
        .glow-white { filter: drop-shadow(0 0 4px #e6edf3) drop-shadow(0 0 8px #e6edf366); }
        .glow-red { filter: drop-shadow(0 0 6px #f87171) drop-shadow(0 0 12px #f8717166); }
        .glow-cyan { filter: drop-shadow(0 0 6px #22d3ee) drop-shadow(0 0 12px #22d3ee66); }
        .glow-emerald { filter: drop-shadow(0 0 6px #10b981) drop-shadow(0 0 12px #10b98166); }
        .glow-teal { filter: drop-shadow(0 0 6px #2dd4bf) drop-shadow(0 0 12px #2dd4bf66); }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        @keyframes drift {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .pulse { animation: pulse 2s ease-in-out infinite; }
        .pulse-delay-1 { animation: pulse 2s ease-in-out infinite 0.5s; }
        .pulse-delay-2 { animation: pulse 2s ease-in-out infinite 1s; }
        .pulse-delay-3 { animation: pulse 2s ease-in-out infinite 1.5s; }

        .title { font-size: 28px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }
        .subtitle { font-size: 13px; letter-spacing: 2px; opacity: 0.5; }
        .label { font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
        .label-small { font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; opacity: 0.7; }
        .label-tiny { font-size: 9px; letter-spacing: 0.8px; opacity: 0.5; }

        .nerve { fill: none; stroke-width: 2; stroke-linecap: round; }

        .draggable { cursor: grab; }
        .draggable:active { cursor: grabbing; }
        .draggable:hover circle:not([fill="transparent"]),
        .draggable:hover rect:not([fill="url(#spineGrad)"]):not([fill="#0a0a0f"]):not([fill="#ffffff"]) { opacity: 1 !important; }

        #toolbar {
            position: fixed;
            bottom: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }
        #toolbar button {
            background: #1a1a2e;
            color: #c9d1d9;
            border: 1px solid #333;
            padding: 8px 14px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
        }
        #toolbar button:hover { background: #2a2a4e; border-color: #555; }

        /* Light / print mode */
        body.light-mode {
            background: #ffffff !important;
            background-color: #ffffff !important;
            color: #1a1a2e;
        }
        body.light-mode .nav-bar { background: #ffffff; }
        body.light-mode .nav-bar nav a { color: rgba(0, 0, 0, 0.6); }
        body.light-mode .nav-bar nav a:hover,
        body.light-mode .nav-bar nav a.active { color: #1a1a2e; }
        body.light-mode .nav-bar .dropdown-content { background-color: rgba(255,255,255,0.95); border-color: rgba(0,0,0,0.1); }
        body.light-mode .nav-bar .dropdown-content a { color: rgba(0,0,0,0.7); }
        body.light-mode .canvas-wrap { background: #ffffff; }
        body.light-mode #toolbar button { background: #f0f0f5; color: #1a1a2e; border-color: #ccc; }
        body.light-mode #toolbar button:hover { background: #e0e0ea; }
        body.light-mode svg text { filter: none; }
        /* Kill glow filters in light mode — they muddy the print */
        body.light-mode .glow-green,
        body.light-mode .glow-blue,
        body.light-mode .glow-orange,
        body.light-mode .glow-purple,
        body.light-mode .glow-gold,
        body.light-mode .glow-white,
        body.light-mode .glow-red,
        body.light-mode .glow-cyan,
        body.light-mode .glow-emerald,
        body.light-mode .glow-teal { filter: none; }

        /* Light mode: darken white/invisible elements to match other nodes' visual weight */
        body.light-mode #node-clearing text { fill: #888; }
        body.light-mode #node-clearing circle[stroke="#e6edf3"] { stroke: #bbb; }
        body.light-mode #node-clearing circle[fill="#e6edf3"] { fill: #888; }

        body.light-mode #node-jeff-tag text { fill: #888; }
        body.light-mode #node-jeff-tag circle[stroke="#e6edf3"] { stroke: #bbb; }
        body.light-mode #node-jeff-tag circle[fill="#e6edf3"] { fill: #888; }

        body.light-mode #node-talk circle[stroke="#22d3ee"] { stroke: #22b8cf; }
        body.light-mode #node-talk circle[fill="#22d3ee"] { fill: #22b8cf; }

        /* /CLEARING leaf nodes (Sessions, History) */
        body.light-mode g[data-node^="clearing-leaf"] text { fill: #888; }
        body.light-mode g[data-node^="clearing-leaf"] circle[stroke="#e6edf3"] { stroke: #bbb; }
        body.light-mode g[data-node^="clearing-leaf"] circle[fill="#e6edf3"] { fill: #888; }

        /* Title + subtitle + legend */
        body.light-mode .title { fill: #1a1a2e; }
        body.light-mode .subtitle { fill: #6d28d9; }
        body.light-mode .label-small { fill: #666; }
        body.light-mode .label-tiny[fill="#e6edf3"] { fill: #999; }

        @media print {
            body { background: #ffffff !important; background-color: #ffffff !important; color: #1a1a2e; }
            .nav-bar { display: none; }
            #toolbar { display: none; }
            #toast { display: none; }
            .canvas-wrap { height: auto; }
            .glow-green, .glow-blue, .glow-orange, .glow-purple,
            .glow-gold, .glow-white, .glow-red, .glow-cyan,
            .glow-emerald, .glow-teal { filter: none; }
            svg { max-height: none; }
        }

        #toast {
            position: fixed;
            bottom: 56px;
            right: 16px;
            background: #4ade80;
            color: #0a0a0f;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        #toast.show { opacity: 1; }

    </style>
</head>

<script nonce="">
    // Highlight active nav item
    document.addEventListener('DOMContentLoaded', function() {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('nav a');

        navLinks.forEach(link => {
            const href = link.getAttribute('href');
            // Don't try to highlight external links based on current path
            if (href.startsWith('http')) {
                return;
            }

            if (href === currentPath ||
                (href === '/blog' && currentPath.startsWith('/blog'))) {
                link.classList.add('active');
            }
        });
    });
</script>

    <script nonce="">
    // ==================== NODE POSITIONS (v2) ====================
    var STORAGE_KEY = 'gathering.chorus.system';
    var STORAGE_VERSION = 2;

    var defaultPositions = {
        'look':        { x: 620, y: 192 },
        'listen':      { x: 514, y: 192 },
        'talk':        { x: 700, y: 263 },
        'clearing':    { x: 420, y: 269 },
        'chorus':      { x: 738, y: 371 },
        'flow':        { x: 380, y: 381 },
        'loom':        { x: 685, y: 480 },
        'spine':       { x: 559, y: 302 },
        'wren-tag':    { x: 350, y: 500 },
        'jeff-tag':    { x: 350, y: 610 },
        'silas-tag':   { x: 500, y: 650 },
        'kade-tag':    { x: 650, y: 650 },
        'borg-tag':    { x: 780, y: 496 }
    };

    // ==================== LEAF DEFINITIONS ====================
    var leafDefs = {
        'flow': [
            { label: 'Chunks', href: '/flow' },
            { label: 'Now/Next', href: '/flow' },
            { label: 'Workflows', href: '/flow' }
        ],
        'loom': [
            { label: 'Roles', href: '/loom' },
            { label: 'Activity', href: '/loom' },
            { label: 'Briefs', href: '/loom' }
        ],
        'clearing': [
            { label: 'Sessions', href: '#' },
            { label: 'History', href: '#' }
        ],
        'chorus': [
            { label: 'Search', href: '/search' },
            { label: 'Decisions', href: '#' },
            { label: 'Stories', href: '#' }
        ]
    };

    var leafColors = {
        'flow': '#10b981',
        'loom': '#2dd4bf',
        'clearing': '#e6edf3',
        'chorus': '#c084fc'
    };

    // Load saved state
    var positions, expanded = {};
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            var parsed = JSON.parse(saved);
            if (parsed.version === STORAGE_VERSION && parsed.positions && parsed.positions['flow'] && parsed.positions['loom']) {
                positions = parsed.positions;
                expanded = parsed.expanded || {};
            }
        } catch(e) { /* fall through to defaults */ }
    }
    // Also migrate from old key
    if (!positions) {
        var oldSaved = localStorage.getItem('gathering.chorus.nervous-system');
        if (oldSaved) {
            try {
                var oldParsed = JSON.parse(oldSaved);
                if (oldParsed && !oldParsed.version && oldParsed['spine']) {
                    // v1 format — copy positions, add flow+loom defaults
                    positions = JSON.parse(JSON.stringify(oldParsed));
                    positions['flow'] = { x: defaultPositions['flow'].x, y: defaultPositions['flow'].y };
                    positions['loom'] = { x: defaultPositions['loom'].x, y: defaultPositions['loom'].y };
                    // Remap role tags if they exist with new defaults
                    if (!positions['wren-tag']) positions['wren-tag'] = { x: defaultPositions['wren-tag'].x, y: defaultPositions['wren-tag'].y };
                    if (!positions['jeff-tag']) positions['jeff-tag'] = { x: defaultPositions['jeff-tag'].x, y: defaultPositions['jeff-tag'].y };
                }
            } catch(e) { /* ignore */ }
        }
    }
    if (!positions) {
        positions = JSON.parse(JSON.stringify(defaultPositions));
    }
    // Ensure all default keys exist
    for (var dk in defaultPositions) {
        if (!positions[dk]) positions[dk] = { x: defaultPositions[dk].x, y: defaultPositions[dk].y };
    }

    // ==================== CONNECTIONS ====================
    var connections = [
        // Senses → Spine (inputs to the protocol)
        { from: 'look', to: 'spine', color: '#22d3ee', opacity: 0.35 },
        { from: 'listen', to: 'spine', color: '#22d3ee', opacity: 0.35 },
        // Concepts → Spine (systems feed the protocol)
        { from: 'clearing', to: 'spine', color: '#e6edf3', opacity: 0.15, dash: '4 4' },
        { from: 'chorus', to: 'spine', color: '#c084fc', opacity: 0.3 },
        { from: 'flow', to: 'spine', color: '#10b981', opacity: 0.35 },
        { from: 'loom', to: 'spine', color: '#2dd4bf', opacity: 0.3 },
        // Clearing ↔ Chorus (sessions become memory)
        { from: 'clearing', to: 'chorus', color: '#c084fc', opacity: 0.3 },
        // People → Loom (the team)
        { from: 'jeff-tag', to: 'loom', color: '#e6edf3', opacity: 0.3 },
        { from: 'wren-tag', to: 'loom', color: '#4ade80', opacity: 0.35 },
        { from: 'silas-tag', to: 'loom', color: '#60a5fa', opacity: 0.35 },
        { from: 'kade-tag', to: 'loom', color: '#fb923c', opacity: 0.35 },
        // Jeff → Clearing (center of alignment)
        { from: 'jeff-tag', to: 'clearing', color: '#e6edf3', opacity: 0.15, dash: '4 4' },
        // Loom → Clearing (team convenes)
        { from: 'loom', to: 'clearing', color: '#2dd4bf', opacity: 0.15, dash: '4 4' },
        // Borg → Chorus (decomposition feeds memory)
        { from: 'borg-tag', to: 'chorus', color: '#f87171', opacity: 0.2, dash: '4 4' }
    ];

    // ==================== RENDERING ====================
    var svg = document.getElementById('canvas');
    var nervesGroup = document.getElementById('nerves');
    var leafGroup = null;

    function applyPositions() {
        for (var id in positions) {
            var el = document.getElementById('node-' + id);
            if (el) {
                el.setAttribute('transform', 'translate(' + positions[id].x + ', ' + positions[id].y + ')');
            }
        }
        drawNerves();
        // Re-render any expanded leaves
        for (var parent in expanded) {
            if (expanded[parent]) renderLeaves(parent);
        }
    }

    function drawNerves() {
        nervesGroup.innerHTML = '';
        // Draw leaf connections first (behind main nerves)
        for (var parent in expanded) {
            if (!expanded[parent]) continue;
            var defs = leafDefs[parent];
            if (!defs) continue;
            var ppos = positions[parent];
            if (!ppos) continue;
            for (var li = 0; li < defs.length; li++) {
                var leafKey = parent + '-leaf-' + li;
                var lpos = positions[leafKey];
                if (!lpos) continue;
                var lconn = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                lconn.setAttribute('x1', ppos.x);
                lconn.setAttribute('y1', ppos.y);
                lconn.setAttribute('x2', lpos.x);
                lconn.setAttribute('y2', lpos.y);
                lconn.setAttribute('stroke', leafColors[parent] || '#888');
                lconn.setAttribute('stroke-width', '1');
                lconn.setAttribute('opacity', '0.25');
                nervesGroup.appendChild(lconn);
            }
        }
        for (var i = 0; i < connections.length; i++) {
            var conn = connections[i];
            var from = positions[conn.from];
            var to = positions[conn.to];
            if (!from || !to) continue;

            var dx = to.x - from.x;
            var dy = to.y - from.y;
            var mx = (from.x + to.x) / 2;
            var my = (from.y + to.y) / 2;
            var cx1 = mx - dy * 0.1;
            var cy1 = my + dx * 0.1;

            var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', 'M ' + from.x + ',' + from.y + ' Q ' + cx1 + ',' + cy1 + ' ' + to.x + ',' + to.y);
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke', conn.color);
            path.setAttribute('stroke-width', '2');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('opacity', conn.opacity);
            if (conn.dash) path.setAttribute('stroke-dasharray', conn.dash);
            nervesGroup.appendChild(path);

            // Animated signal dot
            var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('r', '3');
            circle.setAttribute('fill', conn.color);
            circle.setAttribute('opacity', '0');

            var animMotion = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
            var dur = (1.5 + Math.random() * 2) + 's';
            animMotion.setAttribute('dur', dur);
            animMotion.setAttribute('repeatCount', 'indefinite');
            animMotion.setAttribute('path', 'M ' + from.x + ',' + from.y + ' Q ' + cx1 + ',' + cy1 + ' ' + to.x + ',' + to.y);

            var animOpacity = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
            animOpacity.setAttribute('attributeName', 'opacity');
            var maxOp = Math.min(conn.opacity * 2, 0.8);
            animOpacity.setAttribute('values', '0;' + maxOp + ';' + maxOp + ';0');
            animOpacity.setAttribute('dur', dur);
            animOpacity.setAttribute('repeatCount', 'indefinite');

            circle.appendChild(animMotion);
            circle.appendChild(animOpacity);
            nervesGroup.appendChild(circle);
        }
    }

    // ==================== LEAVES ====================
    function ensureLeafGroup() {
        if (!leafGroup) {
            leafGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            leafGroup.id = 'leaves';
            svg.appendChild(leafGroup);
        }
        return leafGroup;
    }

    function renderLeaves(parentId) {
        var defs = leafDefs[parentId];
        if (!defs) return;
        var color = leafColors[parentId] || '#888';
        var ppos = positions[parentId];
        if (!ppos) return;
        var group = ensureLeafGroup();

        // Remove existing leaves for this parent
        removeLeafElements(parentId);

        var angleStep = (2 * Math.PI) / Math.max(defs.length, 1);
        var radius = 65;
        // Offset so leaves don't pile on top of connections
        var startAngle = -Math.PI / 2;

        for (var i = 0; i < defs.length; i++) {
            var leaf = defs[i];
            var leafKey = parentId + '-leaf-' + i;
            // Default position: fan out in a circle around parent
            if (!positions[leafKey]) {
                var angle = startAngle + angleStep * i;
                positions[leafKey] = {
                    x: Math.round(ppos.x + Math.cos(angle) * radius),
                    y: Math.round(ppos.y + Math.sin(angle) * radius)
                };
            }

            var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.id = 'node-' + leafKey;
            g.classList.add('draggable');
            g.dataset.node = leafKey;
            g.dataset.leaf = 'true';
            g.dataset.href = leaf.href;
            g.setAttribute('transform', 'translate(' + positions[leafKey].x + ', ' + positions[leafKey].y + ')');

            // Hit area
            var hit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            hit.setAttribute('r', '30');
            hit.setAttribute('fill', 'transparent');
            hit.style.cursor = 'pointer';
            g.appendChild(hit);

            // Outer ring
            var outer = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            outer.setAttribute('r', '20');
            outer.setAttribute('fill', 'none');
            outer.setAttribute('stroke', color);
            outer.setAttribute('stroke-width', '1');
            outer.setAttribute('opacity', '0.5');
            g.appendChild(outer);

            // Center dot
            var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dot.setAttribute('r', '3');
            dot.setAttribute('fill', color);
            dot.setAttribute('opacity', '0.6');
            g.appendChild(dot);

            // Label
            var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('y', '-26');
            text.setAttribute('text-anchor', 'middle');
            text.setAttribute('fill', color);
            text.setAttribute('font-size', '9');
            text.setAttribute('font-weight', '500');
            text.setAttribute('letter-spacing', '0.8px');
            text.setAttribute('opacity', '0.7');
            text.textContent = leaf.label;
            g.appendChild(text);

            group.appendChild(g);
        }
    }

    function removeLeafElements(parentId) {
        var defs = leafDefs[parentId];
        if (!defs) return;
        for (var i = 0; i < defs.length; i++) {
            var el = document.getElementById('node-' + parentId + '-leaf-' + i);
            if (el) el.remove();
        }
    }

    function removeLeafPositions(parentId) {
        var defs = leafDefs[parentId];
        if (!defs) return;
        for (var i = 0; i < defs.length; i++) {
            delete positions[parentId + '-leaf-' + i];
        }
    }

    function toggleLeaves(parentId) {
        if (expanded[parentId]) {
            // Collapse
            expanded[parentId] = false;
            removeLeafElements(parentId);
            removeLeafPositions(parentId);
        } else {
            // Expand
            expanded[parentId] = true;
            renderLeaves(parentId);
        }
        drawNerves();
        saveState();
    }

    // ==================== DRAG + CLICK ====================
    var dragTarget = null;
    var dragOffset = { x: 0, y: 0 };
    var dragStart = { x: 0, y: 0 };
    var hasDragged = false;
    var DRAG_THRESHOLD = 5;

    function svgPoint(evt) {
        var pt = svg.createSVGPoint();
        pt.x = evt.clientX;
        pt.y = evt.clientY;
        return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    svg.addEventListener('mousedown', function(evt) {
        var node = evt.target.closest('.draggable');
        if (!node) return;
        var id = node.dataset.node;
        if (!id || !positions[id]) return;

        dragTarget = id;
        hasDragged = false;
        var pt = svgPoint(evt);
        dragStart.x = pt.x;
        dragStart.y = pt.y;
        dragOffset.x = pt.x - positions[id].x;
        dragOffset.y = pt.y - positions[id].y;
        evt.preventDefault();
    });

    svg.addEventListener('mousemove', function(evt) {
        if (!dragTarget) return;
        var pt = svgPoint(evt);

        if (!hasDragged) {
            var dx = pt.x - dragStart.x;
            var dy = pt.y - dragStart.y;
            if (Math.sqrt(dx * dx + dy * dy) < DRAG_THRESHOLD) return;
            hasDragged = true;
        }

        positions[dragTarget].x = Math.round(pt.x - dragOffset.x);
        positions[dragTarget].y = Math.round(pt.y - dragOffset.y);

        var el = document.getElementById('node-' + dragTarget);
        el.setAttribute('transform', 'translate(' + positions[dragTarget].x + ', ' + positions[dragTarget].y + ')');
        drawNerves();
    });

    svg.addEventListener('mouseup', function() {
        if (!dragTarget) return;
        if (hasDragged) {
            // Was a drag — save position
            saveState();
        } else {
            // Was a click — handle click action
            handleClick(dragTarget);
        }
        dragTarget = null;
    });

    svg.addEventListener('mouseleave', function() {
        if (dragTarget) {
            if (hasDragged) saveState();
            dragTarget = null;
        }
    });

    // Nodes that navigate directly on click (no leaf expand)
    var directNav = {
        'spine': '/werk'
    };

    function handleClick(nodeId) {
        // Check if this is a leaf node
        var el = document.getElementById('node-' + nodeId);
        if (el && el.dataset.leaf) {
            var href = el.dataset.href;
            if (href && href !== '#') {
                window.location.href = href;
            }
            return;
        }
        // Direct navigation nodes
        if (directNav[nodeId]) {
            window.location.href = directNav[nodeId];
            return;
        }
        // Concept nodes with leaves
        if (leafDefs[nodeId]) {
            toggleLeaves(nodeId);
        }
    }

    // ==================== PERSISTENCE ====================
    function saveState() {
        var state = {
            version: STORAGE_VERSION,
            positions: positions,
            expanded: expanded
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    // ==================== TOOLBAR ====================
    function resetPositions() {
        // Collapse all leaves
        for (var parent in expanded) {
            if (expanded[parent]) {
                removeLeafElements(parent);
                removeLeafPositions(parent);
            }
        }
        expanded = {};
        // Reset node positions
        positions = JSON.parse(JSON.stringify(defaultPositions));
        localStorage.removeItem(STORAGE_KEY);
        // Also clear old key
        localStorage.removeItem('gathering.chorus.nervous-system');
        applyPositions();
    }

    function exportPositions() {
        var json = JSON.stringify({ version: STORAGE_VERSION, positions: positions, expanded: expanded }, null, 2);
        navigator.clipboard.writeText(json).then(function() {
            var toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 1500);
        });
    }

    // ==================== LIGHT MODE ====================
    function toggleLightMode() {
        document.body.classList.toggle('light-mode');
        var isLight = document.body.classList.contains('light-mode');
        // Swap SVG background grid
        var bgRect = document.querySelector('#canvas rect[fill="url(#grid)"]');
        if (bgRect) bgRect.closest('g').style.display = isLight ? 'none' : '';
        // Update spine container: hit-area bg + gradient fill
        var spineHitRect = document.querySelector('#node-spine rect[fill="#0a0a0f"], #node-spine rect[fill="#ffffff"]');
        if (spineHitRect) spineHitRect.setAttribute('fill', isLight ? '#ffffff' : '#0a0a0f');
        var spineGradRect = document.querySelector('#node-spine rect[fill="url(#spineGrad)"]');
        if (spineGradRect) spineGradRect.setAttribute('opacity', isLight ? '0.02' : '0.04');
    }

    if (location.search.indexOf('print') > -1) {
        toggleLightMode();
        // Auto-expand all leaf groups for print
        for (var pk in leafDefs) {
            if (!expanded[pk]) toggleLeaves(pk);
        }
    }

    // ==================== INIT ====================
    applyPositions();
    </script>

<script nonce="">
(function() {
  var btn = document.getElementById('rec-toggle');
  var events = [];
  var stopFn = null;
  var timer = null;
  var BATCH = 5;
  var INTERVAL = 2000;

  function sid()  { return sessionStorage.getItem('rrweb_sid'); }
  function on()   { return sessionStorage.getItem('rrweb_on') === '1'; }

  function send(batch, sync) {
    var id = sid();
    if (!id || !batch.length) return;
    var payload = JSON.stringify({
      sessionId: id,
      events: batch,
      page: window.location.pathname,
      timestamp: new Date().toISOString()
    });
    if (!sync && navigator.sendBeacon) {
      navigator.sendBeacon('/api/sessions/events', new Blob([payload], { type: 'application/json' }));
    } else {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/sessions/events', false); // sync — guarantees delivery before navigation
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.send(payload);
    }
  }

  function sendActions(sync) {
    if (!actionLog.length) return;
    var id = sid();
    if (!id) return;
    var payload = JSON.stringify({ sessionId: id, actions: actionLog.splice(0) });
    if (!sync && navigator.sendBeacon) {
      navigator.sendBeacon('/api/sessions/actions', new Blob([payload], { type: 'application/json' }));
    } else {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/sessions/actions', false);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.send(payload);
    }
  }

  function flush() {
    if (events.length === 0) return;
    send(events.splice(0), false);
  }

  // --- Text action log (parallel to rrweb) ---
  var actionLog = [];
  var scrollTimer = null;
  var actionListenersAttached = false;

  function logAction(type, detail) {
    actionLog.push(new Date().toISOString() + '\t' + type + '\t' + (detail || ''));
  }

  function describeEl(el) {
    if (!el) return '';
    var text = el.innerText || el.textContent || '';
    text = text.trim().substring(0, 80).replace(/[\t\n\r]+/g, ' ');
    var href = el.getAttribute('href') || '';
    var label = el.getAttribute('aria-label') || el.getAttribute('title') || '';
    var tag = el.tagName.toLowerCase();
    var parts = [tag];
    if (text) parts.push('"' + text + '"');
    if (href && href !== '#') parts.push('→ ' + href);
    if (label) parts.push('[' + label + ']');
    return parts.join(' ');
  }

  function onActionClick(e) {
    var target = e.target.closest('a,button,[role=button],input[type=submit]');
    if (target) logAction('CLICK', describeEl(target));
  }

  function onActionScroll() {
    if (scrollTimer) clearTimeout(scrollTimer);
    scrollTimer = setTimeout(function() {
      var pct = Math.round(100 * window.scrollY / Math.max(1, document.body.scrollHeight - window.innerHeight));
      logAction('SCROLL', pct + '% of ' + window.location.pathname);
    }, 500);
  }

  function attachActionListeners() {
    if (actionListenersAttached) return;
    actionListenersAttached = true;
    logAction('PAGE', window.location.pathname + window.location.search);
    document.addEventListener('click', onActionClick, true);
    window.addEventListener('scroll', onActionScroll, { passive: true });
    // Catch pushState/replaceState for SPA nav
    var origPush = history.pushState;
    history.pushState = function() {
      origPush.apply(this, arguments);
      logAction('NAV', window.location.pathname);
    };
    var origReplace = history.replaceState;
    history.replaceState = function() {
      origReplace.apply(this, arguments);
      logAction('NAV', window.location.pathname);
    };
    window.addEventListener('popstate', function() {
      logAction('NAV', window.location.pathname);
    });
  }

  function detachActionListeners() {
    document.removeEventListener('click', onActionClick, true);
    window.removeEventListener('scroll', onActionScroll);
    actionListenersAttached = false;
  }

  function flushActionLog() { sendActions(false); }

  function start() {
    if (typeof rrwebRecord === 'undefined') {
      console.warn('[rec] rrweb not loaded');
      return;
    }
    stopFn = rrwebRecord({
      emit: function(ev) {
        events.push(ev);
        // Flush small batches frequently — multi-page apps lose events on navigation
        if (events.length >= 5) flush();
      },
      maskAllInputs: true,
      maskInputOptions: { password: true, email: true },
      blockSelector: '.no-record',
      sampling: { mousemove: 50, mouseInteraction: true, scroll: 150, input: 'last' }
    });
    attachActionListeners();
    timer = setInterval(function() { flush(); flushActionLog(); }, INTERVAL);
    btn.classList.add('active');
    btn.title = 'Stop recording';
    window.__SESSION_ID = sid();
    console.log('[rec] recording', sid(), window.location.pathname);
  }

  function stop() {
    if (stopFn) { stopFn(); stopFn = null; }
    if (timer) { clearInterval(timer); timer = null; }
    console.log('[rec] stopped', sid(), events.length, 'events pending');
    logAction('STOP', 'recording ended');
    // Sync flush — guarantees data is saved before page navigates to replay
    if (events.length > 0) send(events.splice(0), true);
    sendActions(true);
    detachActionListeners();
    sessionStorage.removeItem('rrweb_on');
    sessionStorage.removeItem('rrweb_sid');
    btn.classList.remove('active');
    btn.title = 'Record session flow';
    events = [];
    actionLog = [];
  }

  // Resume recording if navigated mid-flow
  if (on()) {
    console.log('[rec] resuming on', window.location.pathname);
    start();
  }

  btn.addEventListener('click', function(e) {
    e.preventDefault();
    if (on()) {
      var replayId = sid();
      stop();
      // Update href so right-click → copy link gets the replay URL
      btn.href = '/admin/replay?s=' + replayId;
      btn.title = 'Right-click to copy replay link';
    } else {
      var id = 'ses_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
      sessionStorage.setItem('rrweb_sid', id);
      sessionStorage.setItem('rrweb_on', '1');
      start();
    }
  });

  window.addEventListener('beforeunload', function() {
    // sendBeacon is the only reliable method during unload (sync XHR blocked by Chrome)
    if (on() && events.length > 0) send(events.splice(0), false);
    if (on()) sendActions(false);
  });
})();
</script>
