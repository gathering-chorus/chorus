<!DOCTYPE html>
<!-- #3280 — Hook friction board. Served by chorus-api on :3340 (/borg/hook-friction.html).
     Consumes /api/chorus/hooks/friction?hours=N — the ranked DENY/BLOCK/WARN view over
     hooks.log (#3252 JSON format). Sibling of pain.html: pain ranks what's breaking;
     this ranks what's blocking. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hook friction</title>
<style>
  body { font: 13px/1.45 ui-monospace, Menlo, monospace; margin: 1.5rem; color: #1a1a1a; background: #f7f4ee; }
  h1 { font-size: 1.15rem; margin: 0 0 .2rem; }
  .sub { color: #888; margin: 0 0 .7rem; font-size: 12px; }
  .controls { margin-bottom: .5rem; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  input, button { font: inherit; padding: 4px 8px; border: 1px solid #ccc; border-radius: 6px; }
  input#hours { width: 64px; }
  button { background: #222; color: #fff; cursor: pointer; border: 0; }
  table { border-collapse: collapse; width: 100%; margin-top: .4rem; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  th, td { text-align: left; padding: 4px 9px; border-bottom: 1px solid #eee; vertical-align: top; }
  th { color: #fff; background: #222; font-size: 11px; text-transform: uppercase; position: sticky; top: 0; }
  td.n { text-align: right; font-weight: 700; white-space: nowrap; }
  td.deny { color: #b00; } td.warn { color: #b60; }
  td.roles span { display: inline-block; margin-right: 8px; }
  tr.zebra { background: #fbf9f4; }
  .err { color: #a33; }
</style>
</head>
<body>
  <h1>Hook friction <span style="font-size:12px;color:#999">— which hook blocks whom, how often</span></h1>
  <div class="sub">deny/block + warn from hooks.log &middot; allow is not friction &middot; kill the top blocker or prove it's a real catch (#3282)</div>

  <div class="controls">
    window (hours) <input id="hours" value="12" />
    <button id="go">View</button>
  </div>
  <div id="status" class="sub"></div>
  <div id="out"></div>

<script>
const $ = (id) => document.getElementById(id);

async function load() {
  const hours = encodeURIComponent($('hours').value.trim() || '12');
  $('status').textContent = 'loading…';
  try {
    const r = await fetch(`/api/chorus/hooks/friction?hours=${hours}`);
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || r.status);
    render(d);
  } catch (e) {
    $('status').innerHTML = `<span class="err">error: ${e.message}</span>`;
  }
}

function render(d) {
  $('status').textContent =
    `${d.totalFriction} friction events in last ${d.windowHours}h · generated ${d.generatedAt}`;
  if (!d.hooks.length) { $('out').innerHTML = '<p>No friction in window. Quiet hands.</p>'; return; }
  const rows = d.hooks.map((h, i) => {
    const roles = Object.entries(h.byRole).sort((a, b) => b[1] - a[1])
      .map(([role, n]) => `<span><b>${role}</b> ${n}</span>`).join('');
    return `<tr class="${i % 2 ? 'zebra' : ''}">
      <td>${h.module}</td>
      <td class="n">${h.total}</td>
      <td class="n deny">${h.deny}</td>
      <td class="n warn">${h.warn}</td>
      <td class="roles">${roles}</td>
    </tr>`;
  }).join('');
  $('out').innerHTML = `<table>
    <thead><tr><th>hook</th><th>total</th><th>deny</th><th>warn</th><th>by role</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

$('go').addEventListener('click', load);
$('hours').addEventListener('keydown', (e) => { if (e.key === 'Enter') load(); });
load();
</script>
</body>
</html>
