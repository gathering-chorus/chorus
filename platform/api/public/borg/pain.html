<!DOCTYPE html>
<!-- #3029 v1.1 — Chorus pain board. Served by chorus-api on :3340 (/borg/pain.html).
     Consumes /api/chorus/pain/rollup and /api/chorus/pain/card/:id (raw-line
     rollup → cards/latest/sample-detail, freeform window, per-product). Ports the
     proven :8899 sketch (logform.py) onto the real front end. No standalone
     server, no :8899. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Chorus pain board</title>
<style>
  body { font: 13px/1.45 ui-monospace, Menlo, monospace; margin: 1.5rem; color: #1a1a1a; background: #f7f4ee; }
  h1 { font-size: 1.15rem; margin: 0 0 .2rem; }
  .sub { color: #888; margin: 0 0 .7rem; font-size: 12px; }
  .controls { margin-bottom: .5rem; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  input, button { font: inherit; padding: 4px 8px; border: 1px solid #ccc; border-radius: 6px; }
  input#window { width: 64px; } input#card { width: 132px; }
  button { background: #222; color: #fff; cursor: pointer; border: 0; }
  .prod { color: #555; font-size: 12px; margin: .2rem 0 .4rem; } .prod b { color: #1a1a1a; }
  .chips { margin: .2rem 0 .5rem; display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { padding: 3px 10px; border: 1px solid #ccc; border-radius: 12px; cursor: pointer; background: #fff; font-size: 12px; }
  .chip.on { background: #b00; color: #fff; border-color: #b00; }
  table { border-collapse: collapse; width: 100%; margin-top: .4rem; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  th, td { text-align: left; padding: 4px 9px; border-bottom: 1px solid #eee; vertical-align: top; }
  th { color: #fff; background: #222; font-size: 11px; text-transform: uppercase; position: sticky; top: 0; }
  td.n { text-align: right; font-weight: 700; color: #a33; white-space: nowrap; }
  td.cards { color: #b60; } td.t { color: #888; white-space: nowrap; } td.d { color: #444; max-width: 520px; }
  tr.zebra { background: #fbf9f4; }
  .err { color: #a33; }
  .run { margin: .4rem 0; border: 1px solid #e3e3e3; border-radius: 8px; overflow: hidden; background: #fff; }
  .run.bad { border-color: #f1b0b0; }
  .runh { padding: 6px 10px; background: #f6f6f6; font-size: 12px; } .run.bad .runh { background: #fdeaea; }
  .ok { color: #0a7; font-weight: 700; } .fail { color: #b00; font-weight: 700; }
  .step { padding: 2px 10px; font-size: 12px; border-top: 1px solid #f3f3f3; }
</style>
</head>
<body>
  <h1>Chorus pain board <span style="font-size:12px;color:#999">— what's breaking, by scope</span></h1>
  <div class="sub">raw-line, event-anchored &middot; synthetic test cards excluded &middot; kill the top class, not the next red line</div>

  <div class="controls">
    window <input id="window" value="12h" title="e.g. 30m, 6h, 12h, 1d, 7d" />
    card # <input id="card" placeholder="(blank = pain)" />
    <button id="go">View</button>
  </div>
  <div id="prod" class="prod"></div>
  <div id="chips" class="chips"></div>
  <div id="status" class="sub"></div>
  <div id="out"></div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let ALL = [], roleFilter = '';

function syncURL() {
  const c = $('card').value.trim(), w = $('window').value.trim();
  const q = c ? `?card=${encodeURIComponent(c)}&window=${encodeURIComponent(w)}`
              : `?window=${encodeURIComponent(w)}${roleFilter ? '&role=' + encodeURIComponent(roleFilter) : ''}`;
  history.replaceState(null, '', q);
}

function renderProduct(byProduct) {
  const parts = Object.entries(byProduct || {}).sort((a, b) => b[1] - a[1]).map(([p, n]) => `<b>${esc(p)}</b> ${n}`);
  $('prod').innerHTML = parts.length ? 'by product: ' + parts.join(' &middot; ') : '';
}

function renderChips() {
  const roles = [...new Set(ALL.map(c => c.role).filter(Boolean))].sort();
  const total = ALL.reduce((s, c) => s + c.count, 0);
  const mk = (label, role, n) => `<span class="chip ${roleFilter === role ? 'on' : ''}" data-role="${esc(role)}">${esc(label)} ${n}</span>`;
  let html = mk('all', '', total);
  for (const r of roles) html += mk(r, r, ALL.filter(c => c.role === r).reduce((s, c) => s + c.count, 0));
  $('chips').innerHTML = html;
  for (const el of $('chips').querySelectorAll('.chip')) el.onclick = () => { roleFilter = el.dataset.role; syncURL(); renderChips(); renderTable(); };
}

function renderTable() {
  const rows = ALL.filter(c => !roleFilter || c.role === roleFilter);
  let html = '<table><thead><tr><th>Count</th><th>Role</th><th>Event class</th><th>Reason</th><th>Cards</th><th>Latest</th><th>Sample detail</th></tr></thead><tbody>';
  rows.forEach((c, i) => {
    const cards = (c.cards || []).slice(0, 6).join(', ') + ((c.cards || []).length > 6 ? '…' : '');
    html += `<tr class="${i % 2 ? 'zebra' : ''}"><td class="n">${c.count}</td><td>${esc(c.role) || '-'}</td><td>${esc(c.event)}</td>`
          + `<td><b>${esc(c.reason)}</b></td><td class="cards">${esc(cards)}</td><td class="t">${esc(c.latest)}</td><td class="d">${esc(c.detail)}</td></tr>`;
  });
  $('out').innerHTML = html + '</tbody></table>';
}

async function loadRollup() {
  const w = $('window').value.trim() || '12h';
  $('status').textContent = `loading rollup (${w})…`; $('out').innerHTML = '';
  try {
    const r = await fetch('/api/chorus/pain/rollup?window=' + encodeURIComponent(w));
    const d = await r.json();
    if (!d.ok) { $('status').innerHTML = `<span class="err">rollup error: ${esc(d.reason || r.status)}</span>`; return; }
    ALL = d.classes || [];
    renderProduct(d.byProduct);
    $('status').innerHTML = `${d.total} failures in <b>${ALL.length} classes</b> &middot; window ${esc(d.window)} &middot; UTC`;
    renderChips(); renderTable();
  } catch (e) { $('status').innerHTML = `<span class="err">${esc(e)}</span>`; }
}

async function loadCard(id) {
  $('status').textContent = `loading card #${id}…`; $('chips').innerHTML = ''; $('prod').innerHTML = '';
  try {
    const r = await fetch('/api/chorus/pain/card/' + encodeURIComponent(id));
    const d = await r.json();
    if (!d.ok) { $('status').innerHTML = `<span class="err">card error: ${esc(d.reason || r.status)}</span>`; return; }
    const runs = {};
    for (const ev of (d.events || [])) (runs[ev.trace_id || 'no-trace'] ||= []).push(ev);
    const ids = Object.keys(runs);
    $('status').innerHTML = `#${esc(id)} &middot; ${(d.events || []).length} events across <b>${ids.length} runs</b>`;
    const isFail = (e) => /\.(failed|refused|error)$/.test(e.event || '') || String(e.level || '').toLowerCase() === 'error';
    let html = '';
    for (const t of ids) {
      const evs = runs[t]; const bad = evs.some(isFail);
      html += `<div class="run ${bad ? 'bad' : ''}"><div class="runh"><b class="${bad ? 'fail' : 'ok'}">${bad ? '🔴 fail' : '✓ ok'}</b> &middot; trace ${esc(t.slice(0, 8))} &middot; ${evs.length} steps</div>`;
      for (const e of evs) html += `<div class="step">${isFail(e) ? '<span class="fail">x</span>' : '<span class="ok">·</span>'} ${esc(e.event || '')}${e.reason ? ' — ' + esc(e.reason) : ''}</div>`;
      html += '</div>';
    }
    $('out').innerHTML = html || '<div class="sub">no pipeline events for this card</div>';
  } catch (e) { $('status').innerHTML = `<span class="err">${esc(e)}</span>`; }
}

function go() { syncURL(); const c = $('card').value.trim(); c ? loadCard(c) : loadRollup(); }
$('go').onclick = go;
for (const id of ['window', 'card']) $(id).addEventListener('keydown', e => { if (e.key === 'Enter') go(); });

// honor ?card=&window=&role= on load (URL params, like the :8899 sketch)
(function init() {
  const p = new URLSearchParams(location.search);
  if (p.get('window')) $('window').value = p.get('window');
  if (p.get('card')) $('card').value = p.get('card');
  roleFilter = p.get('role') || '';
  const c = $('card').value.trim(); c ? loadCard(c) : loadRollup();
})();
</script>
</body>
</html>
