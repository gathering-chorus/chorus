<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quality Service — Borg</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #fafafa; color: #1a1a1a; padding: 40px; max-width: 1200px; margin: 0 auto; }
a.back { font-size: 0.8rem; color: #4f46e5; text-decoration: none; }
h1 { font-size: 2rem; font-weight: 300; margin: 12px 0 4px; }
.subtitle { font-size: 0.9rem; color: #666; margin-bottom: 32px; max-width: 760px; line-height: 1.5; }
.totals { display: flex; gap: 20px; margin-bottom: 24px; padding: 20px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; }
.totals .stat { flex: 1; }
.totals .stat-value { font-size: 2rem; font-weight: 300; }
.totals .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; display: block; }
.pyramid { margin-bottom: 24px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; }
.pyramid h2 { font-size: 1rem; font-weight: 500; margin-bottom: 16px; }
.layer { padding: 10px; margin: 6px auto; border-radius: 4px; color: #fff; text-align: center; font-size: 0.85rem; font-weight: 500; transition: width 0.3s; }
.layer .layer-meta { font-size: 0.72rem; opacity: 0.85; margin-top: 2px; font-weight: 400; }
.repos { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 16px; margin-bottom: 24px; }
.repo { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; }
.repo h3 { font-size: 0.95rem; font-weight: 500; margin-bottom: 4px; }
.repo .total { font-size: 1.6rem; font-weight: 300; margin-bottom: 12px; color: #4f46e5; }
.repo-layer { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.82rem; }
.repo-layer:last-child { border-bottom: 0; }
.repo-layer .l-name { color: #555; }
.repo-layer .l-count { color: #1a1a1a; font-variant-numeric: tabular-nums; }
.repo-layer .l-files { color: #999; font-size: 0.72rem; margin-left: 8px; }
.loading { text-align: center; padding: 40px; color: #888; }
.error { color: #dc2626; padding: 20px; border: 1px solid #fecaca; border-radius: 8px; background: #fef2f2; }
.meta { font-size: 0.75rem; color: #999; margin-top: 40px; text-align: center; }
.meta a { color: #4f46e5; text-decoration: none; }
</style>
</head>
<body>

<a class="back" href="/borg/">&larr; Borg</a>
<h1>Quality Service</h1>
<p class="subtitle">Test pyramid by domain — where coverage breathes. Top = slowest/broadest (E2E, security, perf). Middle = integration. Bottom = unit (fast, broad).</p>

<div class="totals" id="totals">
  <div class="loading">Loading&hellip;</div>
</div>

<div class="pyramid" id="pyramid-panel">
  <h2>Test Pyramid</h2>
  <div id="pyramid"><div class="loading">Loading pyramid&hellip;</div></div>
</div>

<div class="repos" id="repos">
  <div class="loading">Loading repos&hellip;</div>
</div>

<p class="meta">Chorus API &middot; /api/chorus/quality/summary &middot; <a href="/">Chorus landing</a></p>

<script>
(async function() {
  const totalsEl = document.getElementById('totals');
  const pyramidEl = document.getElementById('pyramid');
  const reposEl = document.getElementById('repos');

  try {
    const res = await fetch('/api/chorus/quality/summary');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    totalsEl.innerHTML = ''
      + statHtml(data.total, 'Total tests')
      + statHtml(data.pyramid.length, 'Layers')
      + statHtml(data.repos.length, 'Repos')
      + statHtml(new Date(data.scannedAt).toLocaleTimeString(), 'Scanned');

    const maxCount = Math.max.apply(null, data.pyramid.map(function(l) { return l.count; }).concat([1]));
    pyramidEl.innerHTML = data.pyramid.map(function(l) {
      const pct = Math.max(5, Math.round((l.count / maxCount) * 100));
      return ''
        + '<div class="layer" style="background:' + l.color + ';width:' + pct + '%">'
        +   l.name + ' &middot; ' + l.count
        +   '<div class="layer-meta">' + l.fileCount + ' files &middot; ' + (l.apiCount > 0 ? l.apiCount + ' api' : '') + (l.uiCount > 0 ? ' &middot; ' + l.uiCount + ' ui' : '') + '</div>'
        + '</div>';
    }).join('');

    reposEl.innerHTML = data.repos.map(function(r) {
      return ''
        + '<div class="repo">'
        +   '<h3>' + r.name + '</h3>'
        +   '<div class="total">' + r.total + ' tests</div>'
        +   r.layers.map(function(l) {
              return '<div class="repo-layer"><span class="l-name">' + l.name + '<span class="l-files">' + l.fileCount + ' files</span></span><span class="l-count">' + l.count + '</span></div>';
            }).join('')
        + '</div>';
    }).join('');
  } catch (err) {
    totalsEl.innerHTML = '<div class="error">Failed to load quality data: ' + String(err) + '</div>';
    pyramidEl.innerHTML = '';
    reposEl.innerHTML = '';
  }

  function statHtml(value, label) {
    return '<div class="stat"><span class="stat-value">' + value + '</span><span class="stat-label">' + label + '</span></div>';
  }
})();
</script>

</body>
</html>
