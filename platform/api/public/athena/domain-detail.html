<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Domain Detail — Athena</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Pro Text', -apple-system, sans-serif; background: #fafafa; color: #1a1a1a; }
  a { color: #4f46e5; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .page-container { margin: 0; padding: 40px 96px; }

  h1 { font-size: 24px; font-weight: 300; color: #1a1a1a; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 40px; }
  .subtitle span { color: #4f46e5; }

  /* Breadcrumb */
  .breadcrumb { font-size: 13px; color: #666; margin-bottom: 24px; }
  .breadcrumb a { color: #4f46e5; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; text-align: center; }
  .stat-value { font-size: 28px; font-weight: 300; color: #1a1a1a; }
  .stat-value.owner { font-size: 18px; }
  .stat-value.step { font-size: 16px; }
  .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
  .stat .step-badge { display: inline-block; padding: 4px 12px; border-radius: 10px; font-size: 13px; }

  .step-shaping { background: #ede9fe; color: #5b21b6; }
  .step-shaping { background: #fef9c3; color: #854d0e; }
  .step-directing { background: #fef3c7; color: #92400e; }
  .step-designing { background: #e0e7ff; color: #3730a3; }
  .step-building { background: #d1fae5; color: #065f46; }
  .step-proving { background: #fce7f3; color: #9d174d; }

  /* Grid */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .section { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 40px 96px; }
  .section h2 { font-size: 13px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px; }
  .full-width { grid-column: 1 / -1; }

  /* Owner dots */
  .owner-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .owner-dot.wren { background: #4ade80; }
  .owner-dot.silas { background: #60a5fa; }
  .owner-dot.kade { background: #fb923c; }
  .owner-dot.jeff { background: #e6edf3; }

  /* Lists */
  .item-list { list-style: none; }
  .item-list li { padding: 10px 0; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
  .item-list li:last-child { border-bottom: none; }
  .item-name { font-size: 14px; color: #1a1a1a; font-weight: 500; }
  .item-meta { font-size: 11px; color: #666; }
  .item-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; }
  .badge-protocol { background: #1e3a5f; color: #60a5fa; }
  .badge-infra { background: #3a1a2a; color: #f87171; }
  .badge-consumes { background: #1a2a1a; color: #4ade80; }

  /* Blast radius */
  .blast { background: #fff5f5; border: 1px solid #fecaca; border-radius: 12px; padding: 40px 96px; }
  .blast h2 { color: #f87171; }
  .blast-item { padding: 8px 0; border-bottom: 1px solid #fef2f2; }
  .blast-item:last-child { border-bottom: none; }
  .blast-name { font-size: 14px; color: #1a1a1a; }
  .blast-desc { font-size: 11px; color: #666; margin-top: 2px; }

  /* AX */
  .ax-status { display: inline-block; padding: 4px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; }
  .ax-clean { background: #1a2a1a; color: #4ade80; border: 1px solid #2a4a2a; }
  .ax-raw { background: #2a2a1a; color: #fbbf24; border: 1px solid #4a4a2a; }
  .ax-none { background: #fef2f2; color: #f87171; border: 1px solid #4a2a2a; }

  /* Properties table */
  .prop-table { width: 100%; border-collapse: collapse; }
  .prop-table th { text-align: left; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; padding: 6px 0; border-bottom: 1px solid #e0e0e0; }
  .prop-table td { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; color: #555; }
  .prop-name { color: #4f46e5; font-family: 'SF Mono', monospace; font-size: 12px; }

  /* Placeholder sections */
  .placeholder { color: #555; font-size: 13px; font-style: italic; padding: 16px 0; }

  /* Completeness chips */
  .chip-present { display: inline-block; background: #d1fae5; color: #065f46; padding: 2px 10px; border-radius: 10px; font-size: 12px; margin: 3px 4px; }
  .chip-missing { display: inline-block; background: #fee2e2; color: #991b1b; padding: 2px 10px; border-radius: 10px; font-size: 12px; margin: 3px 4px; }

  /* Content sections */
  #content-sections details { border-bottom: 1px solid #e5e7eb; }
  #content-sections summary { cursor: pointer; padding: 12px 0; }
  .tag-mock { background: #fef3c7; color: #92400e; padding: 1px 6px; border-radius: 4px; font-size: 11px; }

  .footer { text-align: center; margin-top: 48px; font-size: 11px; color: #555; }

  /* #2431 — print layout keeps each instance body on one page */
  @media print {
    details.instance-body { page-break-inside: avoid; break-inside: avoid; }
    details.instance-body[open] > * { page-break-inside: avoid; break-inside: avoid; }
    .instance-expand-all, .instance-collapse-all { display: none; }
  }
</style>
</head>
<body>
<div class="page-container">

<div class="breadcrumb" id="breadcrumb">
  <a href="value-stream.html">Athena</a> &rsaquo; <a href="#" id="bc-step">Step</a> &rsaquo; <span id="bc-domain">Domain</span>
</div>

<h1 id="domain-title">Domain</h1>
<p class="subtitle" id="domain-subtitle">Sub-Domain</p>

<div class="stats" id="stats-bar"></div>

<div id="promise-block"></div>
<div id="completeness-block"></div>
<div id="content-sections"></div>

<div class="footer">Athena &middot; Chorus &middot; Live from Athena (mockup)</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>mermaid.initialize({ startOnLoad: false, theme: 'neutral' });</script>
<script src="/athena/domain-detail.js?v=2.0"></script>
</body>
</html>
