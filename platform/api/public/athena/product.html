<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product — Athena</title>
<!-- #3635 — the Jeff-approved product INSTANCE page (2026-07-12 mock), ?p=<name>.
     Replaces the #3420 skeleton. Hand-authored pending the generator upgrade. -->
<link rel="stylesheet" href="athena-flow.css"><script src="athena-flow.js"></script></head>
<body><div class="wrap">
<div class="crumb" id="crumb"><a href="value-stream.html">value stream</a> &rarr; <a href="products.html">products</a></div>
<h1 id="title">Product</h1>
<div id="main"><p class="empty">loading live from the model&hellip;</p></div>
</div>
<script>
(async function () {
  const main = document.getElementById('main');
  const p = new URLSearchParams(location.search).get('p');
  if (!p) { main.innerHTML = '<div class="err">No product named — open as product.html?p=&lt;name&gt;, e.g. from <a class="edge" href="products.html">the products page</a>.</div>'; return; }
  try {
    // edges (ownedBy/atStep/hasDomain) live on the COLLECTION row; literals on the
    // entity read; containment in the has-child fold. Merge all three.
    const [entEnv, collEnv, kidFold] = await Promise.all([
      fetchJSON(`/products/${encodeURIComponent(p)}`),
      fetchJSON('/products'),
      fetchJSON(`/products/${encodeURIComponent(p)}/has-child`).catch(() => null)]);
    const lit = (Array.isArray(entEnv.data) ? entEnv.data[0] : entEnv.data) || {};
    const row = ((collEnv.data || []).find(r => r.name === p)) || {};
    const e = { ...row, ...Object.fromEntries(Object.entries(lit).filter(([, v]) => v !== '' && v != null)) };
    e.hasChild = (kidFold && kidFold.hasChild) || [];
    if (!Object.keys(lit).length && !Object.keys(row).length) { main.innerHTML = `<div class="err">The model has no product named "${esc(p)}" — that is the graph's answer, not a fetch failure.</div>`; return; }
    const label = e.label || p[0].toUpperCase() + p.slice(1);
    document.title = `${label} — Product — Athena`;
    document.getElementById('title').innerHTML = `${esc(label)} <span class="kind">&mdash; Product</span>`;
    const step = stepLocal(e.atStep);
    document.getElementById('crumb').innerHTML =
      `<a href="value-stream.html">value stream</a> &rarr; <a href="value-stream.html">${esc(step[0] ? step[0].toUpperCase() + step.slice(1) : '?')}</a> &rarr; <a href="products.html">products</a> &rarr; ${esc(p)}`;

    const doms = asArray(e.hasDomain).sort();
    // domain edges (owner, vocabulary) live on the /domains COLLECTION rows
    let domRowsByName = {};
    if (doms.length) {
      try { domRowsByName = Object.fromEntries(((await fetchJSON('/domains')).data || []).map(r => [r.name, r])); } catch (_) {}
    }
    const domRows = doms.map(d => {
      const de = domRowsByName[d] || {};
      const vocab = asArray(de.definesVocabulary);
      return `<tr><td><a class="edge" href="domain.html?d=${encodeURIComponent(d)}">${esc(d)}</a></td>` +
        `<td>${ownerDot(de.ownedBy)}</td>` +
        `<td>${vocab.length} class${vocab.length !== 1 ? 'es' : ''}</td>` +
        `<td><a class="edge" href="${OWL}/domains/${encodeURIComponent(d)}">:3360 &#10003;</a></td></tr>`;
    });
    const kids = asArray(e.hasChild).sort();

    main.innerHTML = `
<div class="promise"><strong>vision:</strong> ${esc(e.vision || '')}</div>
<div class="stats">
  <div class="stat"><div class="v">${ownerDot(e.ownedBy)}</div><div class="l">Owner (ownedBy)</div></div>
  <div class="stat"><div class="v">${stepBadge(e.atStep)}</div><div class="l">Step (atStep)</div></div>
  <div class="stat"><div class="v">${esc(e.status || 'no status')}</div><div class="l">Status</div></div>
  <div class="stat"><div class="v">${doms.length}</div><div class="l">Domains</div></div>
</div>
<details class="fold" open><summary>Value Proposition <span class="src">chorus:valueProposition</span></summary><div class="body"><p>${esc(e.valueProposition || '')}</p></div></details>
${e.audience ? `<details class="fold" open><summary>Audience <span class="src">chorus:audience</span></summary><div class="body"><p>${esc(e.audience)}</p></div></details>` : ''}
<details class="fold" open><summary>Domains (hasDomain) <span class="src">model edges &rarr; live domain pages</span></summary><div class="body">
${doms.length ? `<table><tr><th>Domain</th><th>Owner</th><th>Vocabulary</th><th>Live</th></tr>${domRows.join('')}</table>` : '<div class="empty">no domains declared</div>'}</div></details>
<details class="fold" open><summary>Children (hasChild) <span class="src">chorus:hasChild</span></summary><div class="body">
${kids.length ? kids.map(c => `<a class="chip" href="product.html?p=${encodeURIComponent(c)}">${esc(c)}</a>`).join(' ') : `<div class="empty">none &mdash; ${esc(p)} is a leaf product</div>`}</div></details>
${e.gaps ? `<details class="fold" open><summary>Gaps <span class="src">chorus:gaps &mdash; honest, from the model</span></summary><div class="body"><p>${esc(e.gaps)}</p></div></details>` : ''}
${srcNote(`GET /products/${esc(p)}`)}`;
  } catch (e) { fetchFailed(main, e); }
})();
</script>
</body></html>
