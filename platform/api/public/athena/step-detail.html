<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Step Detail — Athena</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Pro Text', -apple-system, sans-serif; background: #fafafa; color: #1a1a1a; }
  a { color: #4f46e5; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .page-container { margin: 0; padding: 40px 96px; }

  h1 { font-size: 28px; font-weight: 300; color: #1a1a1a; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 32px; }

  /* Breadcrumb */
  .breadcrumb { font-size: 13px; color: #666; margin-bottom: 24px; }
  .breadcrumb a { color: #4f46e5; }

  /* Step navigation */
  .step-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .step-nav a { font-size: 13px; color: #4f46e5; padding: 6px 14px; border: 1px solid #e0e0e0; border-radius: 6px; transition: background 0.15s; }
  .step-nav a:hover { background: #ffffff; text-decoration: none; }
  .step-nav .disabled { color: #555; border-color: #f0f0f0; pointer-events: none; }

  /* Step badge in title */
  .step-badge { display: inline-block; padding: 6px 16px; border-radius: 12px; font-size: 15px; font-weight: 600; margin-right: 12px; }
  .step-shaping { background: #ede9fe; color: #5b21b6; }
  .step-shaping { background: #fef9c3; color: #854d0e; }
  .step-directing { background: #fef3c7; color: #92400e; }
  .step-designing { background: #e0e7ff; color: #3730a3; }
  .step-building { background: #d1fae5; color: #065f46; }
  .step-proving { background: #fce7f3; color: #9d174d; }

  /* Stats */
  .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; text-align: center; }
  .stat-value { font-size: 28px; font-weight: 300; color: #1a1a1a; }
  .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  /* Owner filters */
  .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #e0e0e0; background: #ffffff; color: #666; font-size: 12px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  .filter-btn:hover, .filter-btn.active { border-color: #4f46e5; color: #1a1a1a; }
  .owner-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
  .owner-dot.jeff { background: #e6edf3; }
  .owner-dot.wren { background: #4ade80; }
  .owner-dot.silas { background: #60a5fa; }
  .owner-dot.kade { background: #fb923c; }

  /* Domain cards grid */
  .domain-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .domain-card { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px; cursor: pointer; transition: transform 0.15s, border-color 0.15s; text-decoration: none; color: inherit; display: block; }
  .domain-card:hover { transform: translateY(-2px); border-color: #4f46e5; text-decoration: none; }
  .domain-card h3 { font-size: 16px; font-weight: 500; color: #1a1a1a; margin-bottom: 8px; }
  .domain-card .meta { font-size: 12px; color: #666; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .domain-card .type-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: #1e2a3a; color: #60a5fa; }

  /* Empty state */
  .empty-state { text-align: center; padding: 48px; color: #555; font-size: 14px; }

  .footer { text-align: center; margin-top: 48px; font-size: 11px; color: #555; }
</style>
</head>
<body>
<div class="page-container">

<div class="breadcrumb">
  <a href="value-stream.html">Athena</a> &rsaquo; <span id="breadcrumb-step">Step</span>
</div>

<div class="step-nav">
  <a href="#" id="prev-step" class="disabled">&larr; Previous</a>
  <a href="#" id="next-step" class="disabled">Next &rarr;</a>
</div>

<h1><span id="step-badge" class="step-badge">Step</span> <span id="step-title">Domains</span></h1>
<p class="subtitle" id="step-subtitle">Domains in this step</p>

<div class="stats-bar" id="stats-bar">
  <div class="stat">
    <div class="stat-value" id="stat-domains">0</div>
    <div class="stat-label">Domains</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="stat-owners">0</div>
    <div class="stat-label">Owners</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="stat-product">Chorus</div>
    <div class="stat-label">Product</div>
  </div>
</div>

<div class="filters" id="filters"></div>

<div class="domain-grid" id="domain-grid"></div>

<div class="footer">Athena &middot; Chorus &middot; Live from Athena (mockup)</div>

</div>

<script src="/athena/step-detail.js"></script>
</body>
</html>
