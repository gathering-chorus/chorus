<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Value Stream — Athena</title>
<!-- #3635 — the Jeff-approved value-stream page (2026-07-12 mock). Replaces the
     #3522 skeleton (value-stream.js retired with it). Hand-authored pending the
     generator upgrade (teach page_html to emit this design). The stream, its six
     ordered steps (stageOrder, live), the products at each step (atStep, live),
     and the composed pipelines beneath (the other ValueStreams' contains folds).
     Nothing hardcoded, nothing fabricated. -->
<link rel="stylesheet" href="athena-flow.css"><script src="athena-flow.js"></script></head>
<body><div class="wrap wide">
<div class="crumb">chorus &rarr; value stream</div>
<h1>Chorus <span class="kind">&mdash; the value stream</span></h1>
<div id="main"><p class="empty">loading live from the model&hellip;</p></div>
</div>
<script>
(async function () {
  const main = document.getElementById('main');
  try {
    const [streamsEnv, stepsEnv, prodsEnv] = await Promise.all([
      fetchJSON('/valuestreams'), fetchJSON('/valuestreamsteps'), fetchJSON('/products')]);
    const streams = streamsEnv.data || [];
    const steps = stepsEnv.data || [];
    const prods = prodsEnv.data || [];

    // the top stream = the one the ordered steps declare (inStream), not a hardcode
    const ordered = steps
      .filter(s => s.inStream && String(s.inStream).includes('chorus'))
      .sort((a, b) => Number(a.stageOrder || 0) - Number(b.stageOrder || 0));
    const topName = ordered.length ? String(ordered[0].inStream).split('#').pop() : null;
    const top = streams.find(s => s.name === topName) || streams.find(s => s.name === 'value-stream-chorus');
    const pipelines = streams.filter(s => s !== top);

    const kidFolds = await Promise.all(prods.map(r =>
      fetchJSON(`/products/${encodeURIComponent(r.name)}/has-child`).catch(() => null)));
    prods.forEach((r, i) => { r._children = (kidFolds[i] && kidFolds[i].hasChild) || []; });
    const byStep = {};
    for (const p of prods) {
      const st = stepLocal(p.atStep);
      (byStep[st] = byStep[st] || []).push(p);
    }

    function col(step) {
      const key = stepLocal(step.name);
      const at = (byStep[key] || []).sort((a, b) => a.name.localeCompare(b.name));
      const items = at.map(p => {
        const kids = (p._children || []).slice();
        return `<a class="prod" href="product.html?p=${encodeURIComponent(p.name)}"><strong>${esc(p.name[0].toUpperCase() + p.name.slice(1))}</strong>` +
          `<span class="child">${ownerDot(p.ownedBy)} &middot; ${esc(p.status || '?')} &middot; ${asArray(p.hasDomain).length} domains</span></a>` +
          (kids.length ? `<span class="child" style="padding-left:10px">&#8627; parent of ${kids.sort().join(', ')}</span>` : '');
      }).join('') || '<div class="empty">no products at this step</div>';
      return `<div class="step-col ${key}"><h2>${esc(step.label || key)}</h2>
<div class="count">${at.length} product${at.length !== 1 ? 's' : ''} (atStep, live)</div>${items}</div>`;
    }

    // composed pipelines: each remaining stream's own step sequence (contains fold)
    const folds = await Promise.all(pipelines.map(s =>
      fetchJSON(`/valuestreams/${encodeURIComponent(s.name)}/contains`).catch(() => null)));
    const pipeHtml = pipelines.map((s, i) => {
      const kids = ((folds[i] && folds[i].contains) || []).map(x => String(x).replace(/^value-stream-step-/, ''));
      const short = s.name.replace(/^value-stream-/, '');
      const verbs = kids.map(v => `<span class="verb">${esc(v.replace(short + '-', ''))}</span>`).join('&rarr;') || '<span class="empty">no steps declared</span>';
      return `<div class="substream"><strong><a class="edge" href="product.html?p=${encodeURIComponent(short)}">${esc(s.label || short)}</a></strong> &mdash; ${esc(s.trigger || '')} &middot; ${verbs}</div>`;
    }).join('');

    main.innerHTML = `
${top && top.outcome ? `<div class="promise">${esc(top.outcome)}</div>` : ''}
<div class="stats">
  <div class="stat"><div class="v">1</div><div class="l">Stream</div></div>
  <div class="stat"><div class="v">${ordered.length}</div><div class="l">Ordered steps</div></div>
  <div class="stat"><div class="v">${prods.length}</div><div class="l">Products</div></div>
  <div class="stat"><div class="v">${pipelines.length}</div><div class="l">Composed pipelines</div></div>
</div>
<div class="stream">${ordered.map(col).join('\n')}</div>
<div class="layer-label">Pipelines compose beneath the stream &mdash; each product's own verb sequence (its ValueStream)</div>
${pipeHtml}
${srcNote('GET /valuestreams · /valuestreamsteps (stageOrder, inStream) · /products (atStep)')}`;
  } catch (e) { fetchFailed(main, e); }
})();
</script>
</body></html>
