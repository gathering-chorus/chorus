# Canonical Fuseki Shiro security config (#1892, #3579)
# DEPLOY TO: ~/.gathering/data/shiro.ini  (the path Fuseki logs as "Shiro file:";
#   FUSEKI_BASE=~/.gathering/data). NOTE: data/run/shiro.ini is a DECOY — Fuseki
#   does not read it. Verify the live path in the fuseki startup log before editing.
#
# #3579 — root: the live file was `/** = anon` on a *:3030 bind = unauthenticated
# LAN writes to the ~62GB store, AND `localhostFilter` was referenced but never
# DEFINED (silent no-op, admin was LAN-open too). Fix: define the filter; reads
# stay open; update / GSP-mutation / admin / the bare dataset endpoint require a
# loopback origin. This is the network-exposure lock — distinct from the per-writer
# identity auth program (#3564/#3573), which still requires the writer migration.
#
# [users]/admin basic-auth is NOT used here (admin routes are gated by
# localhostFilter, not authc) — so no credential lives in this committed file.
# If basic-auth is ever reintroduced, keep the secret OUT of the repo (runtime only).

[main]
ssl.enabled = false
localhostFilter = org.apache.jena.fuseki.authz.LocalhostFilter

[urls]
# --- reads: open to all ---
/$/ping = anon
/$/status = anon
/**/query = anon
/**/sparql = anon
/**/get = anon

# --- writes + GSP mutation + admin: localhost origin only ---
/**/update = localhostFilter
/**/data = localhostFilter
/**/upload = localhostFilter
/$/** = localhostFilter

# --- catch-all (incl. the bare /<dataset> endpoint that dispatches updates) ---
/** = localhostFilter
