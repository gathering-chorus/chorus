# Canonical Fuseki Shiro security config (#1892, #3579, #3630)
# DEPLOY TO: ~/.gathering/data/shiro.ini  (the path Fuseki logs as "Shiro file:";
#   FUSEKI_BASE=~/.gathering/data). NOTE: data/run/shiro.ini is a DECOY — Fuseki
#   does not read it. Verify the live path in the fuseki startup log before editing.
#
# #3579 — network-exposure lock: reads open; writes/admin require a loopback
# origin (localhostFilter). That stopped LAN writes but NOT localhost-anon ones.
#
# #3630 — WRITE IDENTITY lock: writes now require BOTH a loopback origin
# (localhostFilter) AND valid Basic credentials (authcBasic). This closes the
# localhost-anonymous-write hole — any local process could mutate the ~62GB
# store with no credential (proven live: POST :3030/pods/update → 204).
#
# SECRET HANDLING — no credential lives in this committed file. The [users]
# entry carries the placeholder ${FUSEKI_ADMIN_PASSWORD}; the deploy step
# substitutes it from the gathering app .env (the canonical home the fuseki
# service and chorus-api-wrapper.sh already source) when writing the runtime
# ~/.gathering/data/shiro.ini (0600). Writers already send
# admin:$FUSEKI_ADMIN_PASSWORD (TS via fusekiWriteAuthFromEnv #3566; shell via
# fuseki-auth.sh). DEPLOY-BEFORE-REQUIRE: every writer must carry the credential
# before this file is deployed, or its writes 401.

[main]
ssl.enabled = false
localhostFilter = org.apache.jena.fuseki.authz.LocalhostFilter

# iniRealm validates the Basic credential the writers send. Password is injected
# at deploy time (placeholder here — never the value).
#
# SCOPE NOTE (#3630 review, Kade): this closes the ANONYMOUS-write hole with ONE
# shared write credential — it is NOT per-product identity. AC#3's "per-product
# scoped credentials" is enforced one layer up, at the owl-api write-DAL door
# (each product mints its own scoped token). Fuseki here only answers "authenticated
# writer, yes/no"; attribution/scoping is the DAL's job (Wren's owl-api, ADR-050).
[users]
admin = ${FUSEKI_ADMIN_PASSWORD}, writer

[roles]
writer = *

[urls]
# --- reads: open to all ---
/$/ping = anon
/$/status = anon
/**/query = anon
/**/sparql = anon
/**/get = anon

# --- writes + GSP mutation + admin: loopback origin AND a valid write credential ---
# GSP NOTE (#3630 review, Wren): Shiro url patterns are method-agnostic, so
# `/**/data = authcBasic` gates GSP GET reads too. Verified 2026-07-12 there are
# ZERO GSP-GET readers on /data — every /pods/data consumer is a PUT/POST/DELETE
# write (server.ts Athena reload PUT, fuseki-maintenance DELETE, photo-pipeline PUT).
# So `/data` is write-scoped here and no reader breaks. Anonymous GSP reads remain
# open via `/**/get` and `/**/query` above; if a GSP-GET-on-/data consumer ever
# appears, upgrade to Fuseki operation-level ACLs (fuseki:gsp-r vs gsp-rw) rather
# than re-opening /data.
/**/update = localhostFilter,authcBasic
/**/data = localhostFilter,authcBasic
/**/upload = localhostFilter,authcBasic
/$/** = localhostFilter,authcBasic

# --- catch-all (incl. the bare /<dataset> endpoint that dispatches updates) ---
/** = localhostFilter,authcBasic
