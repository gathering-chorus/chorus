# Service Registry — maps service names to their runtime backend
# Format: name|backend|machine|health_url|port|label|-
# Delimiter: pipe (|) — colons conflict with URLs
#
# Backends (post #2020 — all services are LaunchAgents):
#   launchagent — managed via launchctl (local)
#   ssh         — managed via launchctl over SSH (remote machine)
#
# label: LaunchAgent label (e.g. com.gathering.app)
# Last column kept as "-" for historical compat (was compose_dir).

# --- App stack (Library) ---
app|launchagent|library|http://localhost:3000/health|3000|com.gathering.app|-
fuseki|launchagent|library|http://localhost:3030/$/ping|3030|com.gathering.fuseki|-
css|launchagent|library|http://localhost:3001/|3001|com.gathering.css|-

# --- Content (Library) ---
wordpress|launchagent|library|http://localhost:8081/|8081|com.gathering.wordpress|-
mysql|launchagent|library|-|3306|com.gathering.mysql|-

# --- Chorus (Library) ---
chorus-api|launchagent|library|http://localhost:3340/health|3340|com.chorus.api|-

# --- Board (Library) ---
vikunja|launchagent|library|http://localhost:3456/api/v1/info|3456|com.gathering.vikunja|-

# --- Observability (Library) ---
prometheus|launchagent|library|http://localhost:9090/-/ready|9090|com.gathering.prometheus|-
alertmanager|launchagent|library|http://localhost:9093/-/ready|9093|com.gathering.alertmanager|-
grafana|launchagent|library|http://localhost:3100/api/health|3100|com.gathering.grafana|-
loki|launchagent|library|http://localhost:3102/ready|3102|com.gathering.loki|-
promtail|launchagent|library|-|9080|com.gathering.promtail|-
blackbox|launchagent|library|http://localhost:9115/|9115|com.gathering.blackbox-exporter|-
mysqld-exporter|launchagent|library|http://localhost:9104/metrics|9104|com.gathering.mysqld-exporter|-

# --- Host LaunchAgents (Library) ---
node-exporter|launchagent|library|http://localhost:9102/metrics|9102|com.prometheus.node-exporter|-

# --- Music (Bedroom) ---
navidrome|ssh|bedroom|http://192.168.86.242:4533/|4533|com.gathering.navidrome|-

# --- Bedroom services (SSH backend) ---
images-api|ssh|bedroom|http://192.168.86.242:3001/health|3001|com.gathering.images-api|-
video-server|ssh|bedroom|http://192.168.86.242:8082/health|8082|com.gathering.video-server|-
ollama|ssh|bedroom|http://192.168.86.242:11434/api/tags|11434|com.gathering.ollama|-
