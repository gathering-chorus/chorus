# Service Registry — maps service names to their runtime backend
# Format: name|backend|machine|health_url|port|label_or_container|compose_dir
# Delimiter: pipe (|) — colons conflict with URLs
#
# Backends:
#   docker      — managed via docker CLI (local)
#   launchagent — managed via launchctl (local)
#   ssh         — managed via launchctl over SSH (remote machine)
#
# compose_dir: path to docker-compose.yml directory (docker backend only, - if N/A)
# label_or_container: Docker container name OR LaunchAgent label
#
# Phase 0: Current state — all Docker
# Entries will update to launchagent/ssh as migrations complete

