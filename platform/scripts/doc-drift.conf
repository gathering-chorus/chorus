# doc-drift.conf — Code-to-doc relatedness map
# Format: <code-glob> → <doc-path>
# The gate checks: if files matching <code-glob> changed but <doc-path> didn't,
# flag the doc as potentially stale.
#
# Paths are relative to repo root (CascadeProjects/).
# Globs use bash extglob patterns.

# Board CLI
messages/scripts/cards → messages/team-architecture.md
messages/board-client/src/ → messages/team-architecture.md

# CLAUDE.md generator — has its own regen workflow (claudemd-gen.sh)
# Not mapped here; staleness checked by claudemd-gen.sh --check

# Session lifecycle
messages/scripts/werk-init.sh → messages/team-architecture.md
messages/scripts/session-end-hook.sh → messages/team-architecture.md

# Git queue
messages/scripts/git-queue.sh → messages/team-architecture.md

# Chorus scripts
messages/scripts/chorus-log.sh → messages/team-architecture.md
messages/scripts/chorus-query.sh → messages/team-architecture.md

# Infrastructure
architect/scripts/ → architect/system-architecture.md
architect/scripts/ → architect/infrastructure-constraints.md

# LaunchAgents
messages/launchagents/ → architect/infrastructure-constraints.md

# App routes (src changes need deploy docs awareness)
jeff-bridwell-personal-site/src/routes/ → jeff-bridwell-personal-site/docs/api.md
jeff-bridwell-personal-site/src/services/ → architect/system-architecture.md

# Hooks
messages/scripts/*-hook.sh → messages/team-architecture.md

