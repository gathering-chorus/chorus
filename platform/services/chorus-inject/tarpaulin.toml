# tarpaulin config for chorus-inject — #2167
#
# Floor: 80%. Baseline: 2026-04-17 — 98.48% (65/66 lines).
#
# History: prior floor was 20% with a "bin wrapper is uncoverable without real
# Accessibility" rationale. That conflated "requires macOS permission to run
# for real" with "cannot be unit tested." #2167 moved the impure path behind
# an `OsaRunner` trait — FakeRunner exercises every branch (unknown role,
# dry-run short-circuit, spawn failure, ok stdout, non-ok stdout, argv
# dispatch). main.rs is reached by integration tests via CARGO_BIN_EXE so
# tarpaulin instruments it. The only uncovered line is a macro-internal
# sub-expression inside writeln! that tarpaulin can't reach.
#
# If tarpaulin reports below 80%, real behavior has regressed. The lib target
# must stay near 100%; the bin shell must stay covered by integration tests.

[default]
run-types = ["Tests"]
fail-under = 80
exclude-files = ["tests/*"]
