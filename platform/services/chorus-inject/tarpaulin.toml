# tarpaulin config for chorus-inject — #2167
#
# Floor: 20%.
#
# Why not 80%? chorus-inject is a bin crate. main.rs (42 lines) is argv
# dispatch + Command::new("osascript") — intrinsically uncoverable in a unit
# test environment (requires real macOS Accessibility permission). The lib
# target is 100% covered (13/13). Cap is ~24% until we mock the Command
# runner or accept bin-wrapper as uncoverable (standard for platform shims).
#
# If tarpaulin reports below 20%, the pure logic in lib.rs has regressed.
# That's the signal this gate catches.
#
# Baseline: 2026-04-17 — 23.64% (13 lib / 55 total lines).

[default]
run-types = ["Tests"]
fail-under = 20
exclude-files = ["tests/*"]
