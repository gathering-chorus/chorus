# #2168 AC-9: chorus-hooks test suite runs single-threaded by default.
#
# Shared /tmp/claude-team-scan/<role>-declared.json and /tmp/pulse-latest.json
# state across tests causes parallel contamination (pre-existing before #2168,
# exposed during role-state source-stamping work). Until tests are refactored
# to per-test tempdirs, serialize. Override with `cargo test -- --test-threads=N`.
[env]
RUST_TEST_THREADS = "1"
# #2614: tests fail-loud on missing CHORUS_ROOT (per #2505). Set it relative
# to this config file (.cargo/config.toml is at chorus-hooks/.cargo/, so
# four `..` lands at the repo root). `cargo test` from any cwd now has
# CHORUS_ROOT pointed at the chorus repo. Production binaries re-derive
# from script location (chorus-env-setup.sh) and ignore caller env, so this
# only affects cargo invocations.
CHORUS_ROOT = { value = "../../..", relative = true, force = false }
