<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="860" font-family="-apple-system, Segoe UI, Helvetica, sans-serif">
  <rect width="1240" height="860" fill="#ffffff"/>

  <text x="40" y="38" font-size="23" font-weight="700" fill="#1a1a1a">Chorus /search — one URL, three search systems</text>
  <text x="40" y="60" font-size="13" fill="#6b7280">Not a single interface: a mode-router/façade over three heterogeneous backends (keyword · semantic · graph).</text>
  <text x="40" y="78" font-size="11" fill="#9ca3af">Verified 2026-05-24 by subagent sweep of chorus-search.ts / server.ts / lance-store.ts / sparql-search.ts / search-meta.ts + live du/curl/sqlite. Colour = on the event loop?</text>

  <!-- ROUTER -->
  <rect x="40" y="92" width="1160" height="52" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="60" y="115" font-size="15" font-weight="700" fill="#5b21b6">fetchSearch()  ·  GET /api/chorus/search?mode=…   (also backs GET /api/chorus/self)</text>
  <text x="60" y="133" font-size="12" fill="#6d28d9">chorus-api · :3340 · ONE Node event loop (the spine).  Routes by mode → fans to 1–3 of the systems below, merges with RRF.</text>

  <!-- mode mapping strip -->
  <text x="40" y="170" font-size="12" fill="#475569"><tspan font-weight="700">modes:</tspan>  fts/recency/relevance = keyword only  ·  semantic = vector only  ·  hybrid = keyword + vector (RRF)  ·  unified = all three (RRF)</text>

  <!-- ============ LANE 1: KEYWORD (sync) ============ -->
  <rect x="40" y="186" width="1160" height="118" rx="8" fill="#fffdf7" stroke="#d97706" stroke-width="1.5"/>
  <text x="56" y="208" font-size="14" font-weight="800" fill="#92400e">① KEYWORD</text>
  <text x="56" y="225" font-size="11" fill="#a16207">used by fts ·</text>
  <text x="56" y="239" font-size="11" fill="#a16207">hybrid · unified</text>

  <rect x="180" y="200" width="250" height="56" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="305" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">runFtsQuery()</text>
  <text x="305" y="240" text-anchor="middle" font-size="11" fill="#b91c1c">SYNC · better-sqlite3 · ON THE LOOP</text>

  <line x1="430" y1="228" x2="470" y2="228" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#a)"/>

  <rect x="472" y="194" width="712" height="100" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="488" y="215" font-size="14" font-weight="700" fill="#92400e">SQLite · FTS5  (messages_fts)</text>
  <text x="488" y="233" font-size="12" fill="#78350f">~/.chorus/index.db · <tspan font-weight="700">1.1 GB</tspan> · <tspan font-weight="700">1,262,416 messages</tspan></text>
  <text x="488" y="251" font-size="12" fill="#166534" font-weight="600">clean MATCH ≈ 0.29s (indexed)</text>
  <text x="488" y="270" font-size="12" fill="#b91c1c" font-weight="700">⚠ MATCH-syntax-error → content LIKE '%q%' full scan = 2–3.6s SYNC = whole-spine freeze</text>
  <text x="488" y="285" font-size="11" fill="#b91c1c">#3051: quote-sanitize the query so MATCH never throws → 2.08s → 0.027s, 33 rows vs 0</text>

  <!-- ============ LANE 2: SEMANTIC (async) ============ -->
  <rect x="40" y="312" width="1160" height="110" rx="8" fill="#f8fbff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="56" y="334" font-size="14" font-weight="800" fill="#1e3a8a">② SEMANTIC</text>
  <text x="56" y="351" font-size="11" fill="#1d4ed8">used by semantic ·</text>
  <text x="56" y="365" font-size="11" fill="#1d4ed8">hybrid · unified</text>

  <rect x="180" y="328" width="250" height="56" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="305" y="350" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">semanticSearch()</text>
  <text x="305" y="368" text-anchor="middle" font-size="11" fill="#1d4ed8">ASYNC · yields the loop</text>

  <line x1="430" y1="356" x2="470" y2="356" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#a)"/>

  <rect x="472" y="322" width="345" height="90" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="488" y="343" font-size="13" font-weight="700" fill="#5b21b6">Ollama (embed the query)</text>
  <text x="488" y="361" font-size="11.5" fill="#6d28d9">Bedroom 192.168.86.242:11434</text>
  <text x="488" y="377" font-size="11.5" fill="#6d28d9">nomic-embed-text · 768-dim</text>
  <text x="488" y="395" font-size="11.5" fill="#6d28d9" font-weight="600">async HTTP ≈ 5s — awaited, loop stays FREE</text>

  <line x1="817" y1="367" x2="857" y2="367" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#ap)"/>

  <rect x="859" y="322" width="325" height="90" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="875" y="343" font-size="13" font-weight="700" fill="#1e3a8a">LanceDB · vector index</text>
  <text x="875" y="361" font-size="11.5" fill="#1e40af">~/.chorus/lance · <tspan font-weight="700">21 GB</tspan> · 768-dim</text>
  <text x="875" y="378" font-size="11.5" fill="#1e40af">async (Rust addon, off-thread)</text>
  <text x="875" y="396" font-size="11" fill="#3b82f6">finds by meaning when words don't match</text>

  <!-- ============ LANE 3: GRAPH (async) ============ -->
  <rect x="40" y="430" width="1160" height="80" rx="8" fill="#f6fdf8" stroke="#16a34a" stroke-width="1.5"/>
  <text x="56" y="452" font-size="14" font-weight="800" fill="#166534">③ GRAPH</text>
  <text x="56" y="469" font-size="11" fill="#15803d">used by unified only</text>

  <rect x="180" y="442" width="250" height="52" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="305" y="463" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">sparqlSearch()</text>
  <text x="305" y="481" text-anchor="middle" font-size="11" fill="#15803d">ASYNC · yields the loop</text>

  <line x1="430" y1="468" x2="470" y2="468" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#a)"/>

  <rect x="472" y="440" width="712" height="56" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="488" y="461" font-size="14" font-weight="700" fill="#166534">Fuseki · SPARQL triple store</text>
  <text x="488" y="481" font-size="12" fill="#15803d">localhost:3030/pods/query · urn:gathering:* (+ urn:jb:ontology) · async HTTP</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#94a3b8"/></marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#7c3aed"/></marker>
  </defs>

  <!-- ============ event-loop callout ============ -->
  <rect x="40" y="528" width="1160" height="96" rx="8" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="60" y="552" font-size="14" font-weight="700" fill="#b91c1c">What actually blocks the spine (the single event loop)</text>
  <text x="60" y="573" font-size="12" fill="#7f1d1d"><tspan font-weight="700">SYNC, on the loop (sqlite/CPU):</tspan>  getDb (open) · addStaleHeader (watermark SELECT) · <tspan font-weight="700">runFtsQuery ← dominant</tspan> · buildSearchMeta (watermark agg) · mergeRRF (sort).</text>
  <text x="60" y="592" font-size="12" fill="#166534"><tspan font-weight="700">ASYNC, off the loop (yields):</tspan>  the Ollama embed (~5s) · the LanceDB query · the Fuseki fetch.  These never freeze the spine.</text>
  <text x="60" y="613" font-size="12" fill="#7f1d1d">The freeze everyone blamed on the 5s embedding was the synchronous keyword path — and only its LIKE-fallback scan, not the indexed MATCH.</text>

  <!-- ============ footer ============ -->
  <rect x="40" y="640" width="1160" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="60" y="666" font-size="14" font-weight="700" fill="#334155">Why this reads as "three endpoints," not one</text>
  <text x="60" y="688" font-size="12.5" fill="#475569">It is one HTTP route, but three independent search systems wearing it: different <tspan font-weight="700">query languages</tspan> (FTS5 MATCH · vector cosine · SPARQL),</text>
  <text x="60" y="706" font-size="12.5" fill="#475569">different <tspan font-weight="700">latency profiles</tspan> (sync ~0.3s · async ~5s · async ~0.5–2s), different <tspan font-weight="700">stores</tspan> (SQLite 1.1G · LanceDB 21G · Fuseki), different <tspan font-weight="700">failure modes</tspan>.</text>
  <text x="60" y="724" font-size="12.5" fill="#475569">They are unified only by the <tspan font-family="monospace">mode</tspan> param and an RRF merge step. hybrid = ①+②; unified = ①+②+③.</text>
  <text x="60" y="748" font-size="12.5" fill="#334155" font-weight="700">Corrected from the first draft (which trusted the stale April doc):</text>
  <text x="60" y="766" font-size="12" fill="#475569">index.db 512MB→<tspan font-weight="700">1.1G</tspan> · lance 2.3GB→<tspan font-weight="700">21G</tspan> · Ollama confirmed <tspan font-weight="700">Bedroom</tspan> (plist override, not the code default) · "only SQLite on the loop" → <tspan font-weight="700">several sync sqlite touches, FTS dominant</tspan>.</text>
  <text x="60" y="790" font-size="11" fill="#94a3b8">Open architectural question (Wren): three heterogeneous search systems behind one façade — is that the right shape, or should they be named/owned as three?</text>
  <text x="60" y="808" font-size="10.5" fill="#cbd5e1">Wren · validated by two Explore subagents against source + live stores · 2026-05-24</text>
</svg>
