  <line x1="40" y1="728" x2="1440" y2="728" stroke="#cbd5e1"/>

  <!-- findings band -->
  <text x="40" y="754" font-size="14" font-weight="800" fill="#334155">What the map settled</text>
  <text x="40" y="776" font-size="12" fill="#475569">• <tspan font-weight="700" fill="#b91c1c">Keep it on was right.</tspan> context_inject reads crawler rows + spine events + LanceDB on EVERY prompt; 4 alerts read its status/spine. Off would degrade all-role grounding + fire alerts.</text>
  <text x="40" y="797" font-size="12" fill="#475569">• <tspan font-weight="700" fill="#b91c1c">Jeff was right: the crawler DOES write the graph</tspan> (crawler-hydrate-graph.sh → chorus:File triples). My "only reads" was wrong — it's a separate script I'd missed.</text>
  <text x="40" y="818" font-size="12" fill="#475569">• <tspan font-weight="700" fill="#b91c1c">The waste = the traces table.</tspan> 108 rows/min, 144K of 301K total, and NO load-bearing consumer found. The thing we did without asking why. First to cut/sample (verify).</text>
  <text x="40" y="839" font-size="12" fill="#475569">• <tspan font-weight="700">Circular:</tspan> /crawl collectMentions READS messages → writes a crawler row → re-indexed → read again (#2323 "eating its own tail"). Blast-radius note for #3069.</text>
  <text x="40" y="860" font-size="12" fill="#475569">• <tspan font-weight="700">The flood was WatchPaths</tspan> (file-churn trigger), not StartInterval (correctly 1800/30min). Gated → safe, removes no data.</text>

  <!-- ownership note -->
  <rect x="40" y="884" width="1400" height="74" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="58" y="908" font-size="13" font-weight="800" fill="#5b21b6">Ownership: one monolith, four owners</text>
  <text x="58" y="929" font-size="12" fill="#5b21b6">Outputs span <tspan font-weight="700">Wren</tspan> (crawler messages, spine) · <tspan font-weight="700">Jeff</tspan> (graph/knowledge, LanceDB/search, reindex, watermarks) · <tspan font-weight="700">Kade</tspan> (chorus_files/code) · <tspan font-weight="700">Silas</tspan> (status, traces, alerts).</text>
  <text x="58" y="949" font-size="12" fill="#5b21b6">Decomposing (#3069) hands each output to its owner on its own cadence — and the map says which consumers each owner must preserve. The traces output (Silas, no consumer) is the one to question first.</text>
</svg>
