  <text x="40" y="38" font-size="22" font-weight="700" fill="#1a1a1a">Crawler pipeline — VERIFIED dependency map: writers → outputs → consumers (+ owners)</text>
  <text x="40" y="59" font-size="13" fill="#6b7280">From two subagent traces against the running system (#3071), not inference. The "one SQLite row" claim was wrong: 4 stores, ~10 outputs, multiple writers.</text>
  <text x="40" y="77" font-size="11" fill="#9ca3af">Owner color = the Athena-tree domain owner of each output. ● load-bearing (something breaks if it stops) · ○ no consumer found. Wren 2026-05-24.</text>

