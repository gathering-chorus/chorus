<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1010" viewBox="0 0 900 1010" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="900" height="1010" fill="#ffffff"/>
  <text x="450" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Werk Value Stream — the verbs ARE the build pipeline</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#64748b">/demo proves on the rebased werk · /acp lands by squash + content-verify · build-invariance is VERIFIED, never assumed</text>

  <!-- PULL -->
  <rect x="300" y="88" width="300" height="50" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">/pull → werk-pull</text>
  <text x="450" y="128" text-anchor="middle" font-size="12" fill="#1e40af">card Next/Later → WIP · fresh werk off origin/main</text>
  <line x1="450" y1="138" x2="450" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- WORK -->
  <rect x="320" y="162" width="260" height="36" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="450" y="185" text-anchor="middle" font-size="13" fill="#475569">build code + tests in the werk  (the work)</text>
  <line x1="450" y1="198" x2="450" y2="220" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- COMMIT -->
  <rect x="280" y="222" width="340" height="96" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="244" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">/commit → werk-commit</text>
  <text x="300" y="267" font-size="12.5" fill="#1e40af">① REBASE werk → current origin/main</text>
  <text x="300" y="286" font-size="12.5" fill="#1e40af">② pre-commit gate (tsc / jest / scoped lint, on the diff)</text>
  <text x="300" y="305" font-size="12.5" fill="#1e40af">③ commit the card's files</text>
  <rect x="628" y="236" width="158" height="46" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="707" y="254" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">STALE-BASE FIX</text>
  <text x="707" y="269" text-anchor="middle" font-size="10" fill="#991b1b">rebase-or-refuse · #3186</text>
  <text x="707" y="280" text-anchor="middle" font-size="8.5" fill="#b91c1c">(the real break: main moved → diff tree)</text>
  <line x1="628" y1="259" x2="620" y2="259" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="450" y1="318" x2="450" y2="340" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PUSH -->
  <rect x="320" y="342" width="260" height="42" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="368" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">/push → werk-push</text>
  <line x1="450" y1="384" x2="450" y2="406" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DEMO -->
  <rect x="120" y="408" width="660" height="132" rx="10" fill="#f1f5f9" stroke="#0ea5e9" stroke-width="2"/>
  <text x="140" y="432" font-size="16" font-weight="700" fill="#0c4a6e">/demo — PROVE on the rebased werk</text>
  <text x="430" y="432" font-size="12" fill="#0369a1" font-style="italic">never merge unproven code</text>
  <rect x="140" y="444" width="290" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="285" y="461" text-anchor="middle" font-size="12.5" font-weight="700" fill="#14532d">werk-build  (binary = f(tree))</text>
  <text x="285" y="477" text-anchor="middle" font-size="10.5" fill="#166534">all units by structure (#3132), hash each</text>
  <rect x="450" y="444" width="310" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="605" y="461" text-anchor="middle" font-size="12.5" font-weight="700" fill="#14532d">werk-deploy → WERK_&lt;ROLE&gt;_BIN</text>
  <text x="605" y="477" text-anchor="middle" font-size="10.5" fill="#166534">role slot: scoped, watched, others unaffected</text>
  <rect x="140" y="490" width="290" height="38" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="285" y="514" text-anchor="middle" font-size="12" fill="#713f12">verify running == built</text>
  <rect x="450" y="490" width="310" height="38" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="605" y="514" text-anchor="middle" font-size="12" fill="#713f12">5 gates + demo:preflight-pass evidence</text>
  <line x1="450" y1="540" x2="450" y2="562" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ACP -->
  <rect x="100" y="564" width="700" height="232" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="120" y="588" font-size="16" font-weight="700" fill="#4c1d95">/acp — LAND  (squash + content-verify)</text>
  <rect x="120" y="600" width="660" height="36" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="450" y="618" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4c1d95">werk-merge  ·  SQUASH &lt;role&gt;/&lt;card&gt; → main  <tspan font-weight="400" font-size="11">(one mechanism — kill the --merge/squash split)</tspan></text>
  <text x="450" y="631" text-anchor="middle" font-size="9.5" fill="#6d28d9">extracted FROM werk-accept · SHA differs but the TREE is identical, so the binary is unchanged</text>
  <line x1="450" y1="636" x2="450" y2="652" stroke="#7c3aed" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- content verify diamond -->
  <rect x="250" y="654" width="400" height="44" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6"/>
  <text x="450" y="673" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9a3412">POST-MERGE CONTENT-VERIFY</text>
  <text x="450" y="689" text-anchor="middle" font-size="10.5" fill="#c2410c">demo binary == build of main's current tree?  (never assume — verify)</text>
  <text x="246" y="711" font-size="10" font-weight="700" fill="#16a34a">YES</text>
  <line x1="280" y1="698" x2="280" y2="713" stroke="#16a34a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="628" y="711" font-size="10" font-weight="700" fill="#dc2626">NO</text>
  <line x1="620" y1="698" x2="620" y2="713" stroke="#dc2626" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- YES promote -->
  <rect x="120" y="714" width="320" height="42" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.3"/>
  <text x="280" y="731" text-anchor="middle" font-size="11.5" font-weight="700" fill="#14532d">YES (common) → PROMOTE demo binary</text>
  <text x="280" y="747" text-anchor="middle" font-size="10" fill="#166534">role-slot → CHORUS_BIN ~/.chorus/bin · NO rebuild</text>
  <!-- NO rebuild -->
  <rect x="460" y="714" width="320" height="42" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.3"/>
  <text x="620" y="731" text-anchor="middle" font-size="11.5" font-weight="700" fill="#991b1b">NO (peer touched units) → REBUILD</text>
  <text x="620" y="747" text-anchor="middle" font-size="10" fill="#b91c1c">from main → deploy CHORUS_BIN (rare)</text>
  <rect x="120" y="760" width="660" height="30" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="450" y="780" text-anchor="middle" font-size="11.5" font-weight="700" fill="#4c1d95">werk-accept · FINALIZE ONLY (no git): cards-done → Done + card.accepted → werk-remove</text>
  <line x1="450" y1="796" x2="450" y2="818" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DONE -->
  <rect x="320" y="820" width="260" height="46" rx="8" fill="#16a34a"/>
  <text x="450" y="841" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">DONE</text>
  <text x="450" y="858" text-anchor="middle" font-size="11" fill="#dcfce7">accepted == live (deployed == main, verified by content)</text>

  <!-- PRINCIPLES -->
  <rect x="120" y="888" width="660" height="98" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="135" y="908" font-size="13" font-weight="700" fill="#14532d">The two things that make it sound (one disease — operate on a stale base — killed on both surfaces):</text>
  <text x="135" y="929" font-size="11.5" fill="#166534">• binary = f(source TREE), not the commit SHA → squash vs --merge is irrelevant to the artifact; standardize on squash for clean history.</text>
  <text x="135" y="947" font-size="11.5" fill="#166534">• STALE BASE is the only real break: (a) commit-time — werk-commit rebases to current main (#3186); (b) commit→merge window —</text>
  <text x="150" y="963" font-size="11.5" fill="#166534">post-merge content-verify catches a peer who touched your units → promote on match, rebuild on divergence.</text>
  <text x="135" y="980" font-size="10.5" fill="#15803d" font-style="italic">build-invariance is VERIFIED post-merge by content, never assumed. (corrects my earlier squash-breaks-it claim — refuted by Silas: I verified by SHA, not content.)</text>
</svg>
