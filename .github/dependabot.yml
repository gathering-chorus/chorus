# Dependabot — monthly lock-update PRs (cost-stop 2026-04-29).
#
# Per ADR-026 §c: lock files are committed for reproducibility; updates are
# managed through reviewed PRs rather than ad-hoc `npm install` runs.
#
# 2026-04-29 cadence cut: weekly→monthly + 3→1 PR/ecosystem cap. Driver:
# 11 ecosystems × 3 PRs/week = ~33 PR/week potential flood. Companion to the
# CI cost-stop on quality.yml (per-branch CI suspended). Even with CI not
# running on PRs, an open-PR backlog burns review-attention.
#
# Card #2481 sub-AC 2 (origin).

version: 2
updates:
  # Root workspace + per-package npm directories. Each ecosystem-directory
  # pair runs independently; one PR per package per week max.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 1
    labels: [deps, npm]
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: npm
    directory: /directing/clearing
    schedule: { interval: monthly, day: monday }
    open-pull-requests-limit: 1
    labels: [deps, npm]
    commit-message: { prefix: deps, include: scope }

  - package-ecosystem: npm
    directory: /directing/products/cards
    schedule: { interval: monthly, day: monday }
    open-pull-requests-limit: 1
    labels: [deps, npm]
    commit-message: { prefix: deps, include: scope }

  - package-ecosystem: npm
    directory: /platform/api
    schedule: { interval: monthly, day: monday }
    open-pull-requests-limit: 1
    labels: [deps, npm]
    commit-message: { prefix: deps, include: scope }

  - package-ecosystem: npm
    directory: /platform/chorus-sdk
    schedule: { interval: monthly, day: monday }
    open-pull-requests-limit: 1
    labels: [deps, npm]
    commit-message: { prefix: deps, include: scope }

  - package-ecosystem: npm
    directory: /platform/pulse
    schedule: { interval: monthly, day: monday }
    open-pull-requests-limit: 1
    labels: [deps, npm]
    commit-message: { prefix: deps, include: scope }

  - package-ecosystem: npm
    directory: /platform/tests
    schedule: { interval: monthly, day: monday }
    open-pull-requests-limit: 1
    labels: [deps, npm]
    commit-message: { prefix: deps, include: scope }

  - package-ecosystem: npm
    directory: /platform/workflow-engine
    schedule: { interval: monthly, day: monday }
    open-pull-requests-limit: 1
    labels: [deps, npm]
    commit-message: { prefix: deps, include: scope }

  # Cargo crates
  - package-ecosystem: cargo
    directory: /platform/services/chorus-hooks
    schedule: { interval: monthly, day: monday }
    open-pull-requests-limit: 1
    labels: [deps, cargo]
    commit-message: { prefix: deps, include: scope }

  - package-ecosystem: cargo
    directory: /platform/services/chorus-inject
    schedule: { interval: monthly, day: monday }
    open-pull-requests-limit: 1
    labels: [deps, cargo]
    commit-message: { prefix: deps, include: scope }

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: monthly, day: monday }
    open-pull-requests-limit: 1
    labels: [deps, ci]
    commit-message: { prefix: deps, include: scope }
