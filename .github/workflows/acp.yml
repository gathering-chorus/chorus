name: acp

# acp orchestrator — the LAND half of the werk pipeline. #3236.
#
# ONE orchestrator (act), ONE toolchain (MCP). Decided 2026-06-04 (Jeff). This file
# replaces BOTH the old direct-binary acp.yml AND the bash werk-mcp.sh acp steps —
# collapsing the two-orchestrator drift where a fix in one path (e.g. #3234
# stop-before-accept) silently left the other bugged. Every verb runs THROUGH MCP via
# chorus-mcp-call.sh (the single toolchain); act only sequences + makes each step a
# legible GitHub line.
#
# The PROVE half (commit→push→build→deploy-werk→env-up→demo) is demo.yml. acp.yml
# assumes demo.yml has already committed + pushed the card's branch; it lands it:
#   werk-merge → 5.5 canonical ff-sync → chorus_deploy target=canonical → STOP.
#
# It STOPS before accept (#3234, DEC-048): a builder's workflow must not auto-fire
# werk-accept — the human-accept gate cannot be satisfied by an agent's script
# (house-always-wins). The work is landed + live; ACCEPT is the accepter's deliberate
# act. The workflow prints the exact command.

on:
  workflow_dispatch:
    inputs:
      card_id:
        description: "Card # being landed (e.g. 3236). The trace key end-to-end."
        required: true
        type: string
      role:
        description: "Builder role whose werk is being landed (kade / silas / wren)."
        required: true
        type: string
      accepter:
        description: "Authorizing identity (jeff / wren) for the PRINTED accept command (DEC-048). Not auto-run."
        required: true
        type: string

jobs:
  acp:
    runs-on: macos-latest

    # CHORUS_HOME / CHORUS_WERK_BASE / PATH (incl. platform/scripts + ~/.chorus/bin)
    # are inherited from the parent shell (chorus-env-setup.sh). The workflow MUST NOT
    # hardcode them — tests override per-test, and a hardcoded prod path collided with
    # the integration tests' temp werk-base once (caught, never again).
    env:
      CARD_ID: ${{ inputs.card_id }}
      ROLE: ${{ inputs.role }}
      ACCEPTER: ${{ inputs.accepter }}

    steps:
      - name: shared-trace
        # Mint ONE trace, propagate via $GITHUB_ENV so every later step (and every verb
        # subprocess the MCP server spawns) inherits CHORUS_TRACE_ID. Seed the
        # orchestrator witness (best-effort; a non-writable logs dir never breaks the run).
        run: |
          trace="$(date +%s%N)-$$"
          echo "CHORUS_TRACE_ID=$trace" >> "$GITHUB_ENV"
          echo "minted trace=$trace for card=#${CARD_ID} role=${ROLE} accepter=${ACCEPTER}"
          mkdir -p "${CHORUS_HOME}/ops/logs" 2>/dev/null || true
          ts=$(date +%s%3N)
          printf '{"ts":%s,"event":"acp.started","card_id":%s,"role":"%s","accepter":"%s","trace_id":"%s"}\n' \
            "$ts" "${CARD_ID}" "${ROLE}" "${ACCEPTER}" "$trace" \
            >> "${CHORUS_HOME}/ops/logs/werk-acp.jsonl" 2>/dev/null || true

      - name: merge
        # werk-merge (#3175), via MCP. Resolves the OPEN PR for the current HEAD oid (NOT
        # the branch name — retires the stale-PR false-green), squash-merges, and
        # content-verifies the merge landed on origin/main. Assumes demo.yml pushed the
        # branch; if nothing is pushed, this refuses (correct).
        run: chorus-mcp-call.sh "${ROLE}" werk-merge "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: sync-canonical
        # 5.5 (#3234) — after merge, ff-sync canonical to origin/main so SCRIPT-only
        # changes go LIVE with zero manual steps. Scripts are executables too: a
        # script-only card (no service crate) merges but stays stale in canonical until a
        # manual sync — the merged≠live lie for .sh as much as for binaries. deploy-prod
        # (next) handles crate binaries; this makes canonical == origin/main immediately.
        # SYNC_OK crosses to the landed step via $GITHUB_ENV to gate the "live" claim.
        run: |
          if [ -n "${CHORUS_HOME:-}" ] \
             && git -C "$CHORUS_HOME" fetch -q origin main 2>/dev/null \
             && git -C "$CHORUS_HOME" merge --ff-only origin/main >/dev/null 2>&1; then
            echo "   [ok] 5.5 canonical ff-synced to origin/main"
            echo "SYNC_OK=1" >> "$GITHUB_ENV"
          else
            echo "   [warn] 5.5 canonical NOT ff-synced (unset/diverged/dirty) — run 'chorus-werk-sync recover'" >&2
            echo "SYNC_OK=0" >> "$GITHUB_ENV"
          fi

      - name: deploy-prod
        # chorus_deploy target=canonical, via MCP. SELF-BUILDS from canonical@origin/main
        # (#3222: werk-deploy → werk-build --target canonical --only <card crates>, then
        # chorus-deploy per crate). Prod binaries are structurally a build of MAIN, not
        # the werk — the merged≠live root is closed for crates.
        run: chorus-mcp-call.sh "${ROLE}" chorus_deploy "$(printf '{"role":"%s","card_id":%s,"target":"canonical"}' "${ROLE}" "${CARD_ID}")"

      - name: landed
        # STOP-BEFORE-ACCEPT (#3234, DEC-048). Tell the truth: the "live" claim is
        # CONDITIONAL on 5.5 (SYNC_OK). Then print the accept command for the human —
        # the workflow does NOT run werk-accept. Accept is the accepter's deliberate act.
        run: |
          if [ "${SYNC_OK:-0}" = "1" ]; then
            echo "[landed] #${CARD_ID} built-of-main, deployed + LIVE (merge + deploy green). NOT yet accepted."
          else
            echo "[merged, NOT yet live] #${CARD_ID} merged + deployed, but canonical did NOT ff-sync — script changes are STALE in prod. Run 'chorus-werk-sync recover' to make them live BEFORE accept." >&2
          fi
          echo "  Accept is yours (DEC-048) — judge the work, then run it yourself:"
          echo "    DEPLOY_ROLE=${ACCEPTER} werk-accept ${CARD_ID} ${ROLE}"

      # --- orchestrator-side witness close (pairs with acp.started) ---
      - name: acp-completed
        if: success()
        run: |
          ts=$(date +%s%3N)
          printf '{"ts":%s,"event":"acp.landed","card_id":%s,"role":"%s","accepter":"%s","trace_id":"%s","status":"success","sync_ok":"%s"}\n' \
            "$ts" "${CARD_ID}" "${ROLE}" "${ACCEPTER}" "${CHORUS_TRACE_ID}" "${SYNC_OK:-0}" \
            >> "${CHORUS_HOME}/ops/logs/werk-acp.jsonl" 2>/dev/null || true

      - name: acp-failed
        if: failure()
        run: |
          ts=$(date +%s%3N)
          printf '{"ts":%s,"event":"acp.failed","card_id":%s,"role":"%s","accepter":"%s","trace_id":"%s","status":"failed"}\n' \
            "$ts" "${CARD_ID}" "${ROLE}" "${ACCEPTER}" "${CHORUS_TRACE_ID}" \
            >> "${CHORUS_HOME}/ops/logs/werk-acp.jsonl" 2>/dev/null || true

# Stop-on-failure: GHA default — steps run in order, the job halts on first non-zero
# exit. A merge failure prevents sync/deploy; nothing half-lands. Accept never runs here
# at all (it's the human's, post-run). Each verb still runs its OWN all-or-nothing
# rollback internally via MCP; the workflow just stops sequencing.
