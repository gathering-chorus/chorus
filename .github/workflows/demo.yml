name: demo

# demo orchestrator — the PROVE half of the werk pipeline. #3236.
#
# ONE orchestrator (act), ONE toolchain (MCP). Decided 2026-06-04 (Jeff). Sibling of
# acp.yml (the LAND half). This replaces the demo steps of bash werk-mcp.sh: prove the
# change in the builder's slot, never touching main. Every verb runs THROUGH MCP via
# chorus-mcp-call.sh; act sequences + makes each step a legible GitHub line.
#
# Sequence (werk-mcp.sh steps 1–4.5):
#   werk-commit → werk-push → chorus_build → chorus_deploy target=werk → chorus_env_up
#   → werk-demo (the #3116 proving ceremony, run as the binary against the env-up'd slot)
#
# rebase is NOT a step here: werk-commit rebases the werk onto origin/main atomically
# under flock (#3186). A standalone `git rebase` step would race that lock.

on:
  workflow_dispatch:
    inputs:
      card_id:
        description: "Card # being proven (e.g. 3236). The trace key end-to-end."
        required: true
        type: string
      role:
        description: "Builder role whose werk is being proven (kade / silas / wren)."
        required: true
        type: string

jobs:
  demo:
    runs-on: macos-latest

    # CHORUS_HOME / CHORUS_WERK_BASE / PATH inherited from the parent shell
    # (chorus-env-setup.sh). The workflow MUST NOT hardcode them.
    env:
      CARD_ID: ${{ inputs.card_id }}
      ROLE: ${{ inputs.role }}

    steps:
      - name: shared-trace
        run: |
          trace="$(date +%s%N)-$$"
          echo "CHORUS_TRACE_ID=$trace" >> "$GITHUB_ENV"
          echo "minted trace=$trace for card=#${CARD_ID} role=${ROLE}"
          mkdir -p "${CHORUS_HOME}/ops/logs" 2>/dev/null || true
          ts=$(date +%s%3N)
          printf '{"ts":%s,"event":"demo.started","card_id":%s,"role":"%s","trace_id":"%s"}\n' \
            "$ts" "${CARD_ID}" "${ROLE}" "$trace" \
            >> "${CHORUS_HOME}/ops/logs/werk-demo.jsonl" 2>/dev/null || true

      - name: commit
        # werk-commit, via MCP. Stages add-A in the card's ephemeral werk and commits
        # with the sanctioned-committer sentinel. Rebase onto origin/main happens INSIDE
        # commit, atomically under flock (#3186) — no separate rebase step.
        run: chorus-mcp-call.sh "${ROLE}" werk-commit "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: push
        # werk-push, via MCP. Pushes <role>/<card> to origin through the sanctioned
        # pre-push path; carries the gh chorus/push/<card> status.
        run: chorus-mcp-call.sh "${ROLE}" werk-push "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: build-demo
        # chorus_build, via MCP. Builds the card's crate(s) for the demo (werk variant).
        run: chorus-mcp-call.sh "${ROLE}" chorus_build "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: deploy-demo
        # chorus_deploy target=werk, via MCP. Installs to the per-card slot for the demo
        # (NOT canonical — this is the prove half, main is untouched).
        run: chorus-mcp-call.sh "${ROLE}" chorus_deploy "$(printf '{"role":"%s","card_id":%s,"target":"werk"}' "${ROLE}" "${CARD_ID}")"

      - name: env-up
        # chorus_env_up, via MCP. Stands up the running test instance the demo points at.
        run: chorus-mcp-call.sh "${ROLE}" chorus_env_up "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: demo
        # werk-demo (#3116) — the PROVING CEREMONY against the instance env-up just stood
        # up: present → gate (the /demo skill's subagents) → feedback gather → verdict.
        # Run as the binary (the /demo skill's path; a chorus_demo MCP wrapper is the
        # consistency follow-on). Emits demo.verdict. If it fails, the job stops — acp.yml
        # never runs for an unproven card.
        run: DEPLOY_ROLE="${ROLE}" werk-demo "${CARD_ID}"

      - name: demo-completed
        if: success()
        run: |
          ts=$(date +%s%3N)
          printf '{"ts":%s,"event":"demo.completed","card_id":%s,"role":"%s","trace_id":"%s","status":"success"}\n' \
            "$ts" "${CARD_ID}" "${ROLE}" "${CHORUS_TRACE_ID}" \
            >> "${CHORUS_HOME}/ops/logs/werk-demo.jsonl" 2>/dev/null || true

      - name: demo-failed
        if: failure()
        run: |
          ts=$(date +%s%3N)
          printf '{"ts":%s,"event":"demo.failed","card_id":%s,"role":"%s","trace_id":"%s","status":"failed"}\n' \
            "$ts" "${CARD_ID}" "${ROLE}" "${CHORUS_TRACE_ID}" \
            >> "${CHORUS_HOME}/ops/logs/werk-demo.jsonl" 2>/dev/null || true

# Stop-on-failure: GHA default. A commit/push/build/deploy/env-up failure prevents the
# demo; a demo failure stops the job → acp.yml is never dispatched for an unproven card.
