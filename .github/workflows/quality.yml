name: quality

# CI-side authoritative quality checks for the chorus repo.
# Pre-commit hooks catch the honest case locally; this workflow closes
# the `git commit --no-verify` bypass by running the same checks on every
# PR to main and every push to main. Card #2481.
#
# Job structure: one job per check, room to grow alongside lint-ratchet
# (future: type-check, doc-coherence-ratchet, etc.).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-ratchet:
    name: lint ratchet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint ratchet
        run: npm run lint:ratchet
