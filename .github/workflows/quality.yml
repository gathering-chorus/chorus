name: quality

# CI-side authoritative quality checks for the chorus repo.
# Pre-commit hooks catch the honest case locally; this workflow closes
# the `git commit --no-verify` bypass by running the same checks on every
# PR to main and every push to main.
#
# Implements ADR-026 §b CI(target) column. One job per logical check —
# failures point at exactly one concern. npm ci against committed locks
# (#2481 sub-AC 1) closes the local↔CI divergence that fired on first run.
#
# REQUIRED-CHECKS POLICY — DEC-2525 (Phase 1 disconnect, #2526):
# Per DEC-2525, only two jobs are branch-protection required:
#   1. unit-tests (jest, hermetic — *.integration.test.ts excluded by jest
#      config per #2524 convention)
#   2. cargo-test (--lib --bins, inline #[test] only — see job comment)
# Every other job runs but uses continue-on-error: true so its failure
# does not block merge. The signal still surfaces (job-level red on the
# check), but it does not gate.
#
# Per-event matrix (#2526 wave 3):
#   on push/PR: required jobs (jest + cargo-test) + small per-PR backstops
#               (mcp-description-shape, catalog-oversize, principle-direct-edit)
#   on schedule (nightly 09:17 UTC): everything, including the heavy
#               non-required jobs (lint-ratchet, type-check matrix,
#               cargo-test-integration, clippy matrix, mcp-roundtrip).
#
# Why wave 3: post-wave-2, non-required jobs still ran on every PR push and
# were burning Actions minutes. We hit 90% of the 3000-min monthly quota at
# wave 2 land (2026-04-28). Nightly drift visibility is sufficient; per-PR
# signal on non-required jobs trained --no-verify habits, not engineering
# hygiene. Until the dedicated drift lane workflow (#2527) ships, the
# schedule trigger in this file IS the drift lane.
#
# Adding a check to the required list requires a DEC update per DEC-2525
# enforcement clause.
#
# Cards: #2481 (workflow origin), #2526 (this disconnect, waves 1-4), #2527
# (future dedicated drift workflow), DEC-2525.

on:
  # COST STOP (2026-04-29): per-branch CI suspended. Continues #2526 wave
  # progression (waves 1-4 narrowed the surface; this is "wave 5" — disconnect
  # the on-PR/on-push triggers entirely).
  #
  # Driver: GHA spend $15/48hr ($225/mo projected), Jeff named unsustainable.
  # Architect call: ADR-026 layer 3 demoted from "blocks merge" to "schedule-
  # only nightly drift detection" — accepts ~24hr detection latency for ~$0/mo
  # cost. Local-protocol guards (pre-commit hooks, #2580 branch-check,
  # #2598 deploy-from-main, #2571 chorus-env-setup) remain authoritative for
  # the same check classes locally.
  #
  # Re-enable path: uncomment the `push:`/`pull_request:` blocks below if the
  # trade reverses (cheaper runners, narrower matrix, more contributors).
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  schedule:
    - cron: '17 9 * * *'  # 09:17 UTC daily — off-peak, off-:00
  workflow_dispatch:  # manual trigger remains for ad-hoc verification

jobs:
  lint-ratchet:
    name: ESLint per-rule ratchet
    runs-on: ubuntu-latest
    # #3429: ENFORCED on the nightly — mirrors clippy-ratchet (below). The
    # per-rule baseline reached green 2026-06-15 (was +134 over baseline, the
    # accretion that the signal-only mode let slide). To keep it green, a
    # regression now turns this job RED on the nightly drift run, which fires
    # ci-main-red → Silas for triage — same enforcement tier as clippy-ratchet.
    # NO continue-on-error (job or step). Schedule-only is retained per the
    # cost-stop (per-PR CI is disconnected, see `on:` above); this is "required"
    # in the only form the cost-stop allows. Promoting to a branch-protection
    # required check (blocks PR merge) needs per-PR CI revived + a DEC-2525
    # update per the policy clause above — a separate, costed decision.
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Type-aware ESLint rules (no-floating-promises et al.) need every
      # subpackage's deps installed for type resolution. Without per-package
      # node_modules, the type analyzer mis-fires false positives. Install
      # all 7 active TS packages + root before linting.
      - name: Install (root)
        run: npm ci --no-audit --no-fund
      - name: Install (subpackages)
        run: |
          for pkg in directing/clearing directing/products/cards platform/api platform/chorus-sdk platform/pulse platform/tests platform/workflow-engine; do
            (cd "$pkg" && npm ci --no-audit --no-fund)
          done
      - name: Run lint ratchet
        # #3429: no continue-on-error — a non-zero exit now fails the job
        # (red nightly → ci-main-red alert), matching clippy-ratchet.
        run: npm run lint:ratchet

  type-check:
    name: tsc — ${{ matrix.package }}
    runs-on: ubuntu-latest
    # DEC-2525: non-required, signal-only post-disconnect (#2526).
    # Wave 3: schedule-only — 7-runner matrix is a top burner.
    if: github.event_name == 'schedule'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        package:
          - directing/clearing
          - directing/products/cards
          - platform/api
          - platform/chorus-sdk
          - platform/pulse
          - platform/tests
          - platform/workflow-engine
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Cross-package pre-build for cards (mirrors unit-tests job):
      # cards' tsc resolves 'chorus-sdk' + workflow-engine — those need dist.
      # #2504 (a): pre-build was missing on tsc job; added here. Sunset via
      # ADR-026 §c (#2486 npm workspaces).
      - name: Pre-build chorus-sdk (cards only)
        if: matrix.package == 'directing/products/cards'
        working-directory: platform/chorus-sdk
        run: |
          npm ci --no-audit --no-fund
          npm run build
      - name: Pre-build workflow-engine (cards only)
        if: matrix.package == 'directing/products/cards'
        working-directory: platform/workflow-engine
        run: |
          npm ci --no-audit --no-fund
          npm run build
      - name: Install (npm ci)
        working-directory: ${{ matrix.package }}
        run: npm ci --no-audit --no-fund
      - name: Type-check
        working-directory: ${{ matrix.package }}
        run: npx tsc --noEmit

  unit-tests:
    name: jest — ${{ matrix.package }}
    runs-on: ubuntu-latest
    # #3528 — the app-side CHORUS_ROOT (chorus-paths.ts) is a module-load const
    # that binds to os.homedir()/CascadeProjects/chorus when this env is unset.
    # Tests that set process.env.CHORUS_ROOT at runtime can't override it (already
    # bound at import), so athena-tree's loadTree read tree.json from the homedir
    # default → ENOENT in CI. The cargo jobs already set this; the jest job didn't.
    # Point it at the checkout so committed fixtures (data/athena/tree.json) resolve.
    env:
      CHORUS_ROOT: ${{ github.workspace }}
    # DEC-2525 REQUIRED CHECK #1 — hermetic jest only.
    # The *.integration.test.ts suffix is excluded by per-package jest
    # configs (#2524 convention). Adding a required check here requires
    # a DEC-2525 update.
    strategy:
      fail-fast: false
      matrix:
        package:
          - directing/clearing
          - directing/products/cards
          - platform/api
          - platform/chorus-sdk
          - platform/pulse
          - platform/tests
          - platform/workflow-engine
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Cross-package pre-build for cards: src/events.ts imports 'chorus-sdk'
      # (file: dep needs dist), src/sdk.ts requires '../../../../platform/
      # workflow-engine/dist/engine'. Both must be built before cards jest.
      # Tracked: workspaces conversion card (ADR-026 §c Future) supersedes
      # this bridge once npm workspaces lands.
      - name: Pre-build chorus-sdk (cards only)
        if: matrix.package == 'directing/products/cards'
        working-directory: platform/chorus-sdk
        run: |
          npm ci --no-audit --no-fund
          npm run build
      - name: Pre-build workflow-engine (cards only)
        if: matrix.package == 'directing/products/cards'
        working-directory: platform/workflow-engine
        run: |
          npm ci --no-audit --no-fund
          npm run build
      - name: Install (npm ci)
        working-directory: ${{ matrix.package }}
        run: npm ci --no-audit --no-fund
      # #2504 (a): cards tests invoke ./dist/cli.js; build it before jest.
      - name: Build cards dist (jest needs ./dist/cli.js)
        if: matrix.package == 'directing/products/cards'
        working-directory: directing/products/cards
        run: npm run build
      - name: Run jest (shuffled — #2532)
        working-directory: ${{ matrix.package }}
        # --randomize shuffles test order within each file. Surfaces order-dependent
        # tests (hermeticity rule 5 — order-independent). Available in jest 30+.
        # See /docs/designing/test-categorization.html.
        run: npx jest --forceExit --passWithNoTests --randomize

  mcp-description-shape:
    name: MCP tool description shape (#2475)
    runs-on: ubuntu-latest
    # DEC-2525: non-required, signal-only post-disconnect (#2526).
    # Wave 3: keeps running per-PR — tiny job (<30s), small protective
    # value when MCP tools change; no minute pressure.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run shape lint
        run: node platform/scripts/mcp-tool-description-lint.js

  catalog-oversize:
    name: Catalog oversize backstop (#2461)
    runs-on: ubuntu-latest
    # DEC-2525: non-required, signal-only post-disconnect (#2526).
    # Pre-commit still blocks locally; CI surfaces the signal but does
    # not gate merge (#2461 push-bloat protection lives at pre-commit).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            git diff --name-only --diff-filter=ACMR "$base" "$head" > /tmp/changed.txt
          else
            git diff --name-only --diff-filter=ACMR HEAD~1 HEAD > /tmp/changed.txt
          fi
      - name: Run backstop
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: cat /tmp/changed.txt | bash platform/scripts/check-catalog-oversize.sh

  principle-direct-edit:
    name: Principle direct-edit backstop (#2314)
    runs-on: ubuntu-latest
    # DEC-2525: non-required, signal-only post-disconnect (#2526).
    # Pre-commit still blocks locally; CI surfaces the signal only.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            git diff --name-only --diff-filter=ACMR "$base" "$head" > /tmp/changed.txt
          else
            git diff --name-only --diff-filter=ACMR HEAD~1 HEAD > /tmp/changed.txt
          fi
      - name: Run backstop
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: cat /tmp/changed.txt | bash platform/scripts/check-principle-direct-edit.sh

  chorus-inject-spawn-sites:
    name: chorus-inject single drain (#2820, replaces #2283)
    runs-on: ubuntu-latest
    # Replacement for retired tests/nudge_single_drain.rs source-gate.
    # Asserts the canonical chorus-inject spawn site is unique
    # (platform/pulse/src/service.ts). Adding new spawn sites silently
    # re-introduces the duplicate-delivery class; this gate fails the
    # build with a message naming #2283 + the offending file.
    steps:
      - uses: actions/checkout@v6
      - name: Run grep-gate
        run: bash platform/scripts/test-chorus-inject-spawn-sites.sh

  cargo-test:
    name: cargo test — ${{ matrix.crate }}
    runs-on: ubuntu-latest
    # DEC-2525 REQUIRED CHECK #2 — hermetic cargo only.
    # Runs the full hermetic surface per DEC-2525 strict text:
    #   - `--lib --bins`: inline #[test] in src/ (hermetic by construction)
    #   - `--test 'hermetic_*'`: tests/hermetic_*.rs files matching the
    #     #2524 prefix convention (integration-tier files that are
    #     hermetic on axes 1–4, addressable by name)
    # Wave 4 closes the gap wave 2 left open. tests/*.rs without the
    # prefix remain in cargo-test-integration (continue-on-error).
    # Each crate has at least one tests/hermetic_*.rs file as the seed:
    #   - chorus-hooks: tests/hermetic_chorus_root_env.rs
    #   - chorus-inject: tests/hermetic_runner_dispatch.rs
    # If a seed is removed without replacement, the glob errors and the
    # required check goes red — that's the intended invariant.
    strategy:
      fail-fast: false
      matrix:
        crate:
          - platform/services/chorus-hooks
          - platform/services/chorus-inject
    env:
      CHORUS_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.crate }}
      - name: Run cargo test (--lib --bins + --test 'hermetic_*' — DEC-2525)
        working-directory: ${{ matrix.crate }}
        run: cargo test --lib --bins --test 'hermetic_*'

  cargo-test-verbs:
    name: cargo test verbs — ${{ matrix.crate }}
    runs-on: ubuntu-latest
    # #3324 (closes the #3229 class) — the werk verb crates' FULL suites run on
    # every PR. Their units.rs + e2e.rs are hermetic by construction (real git on
    # temp repos, gh/launchctl/codesign/cards PATH-shimmed, no network) — verified
    # by the #3324 audit — so they run in the required tier without the hermetic_*
    # rename churn. A red verb test blocks merge: the verbs are the land path,
    # and werk-build's e2e once rode main RED undetected (#3229).
    # #3373: owl-api joins the matrix — it's the fan-out's generator/serving
    # engine and its suite (ilities/observability/cors) is pure-function
    # hermetic; before this it ran in NO CI job (cold-eyes catch).
    strategy:
      fail-fast: false
      matrix:
        crate:
          - platform/services/owl-api
          - platform/services/werk-pull
          - platform/services/werk-commit
          - platform/services/werk-push
          - platform/services/werk-merge
          - platform/services/werk-accept
          - platform/services/werk-demo
          - platform/services/werk-build
          - platform/services/werk-deploy
          - platform/services/werk-sync
          - platform/services/werk-unpull
    env:
      CHORUS_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.crate }}
      - name: Run cargo test (full suite — hermetic by construction)
        working-directory: ${{ matrix.crate }}
        run: cargo test

  cargo-test-integration:
    name: cargo test integration — ${{ matrix.crate }}
    runs-on: ubuntu-latest
    # DEC-2525: non-required, signal-only post-disconnect (#2526).
    # Wave 3: schedule-only — heaviest job in the workflow (builds two
    # release binaries + boots socket server + runs full integration
    # suite). Top burner. Nightly is plenty for drift detection.
    # #3528 — also workflow_dispatch so CI-env fixes (shim PATH) are verifiable
    # on-demand instead of waiting a nightly.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        crate:
          - platform/services/chorus-hooks
          - platform/services/chorus-inject
    env:
      # Tests in shared/protocol_contract.rs and chorus_log.rs read paths
      # via shared::state_paths::chorus_root() which falls back to the
      # local /Users/... path. CI must override to the runner workspace.
      CHORUS_ROOT: ${{ github.workspace }}
      # #2614: integration-tier tests gated by skip_unless_integration() need
      # RUN_INTEGRATION=1 to actually run. Without this, after #2614 wave 1-4
      # lands the job becomes a no-op-on-default-skip and kills the nightly
      # drift signal. CI containers are isolated from any live daemon, so the
      # axis-4 race the gate protects against doesn't apply here — explicit opt-in.
      RUN_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.crate }}
      - name: Ensure runtime dirs
        # platform/logs/ is checked in via platform/logs/.gitignore so the dir
        # exists on every checkout. /tmp/* dirs still need creation since
        # they're outside the workspace.
        run: mkdir -p /tmp/claude-team-scan /tmp/voice-inbox /tmp/chorus-chat
      # Symlink step retired by #2505 — all 28 test files now read paths via
      # chorus_root() (chorus_hooks::shared::state_paths::chorus_root for
      # chorus-hooks tests; inline helper for chorus-inject) which respects
      # CHORUS_ROOT env. No more out-of-tree symlink to /Users/jeffbridwell.
      - name: Build chorus-inject release binary (chorus-hooks crate only)
        # tests/inject_binary_test.rs + tests/inject_uses_binary.rs (3 tests)
        # assert that the chorus-inject release binary exists at the
        # symlink-resolved path. The cargo-test job builds chorus-hooks but
        # not chorus-inject; build it explicitly here. #2504.
        if: matrix.crate == 'platform/services/chorus-hooks'
        working-directory: platform/services/chorus-inject
        run: cargo build --release --bin chorus-inject
      - name: Start chorus-hooks server (chorus-hooks crate only)
        # 16 chorus-hooks test files use the shim → /tmp/chorus-hooks.sock →
        # server pattern. On Mac the server runs as a launchctl LaunchAgent;
        # on CI we boot it manually so tests get real allow/deny responses
        # instead of the fail-open empty stdout that breaks assertions.
        # bash -e is intentionally NOT used here because nohup + & under -e
        # can swallow upstream failures silently. Use explicit error checks.
        if: matrix.crate == 'platform/services/chorus-hooks'
        working-directory: platform/services/chorus-hooks
        shell: bash
        run: |
          set -x
          cargo build --release --bin chorus-hooks
          # #2505 follow-up: chorus-hook-shim release binary is what
          # platform/scripts/chorus-log (bash wrapper) execs. Tests like
          # nudge_origin_tag rely on the chorus_log path firing through
          # the wrapper into the release binary; missing binary → wrapper
          # exits "not found" → empty spine log → assertion fails.
          cargo build --release --bin chorus-hook-shim
          # #3528 — put the just-built shim on PATH so the chorus-log wrapper
          # resolves it (command -v chorus-hook-shim). Without this it built but
          # wasn't found → wrapper "not found" → empty spine log → override-emit
          # assertion failed. GITHUB_PATH applies to subsequent (test) steps.
          echo "${GITHUB_WORKSPACE}/platform/services/chorus-hooks/target/release" >> "$GITHUB_PATH"
          # HOOK_LOG path in main.rs writes here; if-let-Ok wraps the open so
          # missing dir doesn't crash the server, but creating it is cheap.
          sudo mkdir -p /Users/jeffbridwell/Library/Logs/Gathering
          sudo chmod 777 /Users/jeffbridwell/Library/Logs/Gathering
          rm -f /tmp/chorus-hooks.sock /tmp/chorus-hooks.pid
          nohup target/release/chorus-hooks > /tmp/chorus-hooks-server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          for i in $(seq 1 30); do
            if [ -S /tmp/chorus-hooks.sock ]; then
              echo "Socket bound after ${i} iterations"
              ls -la /tmp/chorus-hooks.sock
              exit 0
            fi
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "Server process died early; log:"
              cat /tmp/chorus-hooks-server.log || true
              exit 1
            fi
            sleep 0.5
          done
          echo "chorus-hooks server never bound socket within 15s; log:"
          cat /tmp/chorus-hooks-server.log || true
          exit 1
      - name: Run cargo test (--tests, integration tier — non-required)
        working-directory: ${{ matrix.crate }}
        run: cargo test --tests

  bats:
    name: bats — platform/tests
    runs-on: ubuntu-latest
    # #2941 AC7: bats tests cover shell-script integration surfaces
    # (build-signed.sh trailer extraction, deploy-daemon-card.sh failure
    # traps, e2e trace propagation, deploy-daemon multi-unit dispatch).
    # Pre-#2941 they ran only locally if at all — load-bearing trace_id
    # propagation had zero CI coverage. Job is non-required (DEC-2525
    # cap) and schedule-only (matches cost-stop pattern); signal still
    # surfaces via job-conclusion red on the nightly drift run, doesn't
    # block PRs.
    # #3528 — also workflow_dispatch so the gitleaks install fix is verifiable
    # on-demand instead of waiting a nightly.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Install bats + gitleaks
        # #3528 — gitleaks isn't in apt; the gitleaks-baseline bats tests
        # (2709-gitleaks-baseline) need the binary present or they fail
        # `command -v gitleaks`. Install the release binary to /usr/local/bin.
        run: |
          sudo apt-get update -y && sudo apt-get install -y bats
          GL_VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VER}/gitleaks_${GL_VER}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run bats suite (platform/tests/*.bats)
        # `bats -r` walks the dir; --tap output for log readability when
        # things break. Per-test isolation is bats's default.
        run: bats -r --tap platform/tests/

  clippy:
    # #2532: Rust lint parity with TS. chorus-inject already clean (-D warnings
    # blocking); chorus-hooks still has 64 known warnings (28 auto-fixed, 64
    # remain — mostly dead-code in test helpers + style nits). chorus-hooks
    # runs warn-only via continue-on-error until baseline retired or fixes
    # land. Per harness disconnect plan: lint-as-warn aligns with sensors-as-
    # feedback; the eslint-baseline approach is what Phase 1 retires (#2526).
    name: cargo clippy — ${{ matrix.crate }}
    runs-on: ubuntu-latest
    # DEC-2525: non-required for both crates post-disconnect (#2526).
    # Wave 3: schedule-only — runs nightly. Per-PR clippy via local
    # pre-commit; CI nightly catches anything that bypassed.
    if: github.event_name == 'schedule'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        crate:
          - platform/services/chorus-inject
          - platform/services/chorus-hooks
    env:
      CHORUS_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.crate }}
      - name: Run clippy
        working-directory: ${{ matrix.crate }}
        # Step-level continue-on-error per #2526 wave 2 bootstrap pattern —
        # see lint-ratchet for the rationale. Output still in the log.
        continue-on-error: true
        run: cargo clippy --all-targets -- -D warnings
      - name: Stop chorus-hooks server
        if: always() && matrix.crate == 'platform/services/chorus-hooks'
        run: |
          if [ -f /tmp/chorus-hooks.pid ]; then kill "$(cat /tmp/chorus-hooks.pid)" 2>/dev/null || true; fi
          tail -100 /tmp/chorus-hooks-server.log || true

  clippy-ratchet:
    # #2602: per-lint count ratchet enforces non-regression on the daily fire.
    # Ratchet runs in pre-commit (Check 4.65) for opportunistic enforcement, but
    # pre-commit only fires when someone happens to stage .rs files. This job is
    # the consistent-automation layer — runs daily regardless of commits. Failure
    # here means the count climbed in main since last regenerate; ci-main-red
    # alert routes to Silas for triage.
    name: clippy ratchet (per-lint count)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    env:
      CHORUS_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy ratchet
        run: bash platform/scripts/clippy-ratchet.sh

  # smoke-check stays out of chorus CI per ADR-026 addendum 2026-04-25 —
  # the Gathering app lives in jeff-bridwell-personal-site repo; that repo's
  # own CI owns smoke. chorus CI focuses on chorus-native artifacts.

  mcp-roundtrip:
    name: MCP round-trip (#2495)
    runs-on: ubuntu-latest
    # DEC-2525 + wave 3: non-required, schedule-only.
    # Boots Fuseki service container + builds chorus-api + builds
    # chorus-hook-shim + runs bats — ~3-5 min/run. Per-PR is wasteful;
    # nightly proves the round-trip still works.
    # #3528 — also runnable on workflow_dispatch so the round-trip can be
    # verified on-demand (the schedule-only gate hid that this job had gone
    # stale post-#2998 and couldn't be checked without waiting for a nightly).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    services:
      fuseki:
        image: stain/jena-fuseki:5.0.0
        ports:
          - 3030:3030
        env:
          ADMIN_PASSWORD: admin
          FUSEKI_DATASET_1: pods
        options: >-
          --health-cmd "wget -qO- http://localhost:3030/$/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30
    env:
      CHORUS_ROOT: ${{ github.workspace }}
      FUSEKI_URL: http://localhost:3030/pods/query
      FUSEKI_QUERY_URL: http://localhost:3030/pods/sparql
      FUSEKI_UPDATE_URL: http://localhost:3030/pods/update
      CHORUS_API_PORT: '3340'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: platform/services/chorus-hooks

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats curl

      - name: Build chorus-hook-shim (release)
        working-directory: platform/services/chorus-hooks
        run: cargo build --release --bin chorus-hook-shim

      - name: Build chorus-api
        working-directory: platform/api
        run: |
          npm ci --no-audit --no-fund
          npm run build

      # #3528 — /mcp moved off chorus-api to this separate daemon (#2998); it
      # proxies the principles/nudge tools to chorus-api's REST. The job boots
      # both: chorus-api (:3340, the proxy target) + chorus-mcp (:3341, /mcp).
      - name: Build chorus-mcp
        working-directory: platform/mcp-server
        run: |
          npm ci --no-audit --no-fund
          npm run build

      # #3528 — chorus-mcp's nudge tool POSTs to pulse (:3475); build it so the
      # mcp-nudge round-trip has a delivery target.
      - name: Build pulse
        working-directory: platform/pulse
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Seed Fuseki with principles ontology
        # Loads chorus.ttl into urn:chorus:instances — the named graph the
        # principles SPARQL (src/sparql/loom-principles.sparql) queries.
        # Earlier versions loaded into ?default and the query returned empty.
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3030/$/ping >/dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -sfu admin:admin -X POST \
            -H 'Content-Type: text/turtle' \
            --data-binary @roles/silas/ontology/chorus.ttl \
            "http://localhost:3030/pods/data?graph=urn:chorus:instances" > /dev/null
          curl -sf -G "${FUSEKI_QUERY_URL}" \
            --data-urlencode 'query=SELECT (COUNT(*) AS ?n) WHERE { GRAPH <urn:chorus:instances> { ?s a <https://jeffbridwell.com/chorus#Principle> } }' \
            -H 'Accept: application/sparql-results+json' | grep -q '"value"'

      - name: Boot chorus-api (background)
        # platform/logs/ is checked in via platform/logs/.gitignore
        working-directory: platform/api
        run: |
          nohup node dist/server.js > /tmp/chorus-api.log 2>&1 &
          echo $! > /tmp/chorus-api.pid

      # #3528 — boot the chorus-mcp daemon that serves /mcp on :3341. It proxies
      # the principles/nudge tools to chorus-api's REST (CHORUS_API_URL=:3340).
      - name: Boot chorus-mcp (background)
        working-directory: platform/mcp-server
        env:
          CHORUS_MCP_PORT: '3341'
          CHORUS_API_URL: http://localhost:3340
        run: |
          nohup node dist/main.js > /tmp/chorus-mcp.log 2>&1 &
          echo $! > /tmp/chorus-mcp.pid

      # #3528 — boot pulse (:3475) so chorus-mcp's nudge tool has a delivery
      # target. PULSE_ALLOW_DIRECT_POST=1 opts out of the #3485 shared-secret
      # gate for tests; the darwin-only TCC boot-smoke is skipped off-darwin.
      - name: Boot pulse (background)
        working-directory: platform/pulse
        env:
          MESSAGING_PORT: '3475'
          PULSE_ALLOW_DIRECT_POST: '1'
        run: |
          nohup node dist/service.js > /tmp/pulse.log 2>&1 &
          echo $! > /tmp/pulse.pid
          for i in $(seq 1 30); do
            if curl -s -o /dev/null "http://localhost:3475/health"; then break; fi
            sleep 1
          done
          curl -s "http://localhost:3475/health" || (echo "pulse never came up; log:"; cat /tmp/pulse.log; exit 1)

      - name: Wait for /mcp endpoint
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -X POST http://localhost:3341/mcp \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              -d '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' || echo 000)
            if [ "$code" = "200" ] || [ "$code" = "202" ]; then exit 0; fi
            sleep 1
          done
          echo "chorus-mcp (:3341) never became ready; tail logs:"
          echo "--- chorus-mcp.log ---"; tail -100 /tmp/chorus-mcp.log || true
          echo "--- chorus-api.log ---"; tail -50 /tmp/chorus-api.log || true
          exit 1

      - name: Run MCP round-trip bats
        env:
          MCP_URL: http://localhost:3341/mcp
          CHORUS_LOG_FILE: ${{ github.workspace }}/platform/logs/chorus.log
        run: |
          bats platform/tests/mcp-nudge.test.sh
          bats platform/tests/mcp-principles.test.sh

      # #2630: structural-test bats family — runs on every PR to enforce
      # the discipline (retirement-gates, drift audits, skill-text asserts)
      # that today's manual review caught. Each check is RED-first against
      # its target failure mode; staying green is the structural guarantee.
      #
      # Axis-4 hermeticity contract (Silas arch-lens 2026-04-30): any bats
      # added to this job MUST be axis-4 — no live role-state mutation,
      # no /tmp/claude-team-scan reads, no socket binds, no real-channel
      # nudges. Tests must read repo file contents (BATS_TEST_DIRNAME for
      # root) or static spine.log fixtures only. Anything else makes the
      # job's results non-deterministic across concurrent PRs.
      - name: Run structural-test bats (#2630)
        env:
          CHORUS_LOG: ${{ github.workspace }}/platform/logs/chorus.log
        run: |
          # Retirement-gates (forward-only structural absence assertions)
          bats platform/tests/role-state-card-decoupled.bats
          bats platform/tests/nudge-cleanup-retirement.bats
          # Drift audits (correlate emit-events to follow-up events)
          bats platform/tests/spine-emit-drift-audit.bats
          bats platform/tests/demo-complete-drift-audit.bats
          # Skill-text structural asserts (markdown declares mandatory steps)
          bats platform/tests/skill-text-structural-asserts.bats

      - name: Stop chorus-api
        if: always()
        run: |
          if [ -f /tmp/chorus-api.pid ]; then kill "$(cat /tmp/chorus-api.pid)" 2>/dev/null || true; fi
          tail -200 /tmp/chorus-api.log || true
