name: quality

# CI-side authoritative quality checks for the chorus repo.
# Pre-commit hooks catch the honest case locally; this workflow closes
# the `git commit --no-verify` bypass by running the same checks on every
# PR to main and every push to main.
#
# Implements ADR-026 §b CI(target) column. One job per logical check —
# failures point at exactly one concern. npm ci against committed locks
# (#2481 sub-AC 1) closes the local↔CI divergence that fired on first run.
#
# Card #2481.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-ratchet:
    name: ESLint per-rule ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Type-aware ESLint rules (no-floating-promises et al.) need every
      # subpackage's deps installed for type resolution. Without per-package
      # node_modules, the type analyzer mis-fires false positives. Install
      # all 7 active TS packages + root before linting.
      - name: Install (root)
        run: npm ci --no-audit --no-fund
      - name: Install (subpackages)
        run: |
          for pkg in directing/clearing directing/products/cards platform/api platform/chorus-sdk platform/pulse platform/tests platform/workflow-engine; do
            (cd "$pkg" && npm ci --no-audit --no-fund)
          done
      - name: Run lint ratchet
        run: npm run lint:ratchet

  type-check:
    name: tsc — ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - directing/clearing
          - directing/products/cards
          - platform/api
          - platform/chorus-sdk
          - platform/pulse
          - platform/tests
          - platform/workflow-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install (npm ci)
        working-directory: ${{ matrix.package }}
        run: npm ci --no-audit --no-fund
      - name: Type-check
        working-directory: ${{ matrix.package }}
        run: npx tsc --noEmit

  unit-tests:
    name: jest — ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - directing/clearing
          - directing/products/cards
          - platform/api
          - platform/chorus-sdk
          - platform/pulse
          - platform/tests
          - platform/workflow-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Cross-package pre-build for cards: src/events.ts imports 'chorus-sdk'
      # (file: dep needs dist), src/sdk.ts requires '../../../../platform/
      # workflow-engine/dist/engine'. Both must be built before cards jest.
      # Tracked: workspaces conversion card (ADR-026 §c Future) supersedes
      # this bridge once npm workspaces lands.
      - name: Pre-build chorus-sdk (cards only)
        if: matrix.package == 'directing/products/cards'
        working-directory: platform/chorus-sdk
        run: |
          npm ci --no-audit --no-fund
          npm run build
      - name: Pre-build workflow-engine (cards only)
        if: matrix.package == 'directing/products/cards'
        working-directory: platform/workflow-engine
        run: |
          npm ci --no-audit --no-fund
          npm run build
      - name: Install (npm ci)
        working-directory: ${{ matrix.package }}
        run: npm ci --no-audit --no-fund
      - name: Run jest
        working-directory: ${{ matrix.package }}
        run: npx jest --forceExit --passWithNoTests

  mcp-description-shape:
    name: MCP tool description shape (#2475)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run shape lint
        run: node platform/scripts/mcp-tool-description-lint.js

  catalog-oversize:
    name: Catalog oversize backstop (#2461)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            git diff --name-only --diff-filter=ACMR "$base" "$head" > /tmp/changed.txt
          else
            git diff --name-only --diff-filter=ACMR HEAD~1 HEAD > /tmp/changed.txt
          fi
      - name: Run backstop
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: cat /tmp/changed.txt | bash platform/scripts/check-catalog-oversize.sh

  principle-direct-edit:
    name: Principle direct-edit backstop (#2314)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            git diff --name-only --diff-filter=ACMR "$base" "$head" > /tmp/changed.txt
          else
            git diff --name-only --diff-filter=ACMR HEAD~1 HEAD > /tmp/changed.txt
          fi
      - name: Run backstop
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: cat /tmp/changed.txt | bash platform/scripts/check-principle-direct-edit.sh

  cargo-test:
    name: cargo test — ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - platform/services/chorus-hooks
          - platform/services/chorus-inject
    env:
      # Tests in shared/protocol_contract.rs and chorus_log.rs read paths
      # via shared::state_paths::chorus_root() which falls back to the
      # local /Users/... path. CI must override to the runner workspace.
      CHORUS_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.crate }}
      - name: Ensure runtime dirs (chorus_log writes to platform/logs/)
        run: mkdir -p platform/logs /tmp/claude-team-scan /tmp/voice-inbox /tmp/chorus-chat
      - name: Run cargo test
        working-directory: ${{ matrix.crate }}
        run: cargo test --all

  # smoke-check stays out of chorus CI per ADR-026 addendum 2026-04-25 —
  # the Gathering app lives in jeff-bridwell-personal-site repo; that repo's
  # own CI owns smoke. chorus CI focuses on chorus-native artifacts.

  mcp-roundtrip:
    name: MCP round-trip (#2487)
    runs-on: ubuntu-latest
    services:
      fuseki:
        image: stain/jena-fuseki:5.0.0
        ports:
          - 3030:3030
        env:
          ADMIN_PASSWORD: admin
          FUSEKI_DATASET_1: pods
        options: >-
          --health-cmd "wget -qO- http://localhost:3030/$/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30
    env:
      CHORUS_ROOT: ${{ github.workspace }}
      FUSEKI_URL: http://localhost:3030/pods/query
      FUSEKI_QUERY_URL: http://localhost:3030/pods/sparql
      FUSEKI_UPDATE_URL: http://localhost:3030/pods/update
      CHORUS_API_PORT: '3340'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: platform/services/chorus-hooks

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats curl

      - name: Build chorus-hook-shim (release)
        working-directory: platform/services/chorus-hooks
        run: cargo build --release --bin chorus-hook-shim

      - name: Build chorus-api
        working-directory: platform/api
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Seed Fuseki with principles ontology
        run: |
          # Wait for Fuseki to be reachable (service health-check should already
          # have gated this, but belt-and-suspenders).
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3030/$/ping >/dev/null 2>&1; then break; fi
            sleep 1
          done
          # Upload chorus.ttl into the default graph of the pods dataset.
          curl -sfu admin:admin -X POST \
            -H 'Content-Type: text/turtle' \
            --data-binary @roles/silas/ontology/chorus.ttl \
            "http://localhost:3030/pods/data?default" > /dev/null
          # Sanity: triple count via SPARQL.
          curl -sf -G "${FUSEKI_QUERY_URL}" \
            --data-urlencode 'query=SELECT (COUNT(*) AS ?n) WHERE { ?s ?p ?o }' \
            -H 'Accept: application/sparql-results+json' | grep -q '"value"'

      - name: Ensure runtime dirs (chorus-log writes here)
        run: mkdir -p platform/logs

      - name: Boot chorus-api (background)
        working-directory: platform/api
        run: |
          nohup node dist/server.js > /tmp/chorus-api.log 2>&1 &
          echo $! > /tmp/chorus-api.pid

      - name: Wait for /mcp endpoint
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -X POST http://localhost:3340/mcp \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              -d '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' || echo 000)
            # Streamable-HTTP MCP returns 200 (ok) or 202 (accepted with session header).
            if [ "$code" = "200" ] || [ "$code" = "202" ]; then exit 0; fi
            sleep 1
          done
          echo "chorus-api never became ready; tail log:"
          tail -100 /tmp/chorus-api.log || true
          exit 1

      - name: Run MCP round-trip bats
        env:
          MCP_URL: http://localhost:3340/mcp
          CHORUS_LOG_FILE: ${{ github.workspace }}/platform/logs/chorus.log
        run: |
          bats platform/tests/mcp-nudge.test.sh
          bats platform/tests/mcp-principles.test.sh

      - name: Stop chorus-api
        if: always()
        run: |
          if [ -f /tmp/chorus-api.pid ]; then kill "$(cat /tmp/chorus-api.pid)" 2>/dev/null || true; fi
          tail -200 /tmp/chorus-api.log || true
