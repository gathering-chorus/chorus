name: werk

# werk — THE pipeline. ONE job, ONE run (#3499). There is no demo-half / land-half:
# the GO is given AT INVOKE (the `go` input), werk-demo PROVES in-run (gates, gathers,
# block-on-replies) and its EXIT CODE drives whether the next step runs. No inputs.go
# job fork, no second invocation, no cross-run witness — the demo→merge edge is a
# native in-run dependency, so it can't round-churn.
#
# werk-demo exit contract (#3237, go-at-invoke world — Wren aed9dd4e):
#   0 = proven AND go==true  → continue to merge  (gates recorded + both gathers replied in time)
#   2 = clean stop, job GREEN → presented, NOT landed  (go==false present-only / timeout / gates-pending)
#   1 = real error           → job fails red
# The demo step maps that rc to a step output `proven`; merge→sync→deploy→accept are
# gated `if: steps.demo.outputs.proven == 'true'`. rc=2 → those skip, job stays green.
#
# Every verb runs THROUGH MCP via chorus-mcp-call.sh (the single toolchain). Stop-on-
# failure is the GHA default — any verb's non-zero exit halts the job; nothing half-lands.

on:
  workflow_dispatch:
    inputs:
      card_id:
        description: "Card # to run through the pipeline (e.g. 3236). The trace key end-to-end."
        required: true
        type: string
      role:
        description: "Builder role whose werk runs (kade / silas / wren)."
        required: true
        type: string
      go:
        description: "GO AT INVOKE. {true|go|yes} = prove-and-land (merge→sync→deploy→accept if proven). false/absent = present-only, stop green."
        required: false
        type: string
        default: "false"
      accepter:
        description: "Authorizing identity (jeff / wren) (DEC-048) — whose GO lands the card. Required for a landing run (go=true); ignored present-only."
        required: false
        type: string
        default: ""

jobs:
  werk:
    runs-on: macos-latest
    # CHORUS_HOME / CHORUS_WERK_BASE / PATH inherited from the local shell act runs in
    # (chorus-env-setup.sh provides them). The workflow MUST NOT hardcode them.
    env:
      CARD_ID: ${{ inputs.card_id }}
      ROLE: ${{ inputs.role }}
      GO: ${{ inputs.go }}
      ACCEPTER: ${{ inputs.accepter }}

    steps:
      - name: shared-trace
        # Mint ONE trace for the whole run, propagate via $GITHUB_ENV so every later step
        # (and every verb subprocess the MCP server spawns) inherits CHORUS_TRACE_ID.
        run: |
          trace="$(date +%s%N)-$$"
          echo "CHORUS_TRACE_ID=$trace" >> "$GITHUB_ENV"
          echo "minted trace=$trace for card=#${CARD_ID} role=${ROLE} go=${GO} accepter=${ACCEPTER:-<none>}"
          mkdir -p "${CHORUS_HOME}/ops/logs" 2>/dev/null || true
          ts=$(($(date +%s)*1000))  # BSD date has no %3N (#3266)
          printf '{"ts":%s,"event":"werk.started","card_id":%s,"role":"%s","go":"%s","accepter":"%s","trace_id":"%s"}\n' \
            "$ts" "${CARD_ID}" "${ROLE}" "${GO}" "${ACCEPTER}" "$trace" \
            >> "${CHORUS_HOME}/ops/logs/werk.jsonl" 2>/dev/null || true

      # ═══ prove in the role's slot — never touches main until merge (gated on proven) ═══
      - name: commit
        # werk-commit, via MCP. Stages add-A in the card's werk + commits. Rebase onto
        # origin/main happens INSIDE commit under flock (#3186) — no separate rebase step.
        run: chorus-mcp-call.sh "${ROLE}" werk-commit "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: push
        run: chorus-mcp-call.sh "${ROLE}" werk-push "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: build
        # target=werk implied: builds the card's werk for the demo slot.
        run: chorus-mcp-call.sh "${ROLE}" werk-build "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: test
        # #3190 — werk-test VERB: the BLOCKING test floor (promotes the old inline step into
        # a real verb). Runs the card's AFFECTED units only — cargo per changed crate, tsc+jest
        # per changed TS package, plus workspace clippy-ratchet + doc-coherence (the three the
        # inline step never ran) — emits a typed `test.failed` to the spine per failure, and
        # EXITS 1 if a real unit fails, which halts the land. Bootstrap escape (in the verb):
        # a self-modifying card (diff touches werk.yml or the werk-test crate — e.g. #3190
        # itself) runs ADVISORY (exit 0) so it can't deadlock against the canonical werk.yml it
        # is fixing. Determinism (#3190 governing bar): same diff → same units → same gates →
        # same verdict. The pyramidLayer/hermeticity tier-selection (Silas #3540) wires in next.
        run: |
          set -o pipefail
          # #3484: pin node 20 — the verb shells jest, whose better-sqlite3 native module is
          # built for node 20's ABI; act's login PATH otherwise picks node 23 → false ABI reds.
          N20="$(ls -d "$HOME"/.nvm/versions/node/v20*/bin 2>/dev/null | sort -V | tail -1)"
          if [ -n "$N20" ]; then export PATH="$N20:$PATH"; echo "-- pinned node $("$N20/node" -v 2>/dev/null) for werk-test (login shell had $(node -v 2>/dev/null)) --"; fi
          WERK="${CHORUS_WERK_BASE}/${ROLE}-${CARD_ID}"; SHA=$(git -C "$WERK" rev-parse HEAD)
          post(){ gh api "repos/gathering-chorus/chorus/statuses/$SHA" -f "state=$1" -f "context=chorus/test/${CARD_ID}" -f "description=role=${ROLE} trace=${CHORUS_TRACE_ID:-} (werk-test #3190 — blocking floor)" >/dev/null 2>&1 || true; }
          post pending
          set +e
          PATH="$HOME/.local/bin:$HOME/.chorus/bin:$PATH" werk-test "${CARD_ID}" "${ROLE}"
          rc=$?
          set -e
          if [ "$rc" = 0 ]; then post success; else post failure; fi
          # #3638 — record the REAL verdict into the demo witness (trace-scoped) so the
          # demo's tests: badge shows this run's blocking result instead of re-running a
          # generic cargo default that false-reds at the repo root (no root Cargo.toml).
          DEPLOY_ROLE="${ROLE}" PATH="$HOME/.local/bin:$HOME/.chorus/bin:$PATH" \
            werk-demo test-result "${CARD_ID}" "$([ "$rc" = 0 ] && echo pass || echo fail)" \
            || echo "WARN: werk-demo test-result write failed — demo badge will fall back to its self-run (#3638)"
          echo "werk-test: rc=$rc (BLOCKING — a red affected unit halts the land; self-modifying cards run advisory)"
          exit "$rc"

      - name: review
        # werk-review ADVISORY floor — records review.floor + chorus/review/<card> status.
        run: |
          WERK="${CHORUS_WERK_BASE}/${ROLE}-${CARD_ID}"; SHA=$(git -C "$WERK" rev-parse HEAD)
          post(){ gh api "repos/gathering-chorus/chorus/statuses/$SHA" -f "state=$1" \
            -f "context=chorus/review/${CARD_ID}" \
            -f "description=role=${ROLE} trace=${CHORUS_TRACE_ID:-} (advisory floor — #3193)" >/dev/null 2>&1 || true; }
          post pending
          out=$(DEPLOY_ROLE="${ROLE}" werk-review "${CARD_ID}" "${ROLE}" 2>&1) || true
          echo "$out"
          case "$out" in *"floor clean"*) post success ;; *) post failure ;; esac
          echo "review: advisory — floor findings inform the cold-eyes agent + the demo surface"

      - name: deploy-werk
        # target=werk: per-card slot for the demo, NOT canonical — main is untouched.
        run: chorus-mcp-call.sh "${ROLE}" werk-deploy "$(printf '{"role":"%s","card_id":%s,"target":"werk"}' "${ROLE}" "${CARD_ID}")"

      - name: env-up
        # posts chorus/env-up/<card>; fails the job if the slot doesn't come up.
        run: |
          WERK="${CHORUS_WERK_BASE}/${ROLE}-${CARD_ID}"; SHA=$(git -C "$WERK" rev-parse HEAD)
          post(){ gh api "repos/gathering-chorus/chorus/statuses/$SHA" -f "state=$1" -f "context=chorus/env-up/${CARD_ID}" -f "description=role=${ROLE} trace=${CHORUS_TRACE_ID:-}" >/dev/null 2>&1 || true; }
          post pending
          if chorus-mcp-call.sh "${ROLE}" werk-deploy "$(printf '{"role":"%s","card_id":%s,"env_up":true}' "${ROLE}" "${CARD_ID}")"; then post success; else post failure; exit 1; fi

      - name: demo
        id: demo
        # #3519 — THE WITNESS-GATED LAND. Three separable steps, one source of truth (the
        # witness ops/logs/werk-demo.jsonl):
        #   1. RECORD the human GO. #3511 retired the at-invoke go-flag (werk-demo ignores the
        #      2nd positional), and the /cw land path was never reconnected to the go-RECORDING
        #      (`werk-demo go`) — so Jeff's go was never written. Recorded under ACCEPTER (not
        #      ROLE) so #3511's self-accept guard stays closed; GO without accepter is refused.
        #   2. PRESENT the variant — demo() ALWAYS exits 2 (present-and-exit, #3279/#3511). Its
        #      exit code is NOT the land gate (that was the #3499/#3511 contradiction: merge gated
        #      on a demo exit-0 that can never come → nothing landed, 101 historically vs 0 recent).
        #   3. VERDICT — `werk-demo verdict` reads the WITNESS and exits 0 iff gates + both peer
        #      gathers + Jeff's go are recorded for THIS patch-id (patch-keyed → survives the
        #      concurrent rebases that churn the round-sha). proven keys on THIS, not demo's exit.
        run: |
          set +e
          case "${GO}" in
            true|go|yes|GO)
              if [ -z "${ACCEPTER}" ]; then echo "[demo] GO with no accepter — refusing (DEC-048)"; exit 1; fi
              PATH="$HOME/.local/bin:$PATH" DEPLOY_ROLE="${ACCEPTER}" werk-demo go "${CARD_ID}" ;;
          esac
          PATH="$HOME/.local/bin:$PATH" DEPLOY_ROLE="${ROLE}" werk-demo "${CARD_ID}" "${GO}"
          drc=$?
          if [ "$drc" != 0 ] && [ "$drc" != 2 ]; then echo "[demo] present error rc=$drc"; exit "$drc"; fi
          vout=$(PATH="$HOME/.local/bin:$PATH" DEPLOY_ROLE="${ROLE}" werk-demo verdict "${CARD_ID}" 2>&1)
          vrc=$?
          set -e
          echo "$vout"
          case "$vrc" in
            0) echo "proven=true"  >> "$GITHUB_OUTPUT"; echo "[demo] witness PROVEN (gates+gathers+go for this patch) → landing." ;;
            2) echo "proven=false" >> "$GITHUB_OUTPUT"
               # #3519 (Wren pre-land) — a GO given but verdict=false is the dark-factory
               # WIP-limbo (#3520 bite: looked done, stayed WIP, WERK_EXIT=0). Flag it HELD so
               # outcome + witness-close shout it as a distinct terminal state — NOT a green
               # "presented". A clean present-only run (no go) is NOT limbo and stays presented.
               case "${GO}" in true|go|yes|GO) echo "held=true" >> "$GITHUB_OUTPUT" ;; esac
               miss=$(printf '%s' "$vout" | sed -n 's/.*witness missing: \(\[[^]]*\]\).*/\1/p')
               echo "held_reason=${miss:-[gates/gathers or go]}" >> "$GITHUB_OUTPUT" ;;
            *) echo "[demo] verdict error rc=$vrc"; exit "$vrc" ;;
          esac

      # ═══ land to prod — prod is a build of MAIN. Runs ONLY if the demo proved (go==true). ═══
      - name: merge
        if: ${{ steps.demo.outputs.proven == 'true' }}
        # werk-merge (#3175), via MCP. Resolves the OPEN PR for the current HEAD oid, squash-merges,
        # content-verifies. #3499: werk-merge no longer reads a demo witness — reaching this step
        # MEANS the in-run demo proved (the only-door is structural: this step is gated on proven).
        # #3517 — capture the trigger's landedCommit (werk-merge returns the landed origin/main sha
        # in content.text) and thread it forward to deploy. grep the 40-hex so it's robust to any
        # surrounding log text (no dependence on the exact MCP return shape). Empty → deploy REDs.
        run: |
          LANDED="$(chorus-mcp-call.sh "${ROLE}" werk-merge "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")")"
          printf '%s\n' "$LANDED"
          LC="$(printf '%s' "$LANDED" | grep -oE '[0-9a-f]{40}' | tail -1)"
          echo "LANDED_COMMIT=${LC}" >> "$GITHUB_ENV"
          [ -n "$LC" ] || echo "   [warn] #3517: could not capture landedCommit from werk-merge output — deploy gate will RED on empty (claimed≠verified)" >&2

      - name: sync
        if: ${{ steps.demo.outputs.proven == 'true' }}
        # canonical ff-sync so SCRIPT-only changes go LIVE; SYNC_OK gates the "live" claim.
        # #3574: bare `merge --ff-only` FAILS on a DIRTY canonical (e.g. generated doc-coherence
        # churn) — and this step was advisory (warn + SYNC_OK=0) while deploy ran anyway → shipped
        # STALE binaries (the merged≠live root). Now: on ff failure, AUTO-RECOVER (`werk-sync recover`
        # = stash-dirty + ff) and re-verify canonical HEAD == origin/main before claiming SYNC_OK=1.
        run: |
          if [ -n "${CHORUS_HOME:-}" ] \
             && git -C "$CHORUS_HOME" fetch -q origin main 2>/dev/null \
             && git -C "$CHORUS_HOME" merge --ff-only origin/main >/dev/null 2>&1; then
            echo "   [ok] canonical ff-synced to origin/main"
            echo "SYNC_OK=1" >> "$GITHUB_ENV"
          elif [ -n "${CHORUS_HOME:-}" ] && command -v werk-sync >/dev/null 2>&1 \
             && werk-sync recover >/dev/null 2>&1 \
             && [ "$(git -C "$CHORUS_HOME" rev-parse HEAD 2>/dev/null)" = "$(git -C "$CHORUS_HOME" rev-parse origin/main 2>/dev/null)" ]; then
            echo "   [ok] canonical auto-recovered (stash-dirty + ff) → synced to origin/main (#3574)"
            echo "SYNC_OK=1" >> "$GITHUB_ENV"
          else
            echo "   [warn] canonical NOT synced even after recover (diverged?) — deploy will REFUSE to ship stale (#3574)" >&2
            echo "SYNC_OK=0" >> "$GITHUB_ENV"
          fi

      - name: deploy-canonical
        if: ${{ steps.demo.outputs.proven == 'true' }}
        # target=canonical: prod is a build of MAIN. SELF-BUILDS from canonical@origin/main (#3222).
        # #3517 — pass the captured landedCommit so deploy's verify can gate deployed-commit==landedCommit
        # (the one-sha invariant proven at the verify, not via a risky checkout). Empty arg = RED.
        # #3574 — REFUSE to deploy from an un-synced canonical. Before: deploy ran regardless of
        # SYNC_OK → built+shipped pre-merge code (the merged≠live root, cost #3566/#3570 today).
        # SYNC_OK=0 here = canonical couldn't sync even after auto-recover → FAIL LOUD, don't ship stale.
        run: |
          if [ "${SYNC_OK:-0}" != "1" ]; then
            echo "::error::#3574: canonical not synced to origin/main (SYNC_OK=${SYNC_OK:-unset}) — REFUSING to deploy stale binaries. Fix canonical ('werk-sync recover') and re-land." >&2
            exit 1
          fi
          chorus-mcp-call.sh "${ROLE}" werk-deploy "$(printf '{"role":"%s","card_id":%s,"target":"canonical","landedCommit":"%s"}' "${ROLE}" "${CARD_ID}" "${LANDED_COMMIT}")"

      - name: accept
        if: ${{ steps.demo.outputs.proven == 'true' }}
        # #3311 GO=ACCEPT: the GO given at invoke IS the acceptance. werk-accept's DEC-048 authority
        # gate runs INSIDE the verb (ACCEPTER is the authorizing identity; a builder can't self-accept).
        run: DEPLOY_ROLE="${ACCEPTER}" werk-accept "${CARD_ID}" "${ROLE}"

      - name: outcome
        if: success()
        # Tell the truth about the terminal state — landed (proven) vs presented (not proven).
        run: |
          if [ "${{ steps.demo.outputs.proven }}" = "true" ]; then
            if [ "${SYNC_OK:-0}" = "1" ]; then
              echo "[landed] #${CARD_ID} merged + deployed + LIVE, accepted by ${ACCEPTER} (GO=accept)."
            else
              echo "[accepted, NOT yet live] #${CARD_ID} merged + accepted, but canonical did NOT ff-sync — run 'werk-sync recover'." >&2
            fi
          elif [ "${{ steps.demo.outputs.held }}" = "true" ]; then
            # #3519 (Wren pre-land) — LOUD WIP-limbo. A GO was given but the witness did NOT
            # prove it. Must NOT read as a green "presented". ::error:: annotates the run loudly;
            # witness-close records werk.held (distinct phase). This is HELD, not landed, not done.
            echo "::error ::[HELD] #${CARD_ID} — GO given but NOT landed. Witness missing: ${{ steps.demo.outputs.held_reason }}. Card STAYS WIP — this is NOT done. Record the missing gate/gather/go for THIS patch, then re-run." >&2
          else
            echo "[presented] #${CARD_ID} — variant up, present-only (no go). Re-invoke with go to land."
          fi

      # --- orchestrator witness close ---
      - name: witness-close
        if: success()
        run: |
          ts=$(($(date +%s)*1000))  # BSD date has no %3N (#3266)
          # #3519 (Wren pre-land) — THREE distinct terminal phases, not two. werk.held is the
          # go-given-but-not-proven WIP-limbo (#3520): it must be queryable as its OWN state,
          # never folded into werk.presented (which reads as a clean present-only run).
          if   [ "${{ steps.demo.outputs.proven }}" = "true" ]; then ev="werk.landed"; status="success"
          elif [ "${{ steps.demo.outputs.held }}"   = "true" ]; then ev="werk.held";    status="held"
          else ev="werk.presented"; status="success"; fi
          printf '{"ts":%s,"event":"%s","card_id":%s,"role":"%s","accepter":"%s","trace_id":"%s","status":"%s","held_reason":"%s","sync_ok":"%s"}\n' \
            "$ts" "$ev" "${CARD_ID}" "${ROLE}" "${ACCEPTER}" "${CHORUS_TRACE_ID}" "$status" "${{ steps.demo.outputs.held_reason }}" "${SYNC_OK:-0}" \
            >> "${CHORUS_HOME}/ops/logs/werk.jsonl" 2>/dev/null || true

      - name: witness-failed
        if: failure()
        run: |
          ts=$(($(date +%s)*1000))  # BSD date has no %3N (#3266)
          printf '{"ts":%s,"event":"werk.failed","card_id":%s,"role":"%s","accepter":"%s","trace_id":"%s","status":"failed"}\n' \
            "$ts" "${CARD_ID}" "${ROLE}" "${ACCEPTER}" "${CHORUS_TRACE_ID}" \
            >> "${CHORUS_HOME}/ops/logs/werk.jsonl" 2>/dev/null || true

# Stop-on-failure: GHA default — steps run in order, the job halts on first non-zero exit.
# The demo step's rc=0/2 are CLEAN (caught + mapped to `proven`); only a real error (rc=1)
# or a verb failure halts the job. merge→sync→deploy→accept are gated on proven — they run
# only when the in-run demo proved (go==true). No second invocation, no witness wall.
