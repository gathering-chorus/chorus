name: werk

# werk — THE pipeline. #3236. One orchestrator (act), one toolchain (MCP), one file.
#
# This IS werk-mcp.sh, hosted in act instead of bash. The whole flow — prove in the
# slot, then land to prod — runs as one workflow_dispatch, stopping before accept
# (the human's hand). Decided 2026-06-04 (Jeff): collapse the two-orchestrator drift
# (bash werk-mcp.sh + direct-binary acp.yml) AND don't re-split it into demo.yml +
# acp.yml — that just re-introduces the multiplicity werk-mcp.sh already collapsed.
# One pipeline = one werk.yml.
#
# Every verb runs THROUGH MCP via chorus-mcp-call.sh (the single toolchain); act only
# sequences + makes each step a legible line in GitHub. werk-demo is the one binary
# (the proving ceremony, #3116). The job halts on the first failure (GHA default) and
# STOPS before accept (#3234, DEC-048) — it prints the accept command, never runs it.
#
# Sequence (1:1 with werk-mcp.sh):
#   commit → push → build → deploy-werk → env-up → demo            (prove, never touches main)
#   merge → 5.5 canonical ff-sync → deploy-prod → STOP-before-accept (land; prod is a build of MAIN)

on:
  workflow_dispatch:
    inputs:
      card_id:
        description: "Card # to run through the pipeline (e.g. 3236). The trace key end-to-end."
        required: true
        type: string
      role:
        description: "Builder role whose werk runs (kade / silas / wren)."
        required: true
        type: string
      accepter:
        description: "Authorizing identity (jeff / wren) for the PRINTED accept command (DEC-048). Not auto-run."
        required: true
        type: string

jobs:
  werk:
    # act runs this LOCALLY (orchestrator). -P macos-latest=-self-hosted runs host-native.
    # GitHub does NOT run this — act is the orchestrator; gh gets the mirror (per-verb
    # commit-statuses), not the execution. The self-hosted-runner config (#3240, thrown
    # away) was the wrong model: act orchestrates, gh reflects.
    runs-on: macos-latest

    # CHORUS_HOME / CHORUS_WERK_BASE / PATH inherited from the local shell act runs in
    # (chorus-env-setup.sh provides them). The workflow MUST NOT hardcode them.
    env:
      CARD_ID: ${{ inputs.card_id }}
      ROLE: ${{ inputs.role }}
      ACCEPTER: ${{ inputs.accepter }}

    steps:
      - name: shared-trace
        # Mint ONE trace, propagate via $GITHUB_ENV so every later step (and every verb
        # subprocess the MCP server spawns) inherits CHORUS_TRACE_ID. Best-effort witness.
        run: |
          trace="$(date +%s%N)-$$"
          echo "CHORUS_TRACE_ID=$trace" >> "$GITHUB_ENV"
          echo "minted trace=$trace for card=#${CARD_ID} role=${ROLE} accepter=${ACCEPTER}"
          mkdir -p "${CHORUS_HOME}/ops/logs" 2>/dev/null || true
          ts=$(($(date +%s)*1000))  # BSD date has no %3N — the old form wrote a literal N, corrupting every witness line (#3266)
          printf '{"ts":%s,"event":"werk.started","card_id":%s,"role":"%s","accepter":"%s","trace_id":"%s"}\n' \
            "$ts" "${CARD_ID}" "${ROLE}" "${ACCEPTER}" "$trace" \
            >> "${CHORUS_HOME}/ops/logs/werk.jsonl" 2>/dev/null || true

      # ═══ prove in the role's slot — never touches main ═══
      - name: commit
        # werk-commit, via MCP. Stages add-A in the card's werk and commits. Rebase onto
        # origin/main happens INSIDE commit, atomically under flock (#3186) — no separate
        # rebase step (a standalone `git rebase` would race that lock).
        run: chorus-mcp-call.sh "${ROLE}" werk-commit "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: push
        run: chorus-mcp-call.sh "${ROLE}" werk-push "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: build-demo
        run: chorus-mcp-call.sh "${ROLE}" werk-build "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: test
        # Your model (Jeff, 2026-06-04): "once pull happens it's your questions/observations,
        # then TEST and demo at end." Test is its OWN step here, not folded into build —
        # build compiles, test proves green BEFORE we deploy to the slot and demo. Runs the
        # same hermetic gate CI's required jobs use (quality.yml): cargo hermetic + jest.
        # Runs in the card's werk so it proves THIS card's code. Failure stops the job →
        # nothing deploys, nothing lands.
        run: |
          set -o pipefail
          WERK="${CHORUS_WERK_BASE}/${ROLE}-${CARD_ID}"; SHA=$(git -C "$WERK" rev-parse HEAD)
          # #3240 — test is an inline step (no verb), so it posts its own chorus/test/<card>
          # status to gh (pending→success/failure) for VISIBILITY.
          # ADVISORY, NOT BLOCKING (#3190): until werk-test exists as a real verb/gate, test does
          # NOT fail the pipeline — a pre-existing/red test must not block every card's run. The
          # status reflects reality (success/failure) so it's visible in gh; werk-test (#3190)
          # promotes this to a hard gate. No `exit 1` here on purpose.
          post(){ gh api "repos/gathering-chorus/chorus/statuses/$SHA" -f "state=$1" -f "context=chorus/test/${CARD_ID}" -f "description=role=${ROLE} trace=${CHORUS_TRACE_ID:-} (advisory until werk-test #3190)" >/dev/null 2>&1 || true; }
          post pending
          echo "-- test (hermetic, ADVISORY until werk-test #3190) in $WERK --"
          rc=0
          ( cd "$WERK" && cargo test --lib --bins --test 'hermetic_*' ) 2>&1 | tail -25 || rc=1
          ( cd "$WERK" && npx jest --forceExit --passWithNoTests --randomize ) 2>&1 | tail -20 || rc=1
          if [ "$rc" = 0 ]; then post success; else post failure; fi
          echo "test: rc=$rc (advisory — does NOT block the pipeline until werk-test #3190)"

      - name: review-floor
        # #3193 — werk-review's STRUCTURED FLOOR, ADVISORY (same contract as the test
        # step above): records review.floor findings (unchecked AC, src-without-test,
        # removed pub symbols) to the witness + a chorus/review/<card> gh status.
        # The cold-eyes AGENT half runs session-side in the demoer's prework batch and
        # records review.verdict via `werk-review verdict` — an LLM can't run here
        # (the #3284 lesson). The flip to blocking is `werk-review check <card>` as an
        # exit-gating step, once proven not-ceremony.
        run: |
          WERK="${CHORUS_WERK_BASE}/${ROLE}-${CARD_ID}"; SHA=$(git -C "$WERK" rev-parse HEAD)
          post(){ gh api "repos/gathering-chorus/chorus/statuses/$SHA" -f "state=$1" \
            -f "context=chorus/review/${CARD_ID}" \
            -f "description=role=${ROLE} trace=${CHORUS_TRACE_ID:-} (advisory floor — #3193)" >/dev/null 2>&1 || true; }
          post pending
          out=$(DEPLOY_ROLE="${ROLE}" werk-review "${CARD_ID}" "${ROLE}" 2>&1) || true
          echo "$out"
          case "$out" in *"floor clean"*) post success ;; *) post failure ;; esac
          echo "review-floor: advisory — findings inform the cold-eyes agent + the demo surface"

      - name: deploy-demo
        # target=werk: per-card slot for the demo, NOT canonical — main is untouched.
        run: chorus-mcp-call.sh "${ROLE}" werk-deploy "$(printf '{"role":"%s","card_id":%s,"target":"werk"}' "${ROLE}" "${CARD_ID}")"

      - name: env-up
        # #3240 — env-up posts chorus/env-up/<card> via a step-level gh-status (the verb emits
        # spine/jsonl but not a gh status today). Silas's #3244 follow-on moves this INTO the
        # werk-deploy verb (self-reporting via shared emit_status) + carry-forward; until then
        # this step-wrap stands (Silas confirmed, standing down tonight). pending→success/failure.
        run: |
          WERK="${CHORUS_WERK_BASE}/${ROLE}-${CARD_ID}"; SHA=$(git -C "$WERK" rev-parse HEAD)
          post(){ gh api "repos/gathering-chorus/chorus/statuses/$SHA" -f "state=$1" -f "context=chorus/env-up/${CARD_ID}" -f "description=role=${ROLE} trace=${CHORUS_TRACE_ID:-}" >/dev/null 2>&1 || true; }
          post pending
          if chorus-mcp-call.sh "${ROLE}" werk-deploy "$(printf '{"role":"%s","card_id":%s,"env_up":true}' "${ROLE}" "${CARD_ID}")"; then post success; else post failure; exit 1; fi

      - name: demo
        # werk-demo (#3116; PRESENT-AND-EXIT since #3279). The proving ceremony against the
        # env-up'd slot: it PRESENTS the running variant + decision surface and EXITS. It no
        # longer BLOCKS for the go — blocking held the synchronous MCP call open for the whole
        # human wait, which dropped on long waits (#3277) and could not survive a 12h walk-away.
        # Half A of the pipeline ENDS here. Jeff's GO re-invokes chorus_werk with go:true (#3311). Failure
        # (variant didn't come up) stops the job → nothing to land.
        run: DEPLOY_ROLE="${ROLE}" werk-demo "${CARD_ID}"

      - name: presented
        # STOP-BEFORE-LAND (#3279, supersedes the stop-before-accept of the merged pipeline).
        # Half A is done: the variant is up and presented; NOTHING is held — no connection to
        # drop, no detached process to leak. Tell the human what to look at and how to land it.
        # The GO is a SEPARATE short run (Half B = werk-land.yml: merge → ff-sync → deploy-prod
        # → accept; GO = accept, #3311), so the wait holds nothing and survives a 12h walk-away.
        # no-go/more = simply don't land; the werk is preserved for iteration.
        run: |
          echo "[presented] #${CARD_ID} — variant up, demo presented. Half A done; NOTHING is held."
          echo "  Look at the variant, then your call (Half B — a separate short run):"
          echo "    GO         → chorus_werk {role:${ROLE}, card_id:${CARD_ID}, go:true}   (merge → ff-sync → deploy-prod → accept)"
          echo "    no-go/more → do nothing; the werk is preserved for iteration."

      # --- orchestrator witness close (pairs with werk.started) ---
      - name: werk-presented
        # #3279 — Half A success = PRESENTED, not landed. The card is up for review; nothing
        # has merged or deployed. werk.landed is emitted by Half B (werk-land.yml) on the go.
        if: success()
        run: |
          ts=$(($(date +%s)*1000))  # BSD date has no %3N — the old form wrote a literal N, corrupting every witness line (#3266)
          printf '{"ts":%s,"event":"werk.presented","card_id":%s,"role":"%s","accepter":"%s","trace_id":"%s","status":"success"}\n' \
            "$ts" "${CARD_ID}" "${ROLE}" "${ACCEPTER}" "${CHORUS_TRACE_ID}" \
            >> "${CHORUS_HOME}/ops/logs/werk.jsonl" 2>/dev/null || true

      - name: werk-failed
        if: failure()
        run: |
          ts=$(($(date +%s)*1000))  # BSD date has no %3N — the old form wrote a literal N, corrupting every witness line (#3266)
          printf '{"ts":%s,"event":"werk.failed","card_id":%s,"role":"%s","accepter":"%s","trace_id":"%s","status":"failed"}\n' \
            "$ts" "${CARD_ID}" "${ROLE}" "${ACCEPTER}" "${CHORUS_TRACE_ID}" \
            >> "${CHORUS_HOME}/ops/logs/werk.jsonl" 2>/dev/null || true

# Stop-on-failure: GHA default — steps run in order, the job halts on first non-zero
# exit. A demo failure prevents merge/deploy; nothing half-lands. Accept never runs here
# (it's the human's, post-run). Each verb runs its OWN all-or-nothing rollback via MCP;
# the workflow just stops sequencing.
