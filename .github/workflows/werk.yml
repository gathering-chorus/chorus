name: werk

# werk — THE pipeline. ONE job, ONE run (#3499). There is no demo-half / land-half:
# the GO is given AT INVOKE (the `go` input), werk-demo PROVES in-run (gates, gathers,
# block-on-replies) and its EXIT CODE drives whether the next step runs. No inputs.go
# job fork, no second invocation, no cross-run witness — the demo→merge edge is a
# native in-run dependency, so it can't round-churn.
#
# werk-demo exit contract (#3237, go-at-invoke world — Wren aed9dd4e):
#   0 = proven AND go==true  → continue to merge  (gates recorded + both gathers replied in time)
#   2 = clean stop, job GREEN → presented, NOT landed  (go==false present-only / timeout / gates-pending)
#   1 = real error           → job fails red
# The demo step maps that rc to a step output `proven`; merge→sync→deploy→accept are
# gated `if: steps.demo.outputs.proven == 'true'`. rc=2 → those skip, job stays green.
#
# Every verb runs THROUGH MCP via chorus-mcp-call.sh (the single toolchain). Stop-on-
# failure is the GHA default — any verb's non-zero exit halts the job; nothing half-lands.

on:
  workflow_dispatch:
    inputs:
      card_id:
        description: "Card # to run through the pipeline (e.g. 3236). The trace key end-to-end."
        required: true
        type: string
      role:
        description: "Builder role whose werk runs (kade / silas / wren)."
        required: true
        type: string
      go:
        description: "GO AT INVOKE. {true|go|yes} = prove-and-land (merge→sync→deploy→accept if proven). false/absent = present-only, stop green."
        required: false
        type: string
        default: "false"
      accepter:
        description: "Authorizing identity (jeff / wren) (DEC-048) — whose GO lands the card. Required for a landing run (go=true); ignored present-only."
        required: false
        type: string
        default: ""

jobs:
  werk:
    runs-on: macos-latest
    # CHORUS_HOME / CHORUS_WERK_BASE / PATH inherited from the local shell act runs in
    # (chorus-env-setup.sh provides them). The workflow MUST NOT hardcode them.
    env:
      CARD_ID: ${{ inputs.card_id }}
      ROLE: ${{ inputs.role }}
      GO: ${{ inputs.go }}
      ACCEPTER: ${{ inputs.accepter }}

    steps:
      - name: shared-trace
        # Mint ONE trace for the whole run, propagate via $GITHUB_ENV so every later step
        # (and every verb subprocess the MCP server spawns) inherits CHORUS_TRACE_ID.
        run: |
          trace="$(date +%s%N)-$$"
          echo "CHORUS_TRACE_ID=$trace" >> "$GITHUB_ENV"
          echo "minted trace=$trace for card=#${CARD_ID} role=${ROLE} go=${GO} accepter=${ACCEPTER:-<none>}"
          mkdir -p "${CHORUS_HOME}/ops/logs" 2>/dev/null || true
          ts=$(($(date +%s)*1000))  # BSD date has no %3N (#3266)
          printf '{"ts":%s,"event":"werk.started","card_id":%s,"role":"%s","go":"%s","accepter":"%s","trace_id":"%s"}\n' \
            "$ts" "${CARD_ID}" "${ROLE}" "${GO}" "${ACCEPTER}" "$trace" \
            >> "${CHORUS_HOME}/ops/logs/werk.jsonl" 2>/dev/null || true

      # ═══ prove in the role's slot — never touches main until merge (gated on proven) ═══
      - name: commit
        # werk-commit, via MCP. Stages add-A in the card's werk + commits. Rebase onto
        # origin/main happens INSIDE commit under flock (#3186) — no separate rebase step.
        run: chorus-mcp-call.sh "${ROLE}" werk-commit "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: push
        run: chorus-mcp-call.sh "${ROLE}" werk-push "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: build
        # target=werk implied: builds the card's werk for the demo slot.
        run: chorus-mcp-call.sh "${ROLE}" werk-build "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: test
        # Hermetic gate (quality.yml parity): cargo per changed crate + jest per changed package.
        # ADVISORY until werk-test #3190 — posts chorus/test/<card> status, does NOT block.
        run: |
          set -o pipefail
          WERK="${CHORUS_WERK_BASE}/${ROLE}-${CARD_ID}"; SHA=$(git -C "$WERK" rev-parse HEAD)
          post(){ gh api "repos/gathering-chorus/chorus/statuses/$SHA" -f "state=$1" -f "context=chorus/test/${CARD_ID}" -f "description=role=${ROLE} trace=${CHORUS_TRACE_ID:-} (advisory until werk-test #3190)" >/dev/null 2>&1 || true; }
          post pending
          echo "-- test (hermetic, ADVISORY until werk-test #3190) in $WERK --"
          rc=0
          BASE=$(git -C "$WERK" merge-base origin/main HEAD 2>/dev/null || echo HEAD~1)
          CHANGED=$(git -C "$WERK" diff --name-only "$BASE"..HEAD)
          for crate in $(echo "$CHANGED" | grep -oE '^platform/services/[^/]+' | sort -u); do
            [ -f "$WERK/$crate/Cargo.toml" ] || continue
            echo "-- cargo: $crate --"
            ( cd "$WERK/$crate" && cargo test --lib --bins ) 2>&1 | tail -15 || rc=1
          done
          for pkg in platform/api platform/chorus-sdk platform/pulse platform/workflow-engine; do
            echo "$CHANGED" | grep -q "^$pkg/" || continue
            [ -d "$WERK/$pkg" ] || continue
            if [ ! -x "$WERK/$pkg/node_modules/.bin/jest" ] \
               && [ -n "$CHORUS_HOME" ] && [ -d "$CHORUS_HOME/$pkg/node_modules" ] \
               && cmp -s "$WERK/$pkg/package-lock.json" "$CHORUS_HOME/$pkg/package-lock.json"; then
              ln -sfn "$CHORUS_HOME/$pkg/node_modules" "$WERK/$pkg/node_modules"
            fi
            if [ -x "$WERK/$pkg/node_modules/.bin/jest" ]; then
              echo "-- jest: $pkg --"
              ( cd "$WERK/$pkg" && node_modules/.bin/jest --ci --forceExit --passWithNoTests ) 2>&1 | tail -12 || rc=1
            else
              echo "!! jest: $pkg CHANGED but deps unavailable — FAIL LOUD"; rc=1
            fi
          done
          if [ "$rc" = 0 ]; then post success; else post failure; fi
          echo "test: rc=$rc (advisory — does NOT block the pipeline until werk-test #3190)"

      - name: review
        # werk-review ADVISORY floor — records review.floor + chorus/review/<card> status.
        run: |
          WERK="${CHORUS_WERK_BASE}/${ROLE}-${CARD_ID}"; SHA=$(git -C "$WERK" rev-parse HEAD)
          post(){ gh api "repos/gathering-chorus/chorus/statuses/$SHA" -f "state=$1" \
            -f "context=chorus/review/${CARD_ID}" \
            -f "description=role=${ROLE} trace=${CHORUS_TRACE_ID:-} (advisory floor — #3193)" >/dev/null 2>&1 || true; }
          post pending
          out=$(DEPLOY_ROLE="${ROLE}" werk-review "${CARD_ID}" "${ROLE}" 2>&1) || true
          echo "$out"
          case "$out" in *"floor clean"*) post success ;; *) post failure ;; esac
          echo "review: advisory — floor findings inform the cold-eyes agent + the demo surface"

      - name: deploy-werk
        # target=werk: per-card slot for the demo, NOT canonical — main is untouched.
        run: chorus-mcp-call.sh "${ROLE}" werk-deploy "$(printf '{"role":"%s","card_id":%s,"target":"werk"}' "${ROLE}" "${CARD_ID}")"

      - name: env-up
        # posts chorus/env-up/<card>; fails the job if the slot doesn't come up.
        run: |
          WERK="${CHORUS_WERK_BASE}/${ROLE}-${CARD_ID}"; SHA=$(git -C "$WERK" rev-parse HEAD)
          post(){ gh api "repos/gathering-chorus/chorus/statuses/$SHA" -f "state=$1" -f "context=chorus/env-up/${CARD_ID}" -f "description=role=${ROLE} trace=${CHORUS_TRACE_ID:-}" >/dev/null 2>&1 || true; }
          post pending
          if chorus-mcp-call.sh "${ROLE}" werk-deploy "$(printf '{"role":"%s","card_id":%s,"env_up":true}' "${ROLE}" "${CARD_ID}")"; then post success; else post failure; exit 1; fi

      - name: demo
        id: demo
        # werk-demo PROVES in-run (#3499): runs the gates, sends the gathers, and when go==true
        # BLOCKS-POLL on the witness until both gathers reply (same round → zero churn) or
        # CHORUS_DEMO_BLOCK_TIMEOUT (600s). GO passed AT INVOKE as the 2nd positional.
        # Its exit code IS the gate — mapped to the `proven` output that gates the land steps.
        run: |
          set +e
          # #3519 — RECORD the human GO before the prove step. #3511 retired the at-invoke
          # go-flag (werk-demo's dispatch parses only the card and IGNORES the 2nd positional),
          # but the /cw land path was never reconnected to the go-RECORDING (`werk-demo go`).
          # So Jeff's go via `/cw <card> go` was never written → jeff_go_recorded found nothing
          # → exit 2 → re-present (it was NOT round-churn; the go simply never recorded).
          # Recorded under ACCEPTER (not ROLE) so #3511's self-accept guard stays closed:
          # the witness is the human authority, never the builder. Recorded here (after the
          # commit-step rebase) so round+patch_id match the round the prove step checks.
          case "${GO}" in
            true|go|yes|GO)
              if [ -z "${ACCEPTER}" ]; then echo "[demo] GO with no accepter — refusing (DEC-048)"; exit 1; fi
              PATH="$HOME/.local/bin:$PATH" DEPLOY_ROLE="${ACCEPTER}" werk-demo go "${CARD_ID}" ;;
          esac
          PATH="$HOME/.local/bin:$PATH" DEPLOY_ROLE="${ROLE}" werk-demo "${CARD_ID}" "${GO}"
          rc=$?
          set -e
          case "$rc" in
            0) echo "proven=true"  >> "$GITHUB_OUTPUT"; echo "[demo] proven + go → landing." ;;
            2) echo "proven=false" >> "$GITHUB_OUTPUT"; echo "[demo] presented, NOT landed (present-only / no-go / timeout)." ;;
            *) echo "[demo] error rc=$rc"; exit "$rc" ;;
          esac

      # ═══ land to prod — prod is a build of MAIN. Runs ONLY if the demo proved (go==true). ═══
      - name: merge
        if: ${{ steps.demo.outputs.proven == 'true' }}
        # werk-merge (#3175), via MCP. Resolves the OPEN PR for the current HEAD oid, squash-merges,
        # content-verifies. #3499: werk-merge no longer reads a demo witness — reaching this step
        # MEANS the in-run demo proved (the only-door is structural: this step is gated on proven).
        run: chorus-mcp-call.sh "${ROLE}" werk-merge "$(printf '{"role":"%s","card_id":%s}' "${ROLE}" "${CARD_ID}")"

      - name: sync
        if: ${{ steps.demo.outputs.proven == 'true' }}
        # canonical ff-sync so SCRIPT-only changes go LIVE; SYNC_OK gates the "live" claim.
        run: |
          if [ -n "${CHORUS_HOME:-}" ] \
             && git -C "$CHORUS_HOME" fetch -q origin main 2>/dev/null \
             && git -C "$CHORUS_HOME" merge --ff-only origin/main >/dev/null 2>&1; then
            echo "   [ok] canonical ff-synced to origin/main"
            echo "SYNC_OK=1" >> "$GITHUB_ENV"
          else
            echo "   [warn] canonical NOT ff-synced (unset/diverged/dirty) — run 'werk-sync recover'" >&2
            echo "SYNC_OK=0" >> "$GITHUB_ENV"
          fi

      - name: deploy-canonical
        if: ${{ steps.demo.outputs.proven == 'true' }}
        # target=canonical: prod is a build of MAIN. SELF-BUILDS from canonical@origin/main (#3222).
        run: chorus-mcp-call.sh "${ROLE}" werk-deploy "$(printf '{"role":"%s","card_id":%s,"target":"canonical"}' "${ROLE}" "${CARD_ID}")"

      - name: accept
        if: ${{ steps.demo.outputs.proven == 'true' }}
        # #3311 GO=ACCEPT: the GO given at invoke IS the acceptance. werk-accept's DEC-048 authority
        # gate runs INSIDE the verb (ACCEPTER is the authorizing identity; a builder can't self-accept).
        run: DEPLOY_ROLE="${ACCEPTER}" werk-accept "${CARD_ID}" "${ROLE}"

      - name: outcome
        if: success()
        # Tell the truth about the terminal state — landed (proven) vs presented (not proven).
        run: |
          if [ "${{ steps.demo.outputs.proven }}" = "true" ]; then
            if [ "${SYNC_OK:-0}" = "1" ]; then
              echo "[landed] #${CARD_ID} merged + deployed + LIVE, accepted by ${ACCEPTER} (GO=accept)."
            else
              echo "[accepted, NOT yet live] #${CARD_ID} merged + accepted, but canonical did NOT ff-sync — run 'werk-sync recover'." >&2
            fi
          else
            echo "[presented] #${CARD_ID} — variant up, presented, NOT landed (present-only / no-go / timeout). Re-invoke with go to land."
          fi

      # --- orchestrator witness close ---
      - name: witness-close
        if: success()
        run: |
          ts=$(($(date +%s)*1000))  # BSD date has no %3N (#3266)
          if [ "${{ steps.demo.outputs.proven }}" = "true" ]; then ev="werk.landed"; else ev="werk.presented"; fi
          printf '{"ts":%s,"event":"%s","card_id":%s,"role":"%s","accepter":"%s","trace_id":"%s","status":"success","sync_ok":"%s"}\n' \
            "$ts" "$ev" "${CARD_ID}" "${ROLE}" "${ACCEPTER}" "${CHORUS_TRACE_ID}" "${SYNC_OK:-0}" \
            >> "${CHORUS_HOME}/ops/logs/werk.jsonl" 2>/dev/null || true

      - name: witness-failed
        if: failure()
        run: |
          ts=$(($(date +%s)*1000))  # BSD date has no %3N (#3266)
          printf '{"ts":%s,"event":"werk.failed","card_id":%s,"role":"%s","accepter":"%s","trace_id":"%s","status":"failed"}\n' \
            "$ts" "${CARD_ID}" "${ROLE}" "${ACCEPTER}" "${CHORUS_TRACE_ID}" \
            >> "${CHORUS_HOME}/ops/logs/werk.jsonl" 2>/dev/null || true

# Stop-on-failure: GHA default — steps run in order, the job halts on first non-zero exit.
# The demo step's rc=0/2 are CLEAN (caught + mapped to `proven`); only a real error (rc=1)
# or a verb failure halts the job. merge→sync→deploy→accept are gated on proven — they run
# only when the in-run demo proved (go==true). No second invocation, no witness wall.
