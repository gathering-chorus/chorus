name: building-pipeline

# #2774: building-pipeline — fires on canonical main update via launchd plist
# (com.chorus.building-pipeline). Sequences build → deploy through the chorus-build
# and chorus-deploy CLIs. Per-step spine events (build.completed, deploy.completed)
# carry the crate-level signal; per-binary events (build.artifact.hashed,
# binary.deployed) carry the artifact detail.
#
# Tool: act (per ADR-030). Runs locally on Library via host-native macOS execution
# (-P macos-latest=-self-hosted), so codesign + TCC + AppleEvents work natively.
# act execution is fired by the launchd plist; this workflow is also valid GHA
# YAML and could run on hosted/self-hosted GHA runners unchanged.

on: [workflow_dispatch]

jobs:
  # Sequential-fail-fast is the implicit policy: steps run in order, the job
  # stops on the first non-zero exit (GHA default). So chorus-hooks deploy
  # failure halts the workflow before chorus-inject runs. This matches today's
  # ops preference (investigate before continuing to deploy more). Per-crate
  # independence (one crate failure doesn't block other crates) is NOT
  # expressed here — to get that, split into separate jobs with no `needs:`
  # between them so they run in parallel and one's failure doesn't fail the
  # others. Filed as follow-on if the cross-crate-independence semantics
  # become useful (today: fail-fast is correct).
  build-and-deploy:
    runs-on: macos-latest
    steps:
      - name: identity
        run: |
          echo "host=$(hostname)"
          echo "user=$(whoami)"
          echo "commit=$(git -C /Users/jeffbridwell/CascadeProjects/chorus rev-parse --short HEAD 2>/dev/null || echo unknown)"

      # #3023 — trace context across the launchd boundary. chorus_acp writes
      # /tmp/chorus-acp-release-trace.json before kickstart (kickstart doesn't
      # carry env; the squash strips trailers — a file is the only channel).
      # Loading it into $GITHUB_ENV makes every build/deploy step below inherit
      # CHORUS_TRACE_ID/CHORUS_CARD_ID/CHORUS_BRANCH, which chorus-log's env
      # bridge (#2857 trace/card, #3023 branch) then stamps onto build.completed
      # / deploy.completed — so they link to the acp's trace instead of firing
      # trace-less as role=system.
      - name: trace context
        run: |
          F=/tmp/chorus-acp-release-trace.json
          if [ -f "$F" ]; then
            TRACE=$(python3 -c "import json;print(json.load(open('$F')).get('trace_id',''))" 2>/dev/null)
            CARD=$(python3 -c "import json;print(json.load(open('$F')).get('card_id',''))" 2>/dev/null)
            BRANCH=$(python3 -c "import json;print(json.load(open('$F')).get('branch',''))" 2>/dev/null)
            [ -n "$TRACE" ] && echo "CHORUS_TRACE_ID=$TRACE" >> "$GITHUB_ENV"
            [ -n "$CARD" ] && echo "CHORUS_CARD_ID=$CARD" >> "$GITHUB_ENV"
            [ -n "$BRANCH" ] && echo "CHORUS_BRANCH=$BRANCH" >> "$GITHUB_ENV"
            echo "trace context: trace=$TRACE card=$CARD branch=$BRANCH"
          else
            echo "no acp release-trace file — pipeline runs trace-less (manual kickstart?)"
          fi

      - name: chorus-build chorus-hooks
        run: |
          export CHORUS_ROOT=/Users/jeffbridwell/CascadeProjects/chorus
          export DEPLOY_ROLE=system
          /Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/chorus-build chorus-hooks

      - name: chorus-deploy chorus-hooks
        run: |
          export CHORUS_ROOT=/Users/jeffbridwell/CascadeProjects/chorus
          export DEPLOY_ROLE=system
          /Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/chorus-deploy chorus-hooks

      - name: chorus-build chorus-inject
        run: |
          export CHORUS_ROOT=/Users/jeffbridwell/CascadeProjects/chorus
          export DEPLOY_ROLE=system
          /Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/chorus-build chorus-inject

      - name: chorus-deploy chorus-inject
        run: |
          export CHORUS_ROOT=/Users/jeffbridwell/CascadeProjects/chorus
          export DEPLOY_ROLE=system
          /Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/chorus-deploy chorus-inject

      # #2870 — unconditional chorus-api deploy. Reverses #2831 path-filter
      # which used `git diff HEAD~1 HEAD | grep platform/api/src` and silently
      # skipped deploy when canonical advanced multiple commits and the LAST
      # commit didn't touch the API — even if an earlier commit did. Result:
      # three /acps today (#2863, #2865, #2868) shipped to a stale daemon.
      #
      # #2831's concern about restart cascade was real but smaller than the
      # silent-skip cost. npm run build is idempotent and fast (<5s) when
      # there's nothing new to compile; daemon kickstart is ~2s. Per Jeff:
      # "deploy MUST send latest canonical updates to target directory" —
      # every pipeline run honors that, no skips.
      - name: chorus-deploy chorus-api
        run: |
          export CHORUS_ROOT=/Users/jeffbridwell/CascadeProjects/chorus
          export DEPLOY_ROLE=system
          /Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/chorus-deploy chorus-api

      # #3001 — chorus-mcp auto-deploy. Without this step, chorus-mcp code
      # changes ship to main but the running daemon stays on the last manual
      # deploy. Caught 2026-05-18 when #3000's error capture code didn't
      # actually run until manual chorus-deploy chorus-mcp post-merge.
      - name: chorus-deploy chorus-mcp
        run: |
          export CHORUS_ROOT=/Users/jeffbridwell/CascadeProjects/chorus
          export DEPLOY_ROLE=system
          /Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/chorus-deploy chorus-mcp

      # #3110: build + deploy all 7 werk-* verb binaries via the unified
      # chorus-deploy --all werk path. Replaces install-werk-verbs.sh as the
      # CI install entry point (script retired to a thin backward-compat shim
      # that exec's chorus-deploy --all werk). Without this step, werk-* source
      # merges to main but never reaches the runtime ~/.chorus/bin/<verb>-bin —
      # the exact merged-≠-live class that bit /acp-v2 #3108 on the May 27
      # pre-#3107 binary. Now closed at the substrate.
      - name: chorus-deploy --all werk (7 verb binaries)
        run: |
          export CHORUS_ROOT=/Users/jeffbridwell/CascadeProjects/chorus
          export DEPLOY_ROLE=system
          /Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/chorus-deploy --all werk
