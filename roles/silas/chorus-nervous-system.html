<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chorus Nervous System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  svg { width: 100vw; height: 100vh; }

  .glow-green { filter: drop-shadow(0 0 6px #4ade80) drop-shadow(0 0 12px #4ade8066); }
  .glow-blue { filter: drop-shadow(0 0 6px #60a5fa) drop-shadow(0 0 12px #60a5fa66); }
  .glow-orange { filter: drop-shadow(0 0 6px #fb923c) drop-shadow(0 0 12px #fb923c66); }
  .glow-purple { filter: drop-shadow(0 0 6px #c084fc) drop-shadow(0 0 12px #c084fc66); }
  .glow-gold { filter: drop-shadow(0 0 6px #fbbf24) drop-shadow(0 0 12px #fbbf2466); }
  .glow-white { filter: drop-shadow(0 0 4px #e6edf3) drop-shadow(0 0 8px #e6edf366); }
  .glow-red { filter: drop-shadow(0 0 6px #f87171) drop-shadow(0 0 12px #f8717166); }
  .glow-cyan { filter: drop-shadow(0 0 6px #22d3ee) drop-shadow(0 0 12px #22d3ee66); }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes drift {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  .pulse { animation: pulse 2s ease-in-out infinite; }
  .pulse-delay-1 { animation: pulse 2s ease-in-out infinite 0.5s; }
  .pulse-delay-2 { animation: pulse 2s ease-in-out infinite 1s; }
  .pulse-delay-3 { animation: pulse 2s ease-in-out infinite 1.5s; }

  .title { font-size: 28px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }
  .subtitle { font-size: 13px; letter-spacing: 2px; opacity: 0.5; }
  .label { font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
  .label-small { font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; opacity: 0.7; }
  .label-tiny { font-size: 9px; letter-spacing: 0.8px; opacity: 0.5; }

  .nerve { fill: none; stroke-width: 2; stroke-linecap: round; }

  .draggable { cursor: grab; }
  .draggable:active { cursor: grabbing; }
  .draggable:hover circle, .draggable:hover rect { opacity: 1 !important; }

  #toolbar {
    position: fixed;
    bottom: 16px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 100;
  }
  #toolbar button {
    background: #1a1a2e;
    color: #c9d1d9;
    border: 1px solid #333;
    padding: 8px 14px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
  }
  #toolbar button:hover { background: #2a2a4e; border-color: #555; }
  #toast {
    position: fixed;
    bottom: 56px;
    right: 16px;
    background: #4ade80;
    color: #0a0a0f;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="toolbar">
  <button onclick="resetPositions()">Reset</button>
  <button onclick="exportPositions()">Export Layout</button>
</div>
<div id="toast">Copied to clipboard</div>

<svg id="canvas" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#f59e0b" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#d97706" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="brainGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="jeffGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e6edf3" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e6edf3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background grid -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="800" fill="url(#grid)"/>
  </g>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="title" fill="#e6edf3" opacity="0.9">Chorus</text>
  <text x="600" y="48" text-anchor="middle" class="subtitle" fill="#c084fc">The Nervous System</text>

  <!-- ==================== NERVES (drawn first, behind nodes) ==================== -->
  <g id="nerves"></g>

  <!-- ==================== DRAGGABLE NODES ==================== -->

  <!-- Senses Row -->
  <g id="node-look" class="draggable" data-node="look">
    <circle r="34" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
    <circle r="22" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
    <circle r="5" fill="#22d3ee" opacity="0.8" class="glow-cyan"/>
    <text y="-42" text-anchor="middle" class="label" fill="#22d3ee" font-size="12">/look</text>
    <text y="48" text-anchor="middle" class="label-tiny" fill="#22d3ee">eyes</text>
  </g>

  <g id="node-listen" class="draggable" data-node="listen">
    <circle r="34" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
    <circle r="22" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
    <ellipse rx="15" ry="10" fill="none" stroke="#22d3ee" stroke-width="0.7" opacity="0.2" class="pulse-delay-1"/>
    <circle r="5" fill="#22d3ee" opacity="0.8" class="glow-cyan"/>
    <text y="-42" text-anchor="middle" class="label" fill="#22d3ee" font-size="12">/listen</text>
    <text y="48" text-anchor="middle" class="label-tiny" fill="#22d3ee">ears</text>
  </g>

  <g id="node-talk" class="draggable" data-node="talk">
    <circle r="34" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25" stroke-dasharray="4 4"/>
    <circle r="22" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.15" stroke-dasharray="4 4"/>
    <circle r="4" fill="#22d3ee" opacity="0.3"/>
    <text y="-42" text-anchor="middle" class="label" fill="#22d3ee" font-size="12" opacity="0.4">/talk</text>
    <text y="48" text-anchor="middle" class="label-tiny" fill="#22d3ee" opacity="0.4">voice</text>
  </g>

  <!-- Interaction Row -->
  <g id="node-clearing" class="draggable" data-node="clearing">
    <circle r="34" fill="none" stroke="#e6edf3" stroke-width="1.5" opacity="0.3"/>
    <circle r="22" fill="none" stroke="#e6edf3" stroke-width="1" opacity="0.2"/>
    <!-- Participant dots -->
    <circle cx="0" cy="-12" r="3" fill="#e6edf3" opacity="0.7"/>
    <circle cx="11" cy="8" r="2.5" fill="#4ade80" opacity="0.6"/>
    <circle cx="-11" cy="8" r="2.5" fill="#60a5fa" opacity="0.6"/>
    <circle cx="0" cy="14" r="2.5" fill="#fb923c" opacity="0.6"/>
    <text y="-42" text-anchor="middle" class="label" fill="#e6edf3" opacity="0.7">/clearing</text>
    <text y="48" text-anchor="middle" class="label-tiny" fill="#e6edf3">alignment</text>
  </g>

  <!-- Jeff node removed — /Werk label is now on the spine container -->

  <g id="node-chorus" class="draggable" data-node="chorus">
    <circle r="34" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.5"/>
    <circle r="22" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.35" class="pulse-delay-1"/>
    <!-- Brain folds -->
    <path d="M -10,-5 C -3,-11 3,-11 10,-5" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.4"/>
    <path d="M -7,1 C -1,-4 1,-4 7,1" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.3"/>
    <path d="M -10,7 C -3,2 3,2 10,7" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.4"/>
    <circle r="4" fill="#c084fc" opacity="0.7" class="glow-purple"/>
    <text y="-42" text-anchor="middle" class="label" fill="#c084fc">/chorus</text>
    <text y="48" text-anchor="middle" class="label-tiny" fill="#c084fc">memory</text>
  </g>

  <!-- Spine Container — encloses the value stream -->
  <g id="node-spine" class="draggable" data-node="spine">
    <!-- Transparent hit area for drag -->
    <rect x="-80" y="-45" width="160" height="340" rx="24" fill="#0a0a0f" opacity="0.01" style="cursor:grab"/>
    <rect x="-80" y="-30" width="160" height="310" rx="24" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.2"/>
    <rect x="-80" y="-30" width="160" height="310" rx="24" fill="url(#spineGrad)" opacity="0.04"/>
    <text x="0" y="-40" text-anchor="middle" class="label" fill="#fbbf24" letter-spacing="3px">/Werk</text>
    <text x="0" y="292" text-anchor="middle" class="label-tiny" fill="#fbbf24">the spine · event bus</text>
    <!-- Vertebrae are inside the container -->
    <!-- V1: Capturing (y offset 0) -->
    <rect x="-55" y="-2" width="110" height="32" rx="16" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
    <text text-anchor="middle" y="19" class="label" fill="#fbbf24" font-size="11">Capturing</text>
    <!-- V2: Directing (y offset 60) -->
    <rect x="-55" y="58" width="110" height="32" rx="16" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
    <text text-anchor="middle" y="79" class="label" fill="#fbbf24" font-size="11">Directing</text>
    <!-- V3: Designing (y offset 120) -->
    <rect x="-55" y="118" width="110" height="32" rx="16" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
    <text text-anchor="middle" y="139" class="label" fill="#fbbf24" font-size="11">Designing</text>
    <!-- V4: Building (y offset 180) -->
    <rect x="-55" y="178" width="110" height="32" rx="16" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
    <text text-anchor="middle" y="199" class="label" fill="#fbbf24" font-size="11">Building</text>
    <!-- V5: Proving (y offset 240) -->
    <rect x="-55" y="238" width="110" height="32" rx="16" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.35"/>
    <text text-anchor="middle" y="259" class="label" fill="#fbbf24" font-size="11">Proving</text>
    <!-- Spine connectors -->
    <line x1="0" y1="30" x2="0" y2="58" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="90" x2="0" y2="118" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="150" x2="0" y2="178" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="210" x2="0" y2="238" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
    <!-- Signal traveling spine -->
    <circle r="4" fill="#fbbf24" class="glow-gold">
      <animate attributeName="cy" values="-2;270;-2" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Role tags (connect to spine container) -->
  <g id="node-wren-tag" class="draggable" data-node="wren-tag">
    <circle r="34" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
    <circle r="22" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.3" class="pulse"/>
    <circle r="5" fill="#4ade80" opacity="0.8" class="glow-green"/>
    <text y="-42" text-anchor="middle" class="label" fill="#4ade80" font-size="11">Wren</text>
    <text y="48" text-anchor="middle" class="label-tiny" fill="#4ade80">product</text>
  </g>

  <g id="node-jeff-tag" class="draggable" data-node="jeff-tag">
    <circle r="34" fill="none" stroke="#e6edf3" stroke-width="1.5" opacity="0.4"/>
    <circle r="22" fill="none" stroke="#e6edf3" stroke-width="1" opacity="0.25"/>
    <circle r="5" fill="#e6edf3" opacity="0.8" class="glow-white"/>
    <text y="-42" text-anchor="middle" class="label" fill="#e6edf3" font-size="11">Jeff</text>
    <text y="48" text-anchor="middle" class="label-tiny" fill="#e6edf3">directs</text>
  </g>

  <g id="node-silas-tag" class="draggable" data-node="silas-tag">
    <circle r="34" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>
    <circle r="22" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.3" class="pulse-delay-1"/>
    <circle r="5" fill="#60a5fa" opacity="0.8" class="glow-blue"/>
    <text y="-42" text-anchor="middle" class="label" fill="#60a5fa" font-size="11">Silas</text>
    <text y="48" text-anchor="middle" class="label-tiny" fill="#60a5fa">architecture</text>
  </g>

  <g id="node-kade-tag" class="draggable" data-node="kade-tag">
    <circle r="34" fill="none" stroke="#fb923c" stroke-width="1.5" opacity="0.5"/>
    <circle r="22" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.3" class="pulse-delay-2"/>
    <circle r="5" fill="#fb923c" opacity="0.8" class="glow-orange"/>
    <text y="-42" text-anchor="middle" class="label" fill="#fb923c" font-size="11">Kade</text>
    <text y="48" text-anchor="middle" class="label-tiny" fill="#fb923c">engineering</text>
  </g>

  <g id="node-borg-tag" class="draggable" data-node="borg-tag">
    <circle r="34" fill="none" stroke="#f87171" stroke-width="1.5" opacity="0.3"/>
    <circle r="22" fill="none" stroke="#f87171" stroke-width="1" opacity="0.2">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle r="12" fill="none" stroke="#f87171" stroke-width="0.8" opacity="0.25">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5" fill="#f87171" opacity="0.6" class="glow-red"/>
    <text y="-42" text-anchor="middle" class="label" fill="#f87171" font-size="10" opacity="0.7">Borg</text>
    <text y="48" text-anchor="middle" class="label-tiny" fill="#f87171">decompose</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 760)">
    <text class="label-small" fill="#e6edf3" opacity="0.4">Drag nodes to reposition · Export saves layout</text>
  </g>
  <g transform="translate(1170, 780)">
    <text text-anchor="end" class="label-tiny" fill="#4ade80" opacity="0.4">INTERACTIVE</text>
  </g>
  <text x="600" y="790" text-anchor="middle" class="label-tiny" fill="#e6edf3" opacity="0.2">
    Pattern: US9552400B2 — Ontology + Agents + Workflow Gates
  </text>

</svg>

<script>
// ==================== NODE POSITIONS ====================
const defaultPositions = {
  'look':        { x: 620, y: 192 },
  'listen':      { x: 514, y: 192 },
  'talk':        { x: 700, y: 263 },
  'clearing':    { x: 420, y: 269 },
  'chorus':      { x: 738, y: 371 },
  'spine':       { x: 559, y: 302 },
  'wren-tag':    { x: 380, y: 381 },
  'jeff-tag':    { x: 381, y: 495 },
  'silas-tag':   { x: 422, y: 610 },
  'kade-tag':    { x: 685, y: 618 },
  'borg-tag':    { x: 739, y: 496 },
};

// Try to load saved positions from localStorage
let positions;
const saved = localStorage.getItem('chorus-nervous-system-positions');
if (saved) {
  try { positions = JSON.parse(saved); } catch(e) { positions = null; }
}
// If saved positions have stale keys (old nodes), reset
if (!positions || positions['jeff'] || positions['capturing']) {
  localStorage.removeItem('chorus-nervous-system-positions');
  positions = JSON.parse(JSON.stringify(defaultPositions));
}

// ==================== CONNECTIONS ====================
const connections = [
  // Senses → Spine (input feeds the value stream)
  { from: 'look', to: 'spine', color: '#22d3ee', opacity: 0.35 },
  { from: 'listen', to: 'spine', color: '#22d3ee', opacity: 0.35 },
  // Clearing → Spine (decisions feed the value stream)
  { from: 'clearing', to: 'spine', color: '#e6edf3', opacity: 0.25 },
  // Chorus ↔ Spine (memory feeds and records)
  { from: 'chorus', to: 'spine', color: '#c084fc', opacity: 0.3 },
  // Roles → Spine (everyone connects to the value stream)
  { from: 'wren-tag', to: 'spine', color: '#4ade80', opacity: 0.35 },
  { from: 'jeff-tag', to: 'spine', color: '#e6edf3', opacity: 0.3 },
  { from: 'silas-tag', to: 'spine', color: '#60a5fa', opacity: 0.35 },
  { from: 'kade-tag', to: 'spine', color: '#fb923c', opacity: 0.35 },
  // Borg → Spine (decomposition feeds the value stream)
  { from: 'borg-tag', to: 'spine', color: '#f87171', opacity: 0.25 },
  // Borg ↔ Chorus (analysis feeds memory)
  { from: 'borg-tag', to: 'chorus', color: '#f87171', opacity: 0.1, dash: '4 4' },
  // Clearing → Chorus (transcripts to memory)
  { from: 'clearing', to: 'chorus', color: '#c084fc', opacity: 0.12, dash: '4 4' },
];

// ==================== RENDERING ====================
const svg = document.getElementById('canvas');
const nervesGroup = document.getElementById('nerves');

function applyPositions() {
  for (const [id, pos] of Object.entries(positions)) {
    const el = document.getElementById('node-' + id);
    if (el) {
      el.setAttribute('transform', `translate(${pos.x}, ${pos.y})`);
    }
  }
  drawNerves();
}

function drawNerves() {
  nervesGroup.innerHTML = '';
  for (const conn of connections) {
    const from = positions[conn.from];
    const to = positions[conn.to];
    if (!from || !to) continue;

    const dx = to.x - from.x;
    const dy = to.y - from.y;
    // Curve control points — slight bow perpendicular to the line
    const mx = (from.x + to.x) / 2;
    const my = (from.y + to.y) / 2;
    const cx1 = mx - dy * 0.1;
    const cy1 = my + dx * 0.1;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${from.x},${from.y} Q ${cx1},${cy1} ${to.x},${to.y}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', conn.color);
    path.setAttribute('stroke-width', '2');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('opacity', conn.opacity);
    if (conn.dash) path.setAttribute('stroke-dasharray', conn.dash);
    nervesGroup.appendChild(path);

    // Animated signal dot
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('r', '3');
    circle.setAttribute('fill', conn.color);
    circle.setAttribute('opacity', '0');

    const animMotion = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
    animMotion.setAttribute('dur', (1.5 + Math.random() * 2) + 's');
    animMotion.setAttribute('repeatCount', 'indefinite');
    animMotion.setAttribute('path', `M ${from.x},${from.y} Q ${cx1},${cy1} ${to.x},${to.y}`);

    const animOpacity = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
    animOpacity.setAttribute('attributeName', 'opacity');
    animOpacity.setAttribute('values', `0;${Math.min(conn.opacity * 2, 0.8)};${Math.min(conn.opacity * 2, 0.8)};0`);
    animOpacity.setAttribute('dur', (1.5 + Math.random() * 2) + 's');
    animOpacity.setAttribute('repeatCount', 'indefinite');

    circle.appendChild(animMotion);
    circle.appendChild(animOpacity);
    nervesGroup.appendChild(circle);
  }
}

// ==================== DRAG ====================
let dragTarget = null;
let dragOffset = { x: 0, y: 0 };

function svgPoint(evt) {
  const pt = svg.createSVGPoint();
  pt.x = evt.clientX;
  pt.y = evt.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

svg.addEventListener('mousedown', function(evt) {
  const node = evt.target.closest('.draggable');
  if (!node) return;
  const id = node.dataset.node;
  if (!id || !positions[id]) return;

  dragTarget = id;
  const pt = svgPoint(evt);
  dragOffset.x = pt.x - positions[id].x;
  dragOffset.y = pt.y - positions[id].y;
  evt.preventDefault();
});

svg.addEventListener('mousemove', function(evt) {
  if (!dragTarget) return;
  const pt = svgPoint(evt);
  positions[dragTarget].x = Math.round(pt.x - dragOffset.x);
  positions[dragTarget].y = Math.round(pt.y - dragOffset.y);

  const el = document.getElementById('node-' + dragTarget);
  el.setAttribute('transform', `translate(${positions[dragTarget].x}, ${positions[dragTarget].y})`);
  drawNerves();
});

svg.addEventListener('mouseup', function() {
  if (dragTarget) {
    localStorage.setItem('chorus-nervous-system-positions', JSON.stringify(positions));
    dragTarget = null;
  }
});

svg.addEventListener('mouseleave', function() {
  if (dragTarget) {
    localStorage.setItem('chorus-nervous-system-positions', JSON.stringify(positions));
    dragTarget = null;
  }
});

// ==================== TOOLBAR ====================
function resetPositions() {
  Object.assign(positions, JSON.parse(JSON.stringify(defaultPositions)));
  localStorage.removeItem('chorus-nervous-system-positions');
  applyPositions();
}

function exportPositions() {
  const json = JSON.stringify(positions, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  });
}

// ==================== INIT ====================
applyPositions();
</script>
</body>
</html>
