# startup-sync-failure.yml — Alert when app startup SMS sync fails
# Card #2000
#
# Every app restart triggers SMS seed sync. It has failed on every
# boot today (2026-04-03) due to triple-quote escape bug in stored seeds.
# This is logged as "non-fatal" but masks real data loss.

name: startup-sync-failure
description: App startup SMS sync failed — stored seeds not loading
severity: warning
schedule: "*/5 * * * *"  # every 5 minutes

check: |
  NOW=$(date +%s)
  START=$(( NOW - 300 ))
  RESULT=$(curl -sf --max-time 5 -G "http://localhost:3102/loki/api/v1/query_range" \
    --data-urlencode 'query={job=~"gathering.*"} |~ "Startup SMS sync failed"' \
    --data-urlencode "start=${START}000000000" \
    --data-urlencode "end=${NOW}000000000" \
    --data-urlencode "limit=1" 2>/dev/null)
  COUNT=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum(len(r.get('values',[])) for r in d.get('data',{}).get('result',[])))" 2>/dev/null || echo "0")
  if [[ "$COUNT" == "0" ]]; then
    echo "ok"
    exit 0
  fi
  # Sync failed — but check if Fuseki is healthy before alerting (#1895)
  # Transient failures during Fuseki restart cascade are noise, not signal.
  FUSEKI_OK=$(curl -sf --max-time 2 -G "http://localhost:3030/pods/sparql" \
    --data-urlencode 'query=SELECT 1 WHERE {}' \
    -H 'Accept: application/json' -o /dev/null -w '%{http_code}' 2>/dev/null || echo "000")
  if [[ "$FUSEKI_OK" == "200" ]]; then
    echo "ok — fuseki healthy, sync failure was transient"
    exit 0
  fi
  echo "failed:$COUNT"
  exit 1

action: |
  # Nudge Silas — alerts go to roles, not the Clearing
  NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/nudge"
  "$NUDGE" silas "startup-sync: FAILED — stored seeds not loading after app restart. Fix: check Fuseki readiness, check Loki for triple-quote escape bugs in stored seeds, restart app if Fuseki was slow to start" --force 2>/dev/null || true
  curl -sf -X POST http://localhost:3470/api/message \
    -H 'Content-Type: application/json' \
    -d "$(jq -n --arg text '[alert] startup sync FAILED' --arg from 'system' '{from: $from, text: $text}')" \
    &>/dev/null || true
