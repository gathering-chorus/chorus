# startup-sync-failure.yml — Alert when app startup sync fails AND Fuseki is down (#2056)
#
# The SMS sync fails on every restart when Twilio credentials expire (401).
# That's a credential issue, not data loss. Only alert when Fuseki is actually
# unreachable — that's the only case where stored data is at risk.
#
# Prior art: #2000 (triple-quote bug, fixed), #1895 (Fuseki health suppression)

name: startup-sync-failure
description: App startup sync failed with Fuseki down — potential data access issue
severity: warning
schedule: "*/5 * * * *"

check: |
  # Step 1: Is Fuseki healthy? If yes, no alert needed — sync failures
  # without Fuseki being down are credential issues (Twilio 401), not data loss.
  FUSEKI_OK=$(curl -sf --max-time 3 -o /dev/null -w '%{http_code}' \
    "http://localhost:3030/$/ping" 2>/dev/null || echo "000")
  if [[ "$FUSEKI_OK" == "200" ]]; then
    echo "ok"
    exit 0
  fi

  # Step 2: Fuseki is down. Check if there was also a sync failure recently.
  NOW=$(date +%s)
  START=$(( NOW - 300 ))
  RESULT=$(curl -sf --max-time 5 -G "http://localhost:3102/loki/api/v1/query_range" \
    --data-urlencode 'query={job=~"gathering.*"} |~ "sync failed"' \
    --data-urlencode "start=${START}000000000" \
    --data-urlencode "end=${NOW}000000000" \
    --data-urlencode "limit=3" 2>/dev/null)
  COUNT=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum(len(r.get('values',[])) for r in d.get('data',{}).get('result',[])))" 2>/dev/null || echo "0")
  if [[ "$COUNT" == "0" ]]; then
    echo "ok — fuseki down but no sync failures"
    exit 0
  fi

  # Extract actual error message from logs
  ERROR_MSG=$(echo "$RESULT" | python3 -c "
import sys,json
d=json.load(sys.stdin)
for r in d.get('data',{}).get('result',[]):
  for ts,msg in r.get('values',[]):
    try:
      j=json.loads(msg)
      print(j.get('error',j.get('message','unknown error'))[:150])
    except: print(msg[:150])
    sys.exit(0)
print('unknown')
" 2>/dev/null || echo "unknown")
  echo "failed:fuseki_down+sync_error:$ERROR_MSG"
  exit 1

action: |
  COOLDOWN="/tmp/alert-startup-sync-$(date '+%Y-%m-%d-%H')"
  if [ -f "$COOLDOWN" ]; then
    exit 0
  fi
  touch "$COOLDOWN"

  # Pull actual error from Loki — never hardcode the message
  NOW=$(date +%s)
  START=$(( NOW - 300 ))
  ERROR_DETAIL=$(curl -sf --max-time 5 -G "http://localhost:3102/loki/api/v1/query_range" \
    --data-urlencode 'query={job=~"gathering.*"} |~ "sync failed"' \
    --data-urlencode "start=${START}000000000" \
    --data-urlencode "end=${NOW}000000000" \
    --data-urlencode "limit=1" 2>/dev/null | python3 -c "
import sys,json
d=json.load(sys.stdin)
for r in d.get('data',{}).get('result',[]):
  for ts,msg in r.get('values',[]):
    try:
      j=json.loads(msg)
      print(f'{j.get(\"message\",\"sync failed\")}: {j.get(\"error\",\"no details\")}')
    except: print(msg[:200])
    sys.exit(0)
print('sync failed — check Loki for details')
" 2>/dev/null || echo "sync failed — could not fetch details from Loki")

  OPS_NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/ops-nudge"
  "$OPS_NUDGE" silas "startup-sync alert: Fuseki is DOWN and sync failed. Error: $ERROR_DETAIL" 2>/dev/null || true
