# fuseki-harvest-stale.yml — Alert when no new data has been harvested into Fuseki
# Card #1857 | AC3
#
# The photo harvest pipeline should be inserting new records regularly.
# If no new triples have appeared in harvest graphs for 7 days,
# the pipeline may be silently broken.

name: fuseki-harvest-stale
description: No new harvest data in Fuseki — pipeline may be broken
severity: warning
schedule: "0 8 * * *"  # daily at 8am

check: |
  # #2327 — extracted to a script so three states (unreachable/empty/ok) are
  # distinguished: curl failure → exit 0 (skip, log), count=0 → exit 1 (fire),
  # count>0 → exit 0 (ok). Prior version conflated unreachable with empty.
  export FUSEKI_SKIP_LOG="/tmp/fuseki-harvest-skip.log"
  /Users/jeffbridwell/CascadeProjects/chorus/proving/domains/alerts/fuseki-harvest-stale.check.sh

action: |
  COOLDOWN="/tmp/alert-fuseki-harvest-stale-$(date '+%Y-%m-%d')"
  if [ -f "$COOLDOWN" ]; then
    exit 0
  fi
  touch "$COOLDOWN"
  OPS_NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/ops-nudge"
  "$OPS_NUDGE" silas "fuseki-harvest: SPARQL COUNT of photo triples in the harvest graph = 0" 2>/dev/null || true
