# fuseki-harvest-stale.yml — Alert when no new data has been harvested into Fuseki
# Card #1857 | AC3
#
# The photo harvest pipeline should be inserting new records regularly.
# If no new triples have appeared in harvest graphs for 7 days,
# the pipeline may be silently broken.

name: fuseki-harvest-stale
description: No new harvest data in Fuseki — pipeline may be broken
severity: warning
schedule: "0 8 * * *"  # daily at 8am

check: |
  # Count triples modified in photo graphs in the last 7 days
  # Since Fuseki doesn't track insert timestamps natively,
  # check if the harvest pipeline process group has any output
  RESULT=$(curl -sf --max-time 10 "http://localhost:3030/pods/query" \
    --data-urlencode "query=PREFIX jb: <https://jeffbridwell.com/ontology#> SELECT (COUNT(*) AS ?c) WHERE { GRAPH ?g { ?s jb:dateTaken ?d } FILTER(STRSTARTS(STR(?g), 'urn:gathering:photos')) }" \
    -H "Accept: application/json" 2>/dev/null)
  COUNT=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['results']['bindings'][0]['c']['value'])" 2>/dev/null || echo "0")
  if [ "$COUNT" -gt 0 ]; then
    echo "ok:$COUNT photos in Fuseki"
    exit 0
  fi
  echo "fuseki-harvest-empty"
  exit 1

action: |
  COOLDOWN="/tmp/alert-fuseki-harvest-stale-$(date '+%Y-%m-%d')"
  if [ -f "$COOLDOWN" ]; then
    exit 0
  fi
  touch "$COOLDOWN"
  NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/nudge"
  "$NUDGE" silas "fuseki-harvest-stale: No photo data in Fuseki harvest graphs. Pipeline may be broken. Check NiFi process groups on Bedroom." --force 2>/dev/null || true
