# lancedb-stale.yml — Alert when LanceDB vector index is stale
# Card #1854 | AC3
#
# LanceDB is embedded in the Gathering app. No external health endpoint.
# Check: data directory exists and was modified within 24h.
# If stale, semantic search is returning outdated results.

name: lancedb-stale
description: LanceDB vector index stale — semantic search returning outdated results
severity: warning
schedule: "0 */6 * * *"  # every 6 hours

check: |
  LANCE_DIR="/Users/jeffbridwell/CascadeProjects/jeff-bridwell-personal-site/data/lance"
  if [ ! -d "$LANCE_DIR" ]; then
    echo "lancedb-missing"
    exit 1
  fi
  # #3617 — 72h, not 24h: the embed/reindex workers write on new content, not
  # on a daily clock, so a quiet-but-healthy index tripped the 24h bar most
  # nights (part of the 00:00 battery). 3 days of zero writes is a real stall.
  RECENT=$(find "$LANCE_DIR" -type f -mtime -3 2>/dev/null | head -1)
  if [ -z "$RECENT" ]; then
    echo "lancedb-stale-72h"
    exit 1
  fi
  echo "ok"
  exit 0

action: |
  COOLDOWN="/tmp/alert-lancedb-stale-$(date '+%Y-%m-%d')"
  if [ -f "$COOLDOWN" ]; then
    exit 0
  fi
  touch "$COOLDOWN"
  OPS_NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/ops-nudge"
  "$OPS_NUDGE" silas "lancedb: newest file under data/lance has mtime > 24h (no index write in last 24h)" 2>/dev/null || true
