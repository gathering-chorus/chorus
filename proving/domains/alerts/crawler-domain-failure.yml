# ── TOMBSTONE (#3380, Jeff's ruling 2026-06-12 on #3379) ──────────────────
# The crawler (com.chorus.crawler-index) is RETIRED-UNTIL-REWRITE — Jeff:
# "i have doubts about the function of crawler-index in current state".
# This check is SILENCED while the crawler is retired: a staleness alert for
# a deliberately-stopped service is a tombstone page, not a signal (it fired
# 4x on 2026-06-12 after the retirement, each one a Jeff-screen tax).
# UN-SILENCE CONDITION: the owlapi-fanout crawler-rewrite leg lands
# (#3185/#3242 — facet-heralds through the DAL) and re-enables its own
# monitoring. Restore the original check below by removing this short-circuit.
# crawler-domain-failure.yml — Per-domain crawler failure alert (#1885)
# Fires when any domain has 3+ consecutive crawl failures.
# Status tracked in /tmp/crawler-domain-status.json by index-crawler-snapshots.sh.

name: crawler-domain-failure
description: Domain crawler consecutive failure detection
severity: warning
schedule: "0 * * * *"

check: |
  # tombstone short-circuit — see header; original check preserved below, inert
  echo "ok"
  exit 0
  # ORIGINAL CHECK (inert while retired):
  STATUS_FILE="/tmp/crawler-domain-status.json"
  if [ ! -f "$STATUS_FILE" ]; then
    echo "ok:no-status-file"
    exit 0
  fi
  FAILING=$(python3 -c "
  import json, sys
  try:
      d = json.load(open('$STATUS_FILE'))
      failing = [k for k,v in d.items() if isinstance(v, dict) and v.get('consecutive_failures',0) >= 3]
      if failing:
          print(','.join(failing))
  except Exception:
      pass
  " 2>/dev/null || true)
  if [ -n "$FAILING" ]; then
    echo "failing:$FAILING"
    exit 1
  fi
  echo "ok"
  exit 0

action: |
  COOLDOWN="/tmp/alert-crawler-failure-$(date '+%Y-%m-%d-%H')"
  if [ -f "$COOLDOWN" ]; then
    exit 0
  fi
  touch "$COOLDOWN"
  STATUS_FILE="/tmp/crawler-domain-status.json"
  DETAILS=$(python3 -c "
  import json
  d = json.load(open('$STATUS_FILE'))
  for k,v in sorted(d.items()):
      f = v.get('consecutive_failures',0)
      if f >= 3:
          print(f'  {k}: {f} consecutive failures (last: {v.get(\"timestamp\",\"?\")})')
  " 2>/dev/null || echo "  (could not read details)")
  OPS_NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/ops-nudge"
  "$OPS_NUDGE" silas "crawler-domain-failure: domains with 3+ consecutive crawl failures:
$DETAILS" 2>/dev/null || true
