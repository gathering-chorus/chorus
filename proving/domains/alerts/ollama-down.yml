# ollama-down.yml — Alert when Ollama is unreachable on Bedroom
# Card #1855 | AC3
#
# Ollama serves embeddings for semantic search (LanceDB).
# If it's down, search silently degrades to no results.
# Check every 2 minutes, alert if 2 consecutive failures.

name: ollama-down
description: Ollama unreachable on Bedroom — semantic search degraded
severity: warning
schedule: "*/2 * * * *"

check: |
  RESULT=$(curl -sf --max-time 5 http://192.168.86.242:11434/api/tags 2>/dev/null)
  if [ -n "$RESULT" ]; then
    # Verify a model is actually loaded
    MODEL_COUNT=$(echo "$RESULT" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('models',[])))" 2>/dev/null || echo "0")
    if [ "$MODEL_COUNT" -gt 0 ]; then
      rm -f /tmp/alert-ollama-down-failures
      echo "ok"
      exit 0
    fi
    echo "ollama-no-models"
    exit 1
  fi
  echo "ollama-unreachable"
  exit 1

action: |
  # Consecutive failure tracking — only fire after 3 failures (6 minutes)
  FAIL_COUNT_FILE="/tmp/alert-ollama-down-failures"
  PREV=$(cat "$FAIL_COUNT_FILE" 2>/dev/null || echo "0")
  NEXT=$((PREV + 1))
  echo "$NEXT" > "$FAIL_COUNT_FILE"
  if [ "$NEXT" -lt 3 ]; then
    exit 0
  fi
  # Daily cooldown — Jeff doesn't want hourly noise for a warning
  COOLDOWN="/tmp/alert-ollama-down-$(date '+%Y-%m-%d')"
  if [ -f "$COOLDOWN" ]; then
    exit 0
  fi
  touch "$COOLDOWN"
  # Nudge Silas only (ops owner), not Jeff — warning severity, not critical
  OPS_NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/ops-nudge"
  "$OPS_NUDGE" silas "ollama-down: Bedroom Ollama unreachable after 3 consecutive checks. Semantic search degraded. Check: ssh bedroom 'curl http://localhost:11434/api/tags'" 2>/dev/null || true
