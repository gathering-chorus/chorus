# ── TOMBSTONE (#3380, Jeff's ruling 2026-06-12 on #3379) ──────────────────
# The crawler (com.chorus.crawler-index) is RETIRED-UNTIL-REWRITE — Jeff:
# "i have doubts about the function of crawler-index in current state".
# This check is SILENCED while the crawler is retired: a staleness alert for
# a deliberately-stopped service is a tombstone page, not a signal (it fired
# 4x on 2026-06-12 after the retirement, each one a Jeff-screen tax).
# UN-SILENCE CONDITION: the owlapi-fanout crawler-rewrite leg lands
# (#3185/#3242 — facet-heralds through the DAL) and re-enables its own
# monitoring. Restore the original check below by removing this short-circuit.
# crawler-stale.yml — Alert when chorus crawler hasn't indexed recently
# Card #2817 (#2861 — bash-only check; python moved to sibling)
#
# #3068 (2026-05-24): crawler on StartInterval=1800 (30 min).
# #3138 (2026-05-30): THRESHOLD_SEC 1800→3000 (50 min). 1800 == the interval left
# ZERO grace, and a run spans ~5 min (last-indexed = the last domain to finish), so
# AGE crossed 1800 right before each tick → guaranteed false page. 3000 = interval +
# run duration + */5 poll jitter. (The old business/off-hours if/else was dead — both
# arms set 1800 — so it's collapsed to one value.)
#
# alert-runner contract: stdout must equal literal "ok" for success.

name: crawler-stale
description: chorus crawler has not emitted crawler.domain.indexed in expected window
severity: warning
owner: kade
schedule: "*/5 * * * *"

check: |
  # tombstone short-circuit — see header; original check preserved below, inert
  echo "ok"
  exit 0
  # ORIGINAL CHECK (inert while retired):
  SIBLING="${CHORUS_ROOT:-/Users/jeffbridwell/CascadeProjects/chorus}/proving/domains/alerts/crawler-stale-check.py"
  THRESHOLD_SEC=3000
  LAST=$(grep "crawler.domain.indexed" "$HOME/.chorus/chorus.log" 2>/dev/null | tail -1)
  if [ -z "$LAST" ]; then
    echo "no-indexed-events-in-log"
    exit 1
  fi
  LAST_EPOCH=$(echo "$LAST" | python3 "$SIBLING" 2>/dev/null)
  if [ -z "$LAST_EPOCH" ] || ! [[ "$LAST_EPOCH" =~ ^[0-9]+$ ]]; then
    echo "parse-fail:could-not-extract-timestamp"
    exit 1
  fi
  NOW=$(date +%s)
  AGE=$((NOW - LAST_EPOCH))
  if [ "$AGE" -gt "$THRESHOLD_SEC" ]; then
    echo "stale:${AGE}s>threshold:${THRESHOLD_SEC}s"
    exit 1
  fi
  echo "ok"
  exit 0

action: |
  OPS_NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/ops-nudge"
  "$OPS_NUDGE" kade "crawler-stale: no crawler.domain.indexed in expected window. Hydration loop stalled. Check launchctl list com.chorus.crawler-index + tail ~/Library/Logs/Chorus/crawler-index.log" 2>/dev/null || true
