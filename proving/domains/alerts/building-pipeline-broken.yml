# building-pipeline-broken.yml — auto-fire on broken build/deploy chain (#2880)
#
# DRAFT — known issues to fix before ship:
#   1. Triggers on historic-in-window broken /acps, not just current state.
#      A fix that shipped 6h ago keeps firing the alert until events age out.
#   2. Cooldown 10min — could fire 6×/hour during sustained breakage.
#   3. ops-nudge delivery target verification not done — Jeff sees the nudge
#      via terminal observer pattern, not just silas.
#   4. Underlying fitness function reads Loki (index lag = false negatives)
#      and treats deploy.completed event existing as "deployed" without
#      verifying the running daemon's cdhash matches the build artifact.
#      Autopsy, not vital signs.

name: building-pipeline-broken
description: building-pipeline chain has unpaired /acps in last hour (release-trigger or pipeline run missing) — fires when pipeline is broken NOW, not historically
severity: critical
schedule: "*/5 * * * *"

check: |
  HEALTH="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/building-pipeline-health"
  if [ ! -x "$HEALTH" ]; then
    echo "missing-script:$HEALTH"
    exit 1
  fi
  # 1h window — alert means "the pipeline is broken right now," not
  # "earlier today it was broken." Historic failures age out of the
  # window naturally; current ones fire immediately.
  OUTPUT=$(WINDOW_HOURS=1 "$HEALTH" --json 2>/dev/null)
  RC=$?
  if [ "$RC" -eq 0 ]; then
    echo "ok"
    exit 0
  fi
  ACP=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('acp_count',0))" 2>/dev/null || echo 0)
  TRIG=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('unpaired_release_trigger',0))" 2>/dev/null || echo 0)
  PIPE=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('unpaired_pipeline_run',0))" 2>/dev/null || echo 0)
  echo "broken:acp=$ACP unpaired_trigger=$TRIG unpaired_pipeline=$PIPE"
  exit 1

action: |
  HEALTH="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/building-pipeline-health"
  # NB: don't `|| echo '{}'` — script exits 1 on broken state but stdout is
  # still valid JSON; appending {} after it breaks the parse and zeros the
  # detail. Use `|| true` to swallow the non-zero without polluting stdout.
  DETAIL=$(WINDOW_HOURS=1 "$HEALTH" --json 2>/dev/null || true)
  ACP=$(echo "$DETAIL" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('acp_count',0))" 2>/dev/null || echo 0)
  TRIG=$(echo "$DETAIL" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('unpaired_release_trigger',0))" 2>/dev/null || echo 0)
  PIPE=$(echo "$DETAIL" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('unpaired_pipeline_run',0))" 2>/dev/null || echo 0)
  BROKEN_CARDS=$(WINDOW_HOURS=1 "$HEALTH" --verbose 2>/dev/null | grep '⚠' | awk '{
    for (i=1; i<=NF; i++) if ($i ~ /^card=/) print substr($i, 6)
  }' | sort -u | head -10 | tr '\n' ' ')
  if [ -z "$BROKEN_CARDS" ]; then BROKEN_CARDS="(none isolated)"; fi
  MSG="Pipeline broken: cards shipped but the daemon didn't pick them up. Affected cards (last 1h): ${BROKEN_CARDS}. Running daemon may be on stale code. Check: building-pipeline-health --verbose"
  OPS_NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/ops-nudge"
  if [ -x "$OPS_NUDGE" ]; then
    "$OPS_NUDGE" silas "$MSG" 2>/dev/null || true
  fi
  CHORUS_LOG="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/chorus-log"
  if [ -x "$CHORUS_LOG" ]; then
    "$CHORUS_LOG" pipeline.health.failed silas \
      "acp_count=$ACP" "unpaired_trigger=$TRIG" "unpaired_pipeline=$PIPE" \
      "affected_cards=$BROKEN_CARDS" \
      >/dev/null 2>&1 || true
  fi
