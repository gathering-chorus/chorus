# hydration-divergence.yml — Alert when high filesystem activity but no crawler indexing
# Card #2817 (#2861 — bash-only check; success/quiet branches emit literal "ok")
#
# Watch-path-misconfigured signal: chorus tree had >10 file changes via git
# in last 5 min but crawler.domain.indexed shows 0 in 3 consecutive runs.
#
# alert-runner contract: stdout must equal literal "ok" for success.

name: hydration-divergence
description: chorus crawler running but not picking up filesystem changes
severity: warning
owner: kade
schedule: "*/10 * * * *"

check: |
  SIBLING="${CHORUS_ROOT:-/Users/jeffbridwell/CascadeProjects/chorus}/proving/domains/alerts/hydration-divergence-check.py"
  CHORUS_TREE="${CHORUS_ROOT:-/Users/jeffbridwell/CascadeProjects/chorus}"
  CHANGES=$(cd "$CHORUS_TREE" && git log --since='5 minutes ago' --name-only --pretty=format: 2>/dev/null | grep -v '^$' | sort -u | wc -l | tr -d ' ')
  if [ "$CHANGES" -lt 10 ]; then
    echo "ok"
    exit 0
  fi
  LAST_3MIN=$(tail -2000 "$HOME/.chorus/chorus.log" 2>/dev/null | grep "crawler.domain.indexed" | python3 "$SIBLING" 2>/dev/null || echo 0)
  if [ "$LAST_3MIN" -eq 0 ] 2>/dev/null; then
    echo "divergent:high-activity=${CHANGES}-no-indexing-in-3min"
    exit 1
  fi
  echo "ok"
  exit 0

action: |
  OPS_NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/ops-nudge"
  "$OPS_NUDGE" kade "hydration-divergence: filesystem activity high but crawler not indexing. WatchPaths misconfigured OR filter too narrow OR launchd event coalescing. Check com.chorus.crawler-index plist WatchPaths block + index-crawler-snapshots.sh." 2>/dev/null || true
