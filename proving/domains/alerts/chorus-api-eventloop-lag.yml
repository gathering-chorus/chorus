# chorus-api-eventloop-lag.yml — Alert when the chorus-api event loop stalls (#3039)
#
# chorus-api is the coordination spine: every role's MCP / cards / search / athena
# / nudge call routes through this ONE Node process. A blocked event loop freezes
# EVERY route for EVERY role at once — the measured 6.24s idle stall, root-caused
# to execSync('git log') on the loop (now async). March's blocking went unalerted
# because the lag metric was never watched. This closes that gap.
#
# Delivery is a nudge into Silas's Claude session (ops owner, DEC-022), NOT a
# macOS notification — an event-loop stall is a call to action for the role that
# fixes it, which is the correct use of a nudge.
#
# Why query Prometheus instead of curling /metrics directly: a freeze is
# transient (the p99 percentile resets), so a 5-min poll of the live gauge would
# miss a stall that already recovered. Prometheus scrapes chorus-api every 15s
# (job 'chorus-api', added by #3039) and RETAINS the timeseries, so
# max_over_time(...[6m]) catches any stall in the window even after recovery.

name: chorus-api-eventloop-lag
description: chorus-api event-loop p99 lag exceeded 1s in the last 6m (loop stalled — blocks every role)
severity: critical
schedule: "*/5 * * * *"

check: |
  # Worst p99 event-loop lag over the last 6m, from Prometheus' retained 15s
  # samples — survives a freeze that recovered between polls.
  PROM="${CHORUS_PROM_URL:-http://localhost:9090}"
  QUERY='max_over_time(nodejs_eventloop_lag_p99_seconds{job="chorus-api"}[6m])'
  RESP=$(curl -s --max-time 5 -G "$PROM/api/v1/query" --data-urlencode "query=$QUERY" 2>/dev/null)
  # Pull the scalar out of the first result vector element. jq (not multi-line
  # python) so every line stays indented — the alert-runner's awk extractor
  # ends a check block at the first column-0 lowercase line.
  VAL=$(echo "$RESP" | jq -r '.data.result[0].value[1] // ""' 2>/dev/null)
  if [ -z "$VAL" ] || [ "$VAL" = "null" ]; then
    # No data = chorus-api not scraped yet / Prometheus down. Don't false-fire;
    # target-down is covered by the ServiceDown rule, not this loop-lag alert.
    echo "ok (no eventloop data)"; exit 0
  fi
  if awk "BEGIN{exit !($VAL > 1.0)}"; then
    echo "chorus-api-eventloop-lag:p99=${VAL}s"; exit 1
  fi
  echo "ok (p99=${VAL}s)"; exit 0

action: |
  COOLDOWN="/tmp/alert-chorus-api-eventloop-lag-$(date '+%Y-%m-%d-%H')"
  if [ -f "$COOLDOWN" ]; then
    exit 0
  fi
  touch "$COOLDOWN"
  OPS_NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/ops-nudge"
  "$OPS_NUDGE" silas "chorus-api-eventloop-lag: event-loop p99 lag exceeded 1s in the last 6m — the coordination spine stalled and blocked every role's MCP/cards/search call at once. This is the #3039 freeze class (sync git/IO back on the request loop). Check platform/api/src/server.ts for a new blocking call; query Prometheus nodejs_eventloop_lag_p99_seconds{job=\"chorus-api\"} for the spike window." 2>/dev/null || true
