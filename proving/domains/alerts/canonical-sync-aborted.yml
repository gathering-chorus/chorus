# canonical-sync-aborted.yml — Alert on sustained canonical-sync abort (#2846).
#
# canonical-sync is the load-bearing trigger for the entire build/deploy
# chain (per #2846 design): /acp pushes to origin, sync moves canonical's
# main ref, building-pipeline plist watches canonical, deploy follows.
# Without sync, build/deploy starve silently. Today (2026-05-08) showed
# 8 commits behind + 2h-stale chorus-api before manual repair.
#
# Cooldown by hour so an unfixed abort re-pages but doesn't spam.

name: canonical-sync-aborted
description: chorus-werk-sync aborted >=2 times in last 30min — canonical may be drifting
severity: critical
schedule: "*/15 * * * *"

check: |
  # Loki query: canonical.sync.aborted events in last 30 min.
  # Threshold is 2 — single abort can be transient (lockf contention,
  # mid-commit window). Sustained aborts mean the auto-repair didn't
  # cover the case and operator triage is needed.
  NOW=$(date +%s)
  START=$(( NOW - 1800 ))
  COUNT=$(curl -sf --max-time 8 -G "http://localhost:3102/loki/api/v1/query_range" \
    --data-urlencode 'query={job=~".+"} |~ "canonical.sync.aborted"' \
    --data-urlencode "start=${START}000000000" \
    --data-urlencode "end=${NOW}000000000" \
    --data-urlencode "limit=100" 2>/dev/null \
    | python3 -c "
import json,sys
d=json.load(sys.stdin)
n=0
for r in d.get('data',{}).get('result',[]):
  for v in r.get('values',[]):
    try: o=json.loads(v[1])
    except: continue
    if o.get('event','') == 'canonical.sync.aborted': n+=1
print(n)
" 2>/dev/null || echo "")
  if [ -z "$COUNT" ]; then
    echo "ok"  # Loki unreachable — covered by loki-down alerts, not this one
    exit 0
  fi
  if [ "$COUNT" -lt 2 ]; then
    echo "ok"
    exit 0
  fi
  echo "canonical-sync-aborted:count=$COUNT"
  exit 1

action: |
  COOLDOWN="/tmp/alert-canonical-sync-aborted-$(date '+%Y-%m-%d-%H')"
  if [ -f "$COOLDOWN" ]; then
    exit 0
  fi
  touch "$COOLDOWN"
  OPS_NUDGE="/Users/jeffbridwell/CascadeProjects/chorus/platform/scripts/ops-nudge"
  "$OPS_NUDGE" silas "canonical-sync-aborted: chorus-werk-sync has aborted multiple times in 30 min. Canonical may be drifting from origin/main. Run \`commit-health\` to inspect, then \`chorus-werk-sync repair\` if recoverable. Build/deploy is downstream — fix this first." 2>/dev/null || true
