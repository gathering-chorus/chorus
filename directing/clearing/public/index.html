<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta property="og:title" content="The Clearing — Chorus">
<meta property="og:description" content="Where the team gathers. Three AI roles, one human, real-time.">
<meta property="og:image" content="https://clearing.lightlifeurbangardens.com/bridge-og.jpg">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="The Clearing — Chorus">
<meta name="twitter:image" content="https://clearing.lightlifeurbangardens.com/bridge-og.jpg">
<title>The Clearing</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --wren: #3fb950;
    --silas: #58a6ff;
    --kade: #d29922;
    --jeff: #e6edf3;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  /* Always show scrollbars — force visible on macOS */
  .messages, .fold-content, .flow-content {
    scrollbar-width: thin;
    scrollbar-color: #555 #1a1a1a;
    -webkit-overflow-scrolling: touch;
  }
  .messages::-webkit-scrollbar,
  .fold-content::-webkit-scrollbar,
  .flow-content::-webkit-scrollbar {
    -webkit-appearance: none;
    width: 12px;
    display: block !important;
  }
  .messages::-webkit-scrollbar-track,
  .fold-content::-webkit-scrollbar-track,
  .flow-content::-webkit-scrollbar-track {
    background: #1a1a1a;
    border-left: 1px solid var(--border);
  }
  .messages::-webkit-scrollbar-thumb,
  .fold-content::-webkit-scrollbar-thumb,
  .flow-content::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 6px;
    border: 2px solid #1a1a1a;
    min-height: 40px;
  }
  .messages::-webkit-scrollbar-thumb:hover,
  .fold-content::-webkit-scrollbar-thumb:hover,
  .flow-content::-webkit-scrollbar-thumb:hover {
    background: #777;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .header-title { font-weight: 700; font-size: 1.1rem; color: var(--accent); }
  .header-status { color: var(--text-muted); font-size: 0.8rem; }
  .header-status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .dot-connected { background: var(--green); }
  .dot-disconnected { background: var(--red); }

  /* Tiles */
  .tiles {
    display: flex;
    gap: 0.75rem;
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tile {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .tile:hover { border-color: var(--text-muted); }
  .tile-top { display: flex; justify-content: space-between; align-items: center; }
  .tile-name { font-weight: 700; font-size: 0.9rem; }
  .tile-card { color: var(--text-muted); font-size: 0.8rem; }
  .tile-card.divergent { color: var(--orange); font-weight: 600; }
  .tile-card .card-arrow { opacity: 0.6; margin: 0 2px; }
  .tile-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 0.4rem; }
  .tile-state { font-size: 0.75rem; display: flex; align-items: center; gap: 4px; }
  .tile-state .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; }
  .tile-age { color: var(--text-muted); font-size: 0.7rem; }
  .tile-action { color: var(--text-muted); font-size: 0.7rem; margin-top: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .tile-jeff .tile-name { color: #c9d1d9; font-weight: 800; }
  .tile-jeff { border-color: rgba(201,209,217,0.4); background: rgba(201,209,217,0.05); }
  .tile-jeff.tile-locked { border-color: #c9d1d9; background: rgba(201,209,217,0.12); box-shadow: 0 0 20px rgba(201,209,217,0.3); }
  .tile-jeff.tile-locked::after { background: #c9d1d9; color: var(--bg); }
  .tile-wren .tile-name { color: var(--wren); }
  .tile-wren { border-color: rgba(63,185,80,0.3); }
  .tile-silas .tile-name { color: var(--silas); }
  .tile-silas { border-color: rgba(88,166,255,0.3); }
  .tile-kade .tile-name { color: var(--kade); }
  .tile-kade { border-color: rgba(210,153,34,0.3); }
  .tile-locked { border-width: 3px; position: relative; }
  .tile-locked::after { content: '◀ speaking to'; position: absolute; top: -10px; right: 8px; font-size: 0.65rem; font-weight: 700; padding: 1px 6px; border-radius: 3px; }
  .tile-locked.tile-wren { border-color: var(--wren); background: rgba(63,185,80,0.12); box-shadow: 0 0 20px rgba(63,185,80,0.4); }
  .tile-locked.tile-wren::after { background: var(--wren); color: var(--bg); }
  .tile-locked.tile-silas { border-color: var(--silas); background: rgba(88,166,255,0.12); box-shadow: 0 0 20px rgba(88,166,255,0.4); }
  .tile-locked.tile-silas::after { background: var(--silas); color: var(--bg); }
  .tile-locked.tile-kade { border-color: var(--kade); background: rgba(210,153,34,0.12); box-shadow: 0 0 20px rgba(210,153,34,0.4); }
  .tile-locked.tile-kade::after { background: var(--kade); color: var(--bg); }
  .tile-fold-btn { font-size: 0.65rem; color: var(--text-muted); margin-top: 0.3rem; cursor: pointer; text-align: right; }
  .tile-fold-btn:hover { color: var(--accent); }

  /* Main area — side by side when fold is open */
  .main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Fold panels */
  .fold-container { overflow: hidden; }
  .fold-panel {
    width: 0;
    overflow: hidden;
    transition: width 0.3s ease;
    background: rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .fold-panel.open { width: 420px; min-width: 200px; max-width: 700px; height: 100%; overflow: hidden; display: flex; flex-direction: column; flex-shrink: 0; }
  .fold-content {
    flex: 1;
    overflow-y: scroll;
    padding: 0.5rem 1rem;
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 0.75rem;
    line-height: 1.6;
    color: var(--text-muted);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .fold-line { margin-bottom: 2px; }
  .fold-line .fold-ts { color: #484f58; margin-right: 0.5rem; }
  .fold-line .fold-tool { color: var(--accent); }
  .fold-line .fold-turn { color: var(--text); }
  .fold-line .fold-card { color: var(--orange); font-size: 0.7rem; }
  .fold-gemba { background: rgba(63,185,80,0.08); border-left: 2px solid var(--wren); padding-left: 0.5rem; margin: 2px 0; }

  /* Flow pane */
  .flow-pane {
    width: 280px;
    min-width: 150px;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
    position: relative;
  }
  .flow-header {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--accent);
  }
  .flow-content {
    flex: 1;
    overflow-y: scroll;
    padding: 0.75rem;
    font-size: 0.8rem;
    line-height: 1.5;
  }
  .flow-section { margin-bottom: 0.5rem; }
  .flow-section-title { font-weight: 700; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.4rem 0; cursor: pointer; user-select: none; }
  .flow-section-title:hover { color: var(--accent); }
  .flow-section-cards { overflow: hidden; }
  .flow-section-cards.collapsed { display: none; }
  .flow-card { padding: 0.4rem 0.6rem; background: var(--bg); border-radius: 6px; margin-bottom: 0.3rem; border-left: 3px solid var(--border); }
  .flow-card-wren { border-left-color: var(--wren); }
  .flow-card-silas { border-left-color: var(--silas); }
  .flow-card-kade { border-left-color: var(--kade); }
  .flow-card-id { font-weight: 700; color: var(--text); font-size: 0.75rem; }
  .flow-card-title { color: var(--text-muted); font-size: 0.7rem; word-wrap: break-word; overflow-wrap: break-word; }
  .flow-card-owner { font-size: 0.65rem; }

  /* Resize handles */
  .resize-handle {
    width: 5px;
    cursor: col-resize;
    background: transparent;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .resize-handle:hover, .resize-handle.dragging {
    background: var(--accent);
  }

  /* Filter bars */
  .filter-bar, .fold-filter-bar {
    padding: 0.4rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .filter-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.4rem 0.6rem;
    color: var(--text);
    font-size: 0.8rem;
    font-family: inherit;
    outline: none;
  }
  .filter-input:focus { border-color: var(--accent); }
  .filter-input::placeholder { color: var(--text-muted); }

  /* Message pane */
  .msg-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }
  .messages {
    flex: 1;
    overflow-y: scroll;
    padding: 0.75rem 1.25rem;
    position: relative;
    background-color: var(--bg);
    background-image: linear-gradient(rgba(13,17,23,0.88), rgba(13,17,23,0.88)), url('/clearing-bg.jpg');
    background-position: center center;
    background-size: cover;
    background-repeat: no-repeat;
  }
  .messages-inner { position: relative; z-index: 1; }
  .messages-inner {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    min-height: 100%;
  }
  .msg { margin-bottom: 2px; display: flex; flex-direction: column; }
  .msg-jeff { align-items: flex-end; }
  .msg-role { align-items: flex-start; }
  .msg-bubble {
    max-width: 70%;
    padding: 0.5rem 0.85rem;
    border-radius: 18px;
    font-size: 0.95rem;
    line-height: 1.35;
    word-wrap: break-word;
  }
  .msg-jeff .msg-bubble {
    background: #34a4fb;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg-jeff img { background: none; }
  .msg-role .msg-bubble {
    background: #2c2c2e;
    color: #e5e5e7;
    border-bottom-left-radius: 4px;
  }
  .msg-role.msg-from-wren .msg-bubble { background: rgba(63,185,80,0.10); }
  .msg-role.msg-from-silas .msg-bubble { background: rgba(88,166,255,0.10); }
  .msg-role.msg-from-kade .msg-bubble { background: rgba(210,153,34,0.10); }
  .msg-role .msg-bubble strong { font-size: 0.8rem; }
  .msg-role.msg-demo .msg-bubble, .msg-jeff.msg-demo .msg-bubble {
    background: #1a2e1a; border: 1px solid var(--green); border-left: 4px solid var(--green);
    font-style: normal; opacity: 1; font-size: 0.95rem; padding: 0.6rem 0.8rem;
  }
  .msg-role.msg-accept .msg-bubble, .msg-jeff.msg-accept .msg-bubble {
    background: #1a2e1a; border: 1px solid var(--green); border-left: 4px solid var(--green);
    font-style: normal; opacity: 1; font-size: 0.95rem; padding: 0.6rem 0.8rem;
    max-width: 90%; word-break: break-word;
  }
  .msg-role.msg-blocked .msg-bubble { background: #2e1a1a; }
  .msg-role.msg-thinking .msg-bubble { background: rgba(136,166,255,0.06); border-left: 2px solid currentColor; font-style: italic; opacity: 0.8; font-size: 0.8rem; line-height: 1.5; }
  .msg-role.msg-thinking .msg-bubble strong { display: block; margin-top: 0.6em; margin-bottom: 0.2em; font-style: normal; }
  .msg-role.msg-thinking .msg-bubble br + br { display: none; }
  .msg-role.msg-thinking .msg-bubble ul { margin: 0.3em 0; }
  .msg-role.msg-thinking .msg-bubble li { margin-bottom: 0.15em; }
  .msg-role.msg-thinking .msg-label::after { content: ' thinking'; font-weight: 400; font-style: italic; color: var(--text-muted); }
  .msg-timestamp {
    font-size: 0.65rem;
    color: #86868b;
    text-align: center;
    margin: 0.6rem 0 0.3rem;
  }
  .msg-meta {
    display: none;
  }
  .msg-guest .msg-bubble { background: rgba(210,168,255,0.12); border-left: 2px solid #d2a8ff; }
  .msg-muted { opacity: 0.4; }
  .msg-muted .msg-bubble { font-size: 0.8rem; padding: 0.35rem 0.7rem; }
  .msg-hidden-count {
    color: #86868b;
    font-size: 0.75rem;
    font-style: italic;
    padding: 0.25rem 0;
    cursor: pointer;
    text-align: center;
  }
  .msg-hidden-count:hover { color: var(--accent); }

  /* Input */
  .input-area {
    padding: 0.75rem 1.5rem;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .input-row { display: flex; gap: 0.5rem; }
  .input-field {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
    resize: none;
    overflow-y: hidden;
    min-height: 2.5rem;
    max-height: 8rem;
    line-height: 1.4;
  }
  .input-field:focus { border-color: var(--accent); }
  .input-field::placeholder { color: var(--text-muted); }
  .mic-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
    line-height: 1;
  }
  .mic-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mic-btn.recording { background: rgba(255,59,48,0.15); border-color: #ff3b30; color: #ff3b30; animation: pulse-mic 1.5s infinite; }
  @keyframes pulse-mic { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .send-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 0.75rem 1.25rem;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .send-btn:hover { opacity: 0.9; }
  .send-btn.sending { opacity: 0.6; cursor: wait; }
  .send-btn.delivered { background: #16a34a; }
  .send-btn.delivery-failed { background: #dc2626; }
  .input-hint { color: var(--text-muted); font-size: 0.7rem; margin-top: 0.4rem; }
  .input-hint .mobile-hint { display: none; }

  /* Mobile tab bar */
  .mobile-tabs {
    display: none;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0;
    gap: 0;
  }
  .mobile-tab {
    flex: 1;
    padding: 0.6rem 0;
    text-align: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-muted);
    cursor: pointer;
    border: none;
    background: none;
    border-top: 2px solid transparent;
  }
  .mobile-tab.active { color: var(--accent); border-top-color: var(--accent); }

  /* Mobile breakpoint */
  @media (max-width: 768px) {
    .tiles { padding: 0.4rem; gap: 0.3rem; }
    .tile { padding: 0.4rem 0.5rem; font-size: 0.8rem; }
    .tile-top { flex-wrap: nowrap; gap: 4px; }
    .tile-name { font-size: 0.8rem; }
    .tile-card { font-size: 0.65rem; white-space: nowrap; }
    .tile-bottom { font-size: 0.65rem; }
    .tile-age { white-space: nowrap; }
    .tile-action, .tile-fold-btn { display: none; }
    .mobile-tabs { display: flex; }
    .resize-handle { display: none; }
    .input-hint { display: block; font-size: 0.65rem; }
    .input-hint .desktop-hint { display: none; }
    .input-hint .mobile-hint { display: inline; }
    .main-area { display: flex; flex-direction: column; position: relative; overflow: hidden; }
    .msg-pane { flex: 1; min-height: 0; }
    .flow-pane { display: none !important; width: 0 !important; min-width: 0 !important; max-width: 0 !important; overflow: hidden !important; }
    .flow-pane.mobile-active { display: flex !important; width: 100% !important; min-width: 0 !important; max-width: 100% !important; position: absolute; inset: 0; z-index: 5; }
    .fold-container { display: none !important; width: 0 !important; min-width: 0 !important; max-width: 0 !important; overflow: hidden !important; }
    .fold-container .fold-panel, .fold-container .fold-panel.open { width: 0 !important; min-width: 0 !important; }
    .fold-container.mobile-active { display: block !important; width: 100% !important; position: absolute; inset: 0; z-index: 5; }
    .fold-container.mobile-active .fold-panel,
    .fold-container.mobile-active .fold-panel.open { width: 100% !important; min-width: 0 !important; height: 100%; overflow-y: auto; }
    .msg-pane.mobile-hidden { display: none; }
    .input-area { padding: 0.5rem; padding-bottom: calc(0.5rem + env(safe-area-inset-bottom)); overflow: hidden; }
    .input-row { overflow: hidden; max-width: 100%; }
    .input-field { min-width: 0; flex: 1 1 0; font-size: 16px; }
    .send-btn { flex: 0 0 auto; }
    .msg-bubble { max-width: 80%; overflow-wrap: anywhere; }
    .messages { overflow-x: hidden; overflow-y: auto; -webkit-overflow-scrolling: touch; background-attachment: scroll; }
    .msg { max-width: 100%; overflow-x: hidden; }
    .messages::-webkit-scrollbar,
    .fold-content::-webkit-scrollbar,
    .flow-content::-webkit-scrollbar { width: 0 !important; display: none !important; }
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">The Clearing</span>
  <span class="header-status" id="connection-status">
    <span class="dot dot-disconnected"></span> connecting...
  </span>
  <span id="guest-logout"></span>
</div>
<script>
if (window.BRIDGE_USER && window.BRIDGE_USER !== 'jeff') {
  document.getElementById('guest-logout').innerHTML = '<a href="/logout" style="color:var(--text-muted);font-size:0.75rem;text-decoration:none;margin-left:0.5rem">(' + window.BRIDGE_USER + ' · sign out)</a>';
}
</script>

<div class="tiles" id="tiles"></div>

<div class="main-area">
  <div class="flow-pane" id="flow-pane">
  <div class="flow-header">
    <span class="flow-title">Domains</span>
  </div>
  <div class="flow-filter-bar" style="padding:0.4rem 0.75rem;border-bottom:1px solid var(--border);">
    <div style="display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap;">
      <button class="role-filter-btn" data-filter="all" onclick="setRoleFilter('all')" style="font-size:0.65rem;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:var(--accent);color:var(--bg);cursor:pointer;">All</button>
      <button class="role-filter-btn" data-filter="wren" onclick="setRoleFilter('wren')" style="font-size:0.65rem;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--wren);cursor:pointer;">Wren</button>
      <button class="role-filter-btn" data-filter="silas" onclick="setRoleFilter('silas')" style="font-size:0.65rem;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--silas);cursor:pointer;">Silas</button>
      <button class="role-filter-btn" data-filter="kade" onclick="setRoleFilter('kade')" style="font-size:0.65rem;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--kade);cursor:pointer;">Kade</button>
    </div>
    <input class="filter-input" id="domain-filter" type="text" placeholder="🔍 filter domains or cards..." oninput="filterDomains()" />
  </div>
  <div class="flow-content" id="flow-content"></div>
</div>
<div class="resize-handle" id="resize-left"></div>
<div class="msg-pane">
  <div class="flow-header">
    <span class="flow-title">Messages</span>
  </div>
  <div class="filter-bar">
    <input class="filter-input" id="msg-filter" type="text" placeholder="🔍 filter messages..." oninput="filterMessages()" />
  </div>
  <div class="messages" id="messages"><div class="messages-inner" id="messages-inner"></div></div>
</div>
<div class="resize-handle" id="resize-right"></div>
  <div class="fold-container">
    <div class="fold-panel" id="fold-panel">
      <!-- #2895 proposals panel removed in #2905 (Jeff direct) — bouncer is
           nudge-based; proposals appear in the regular message stream as
           [card-approval] nudges, not a separate workflow surface. -->
      <div id="alerts-panel" style="display:none;border-bottom:2px solid var(--red);padding:0.5rem 0.75rem;background:rgba(248,81,73,0.08);flex-shrink:0;resize:vertical;overflow:hidden;min-height:60px;max-height:80vh;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.3rem;">
          <span style="font-size:0.7rem;font-weight:700;color:var(--red);">ALERTS</span>
          <button onclick="document.getElementById('alerts-content').innerHTML='';document.getElementById('alerts-panel').style.display='none';" style="font-size:0.6rem;color:var(--text-muted);background:none;border:1px solid var(--border);border-radius:3px;padding:1px 6px;cursor:pointer;">clear</button>
        </div>
        <input type="text" id="alerts-filter" placeholder="🔍 filter alerts..." oninput="filterAlerts()" style="width:100%;padding:3px 8px;margin-bottom:0.3rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:0.7rem;outline:none;" />
        <div id="alerts-content" style="font-size:0.72rem;overflow-y:auto;height:calc(100% - 50px);"></div>
      </div>
      <div class="flow-header">
        <span class="flow-title">Streams</span>
      </div>
      <div class="fold-filter-bar">
        <input class="filter-input" id="stream-filter" type="text" placeholder="🔍 filter stream..." oninput="filterStream()" />
      </div>
      <div class="fold-content" id="fold-content"></div>
    </div>
  </div>
</div>

<div id="mobile-stream" style="display:none;flex:1;overflow-y:auto;padding:0.5rem;font-family:monospace;font-size:0.75rem;color:#8b949e;line-height:1.6;background:#0d1117;"></div>

<div class="mobile-tabs" id="mobile-tabs">
  <button class="mobile-tab active" data-panel="messages" onclick="switchMobileTab('messages')">Messages</button>
  <button class="mobile-tab" data-panel="domains" onclick="switchMobileTab('domains')">Domains</button>
  <button class="mobile-tab" data-panel="streams" onclick="switchMobileTab('streams')">Streams</button>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea class="input-field" id="input" rows="1"
      placeholder="Type a message... (@wren @silas @kade or just type)"
      autocomplete="off"></textarea>
    <button class="mic-btn" id="mic-btn" title="Voice input (hold to talk)">🎙</button>
    <button class="send-btn" id="send-btn">Send</button>
  </div>
  <div class="input-hint">@role to direct • no @ = Wren gets it • <span class="desktop-hint">Enter to send</span><span class="mobile-hint">tap Send</span></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// Pass auth token to Socket.IO for remote connections (#1719)
const bridgeCookie = document.cookie.match(/bridge_token=([^;]+)/);
const bridgeToken = bridgeCookie ? bridgeCookie[1] : (new URLSearchParams(location.search).get('token') || '');
const socket = io({
  auth: { token: bridgeToken },
  reconnection: true,
  reconnectionAttempts: Infinity,
  reconnectionDelay: 1000,
  reconnectionDelayMax: 5000,
  timeout: 30000,  // Must be > server pingInterval (25s)
});
const msgContainer = document.getElementById('messages-inner');
const msgScroller = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const tilesContainer = document.getElementById('tiles');
const statusEl = document.getElementById('connection-status');

// Connection status + reconnect handling + client heartbeat (#2036)
let heartbeatTimeout = null;
let heartbeatInterval = null;
const HEARTBEAT_INTERVAL_MS = 8000;  // Ping every 8s
const HEARTBEAT_TIMEOUT_MS = 10000;  // Disconnect after 10s no pong

function startHeartbeat() {
  stopHeartbeat();
  heartbeatInterval = setInterval(() => {
    if (socket.connected) {
      socket.emit('ping');
      if (heartbeatTimeout) clearTimeout(heartbeatTimeout);
      heartbeatTimeout = setTimeout(() => {
        statusEl.innerHTML = '<span class="dot dot-disconnected"></span> connection lost';
      }, HEARTBEAT_TIMEOUT_MS);
    }
  }, HEARTBEAT_INTERVAL_MS);
}

function stopHeartbeat() {
  if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; }
  if (heartbeatTimeout) { clearTimeout(heartbeatTimeout); heartbeatTimeout = null; }
}

socket.on('pong', () => {
  if (heartbeatTimeout) { clearTimeout(heartbeatTimeout); heartbeatTimeout = null; }
  statusEl.innerHTML = '<span class="dot dot-connected"></span> connected';
});

socket.on('connect', () => {
  statusEl.innerHTML = '<span class="dot dot-connected"></span> connected';
  startHeartbeat();
});
socket.on('disconnect', () => {
  statusEl.innerHTML = '<span class="dot dot-disconnected"></span> reconnecting...';
  stopHeartbeat();
});
socket.io.on('reconnect', () => {
  statusEl.innerHTML = '<span class="dot dot-connected"></span> connected';
  startHeartbeat();
});

// Tiles
socket.on('tiles', (tiles) => renderTiles(tiles));

// Initial messages
socket.on('messages', (msgs) => {
  msgContainer.innerHTML = '';
  msgs.forEach(msg => appendMessage(msg));
  scrollToBottom();
});

// New message
socket.on('message', (msg) => {
  appendMessage(msg);
  scrollToBottom();
});

// #3646 — per-target delivery outcome (the ack means accepted+persisted; this is
// the terminal hand-off verdict). Failures render as a visible system line —
// a failed delivery is information, never a silent drop.
socket.on('delivery-status', (status) => {
  if (status && status.ok === false) {
    appendMessage({
      from: 'system',
      text: 'delivery to ' + status.target + ' failed: ' + (status.error || 'unknown') + ' — the message is saved; the room has it, ' + status.target + "'s terminal didn't get the nudge",
      ts: new Date().toISOString(),
      type: 'system',
    });
    scrollToBottom();
  }
});

// #3646 — mobile wake: iOS/Android silently kill the socket when the app
// backgrounds; on return, reconnect immediately instead of waiting for the
// next heartbeat cycle to notice.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !socket.connected) {
    socket.connect();
  }
});

// Tile lock — click to target role(s)
let lockedRole = null; // kept for backward compat
const selectedRoles = new Set();

function updateInputHint() {
  const hint = document.querySelector('.input-hint');
  if (selectedRoles.size > 0) {
    const names = [...selectedRoles].map(r => r.charAt(0).toUpperCase() + r.slice(1));
    const colors = [...selectedRoles].map(r => `<strong style="color:var(--${r})">${r.charAt(0).toUpperCase() + r.slice(1)}</strong>`);
    hint.innerHTML = `Sending to ${colors.join(' + ')} — click tiles to change`;
    input.placeholder = `Message ${names.join(' + ')}...`;
    lockedRole = selectedRoles.size === 1 ? [...selectedRoles][0] : [...selectedRoles][0]; // for muting compat
  } else {
    lockedRole = null;
    hint.innerHTML = '@role to direct &middot; no @ = Wren gets it &middot; Enter to send';
    input.placeholder = 'Type a message... (@wren @silas @kade or just type)';
  }
}

// Send message — include sender identity for guest attribution (#1719)
const bridgeUser = window.BRIDGE_USER || 'jeff';
const isGuest = bridgeUser !== 'jeff';

function sendMessage() {
  var text = input.value.trim();
  if (!text) return;
  var savedText = text;
  // #3646 — never emit into a dead socket: Socket.IO buffers emits while
  // disconnected (mobile backgrounding kills the socket silently), which made
  // sends vanish or double-fire after reconnect. Fail honestly + keep the text.
  if (!socket.connected) {
    socket.connect(); // kick a reconnect attempt right now
    sendBtn.textContent = 'Not connected';
    sendBtn.classList.add('delivery-failed');
    setTimeout(function() { sendBtn.textContent = 'Send'; sendBtn.classList.remove('delivery-failed'); }, 3000);
    return; // text stays in the input
  }
  sendBtn.textContent = 'Sending...';
  sendBtn.classList.add('sending');
  input.value = '';
  input.style.height = 'auto'; // Reset textarea height after send
  function onAck(result) {
    sendBtn.classList.remove('sending');
    if (result && result.ok) {
      sendBtn.textContent = 'Sent';
      sendBtn.classList.add('delivered');
      setTimeout(function() { sendBtn.textContent = 'Send'; sendBtn.classList.remove('delivered'); }, 1500);
    } else {
      sendBtn.textContent = 'Failed';
      sendBtn.classList.add('delivery-failed');
      input.value = savedText;
      setTimeout(function() { sendBtn.textContent = 'Send'; sendBtn.classList.remove('delivery-failed'); }, 3000);
    }
  }
  // #3646 — 10s: the server now acks on ingest (fast), but remote origins ride
  // the tunnel; the old 3s timer raced the server's 5s delivery hand-off and
  // marked landed messages "Failed" (the works-once bug).
  var ackTimer = setTimeout(function() {
    onAck({ ok: false, error: 'timeout' });
  }, 10000);
  function emitOne(payload) {
    socket.emit('jeff-message', payload, function(result) {
      clearTimeout(ackTimer);
      onAck(result || { ok: false, error: 'no response' });
    });
  }
  if (selectedRoles.size > 0 && !text.match(/^@(wren|silas|kade)\b/i)) {
    for (var role of selectedRoles) {
      emitOne({ text: '@' + role + ' ' + text, from: bridgeUser });
    }
  } else {
    emitOne({ text: text, from: bridgeUser });
  }
}

sendBtn.addEventListener('click', sendMessage);
const isMobile = () => window.innerWidth <= 768;
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (isMobile()) {
      // Mobile: Enter = newline (default textarea behavior), send via button only
      return;
    }
    // Desktop: Enter = send, Shift+Enter = newline
    if (!e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }
});
// Auto-resize textarea as content grows
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 128) + 'px';
});

// Voice input — Web Speech API
// Voice capture via MediaRecorder + server-side whisper-cli (#1782)
const micBtn = document.getElementById('mic-btn');
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

micBtn.addEventListener('click', async () => {
  console.log('[voice] mic clicked, isRecording:', isRecording, 'protocol:', location.protocol, 'host:', location.hostname);

  if (isRecording) {
    console.log('[voice] stopping recording');
    mediaRecorder.stop();
    return;
  }

  try {
    console.log('[voice] requesting getUserMedia...');
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    console.log('[voice] getUserMedia granted, tracks:', stream.getAudioTracks().length);

    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    console.log('[voice] MediaRecorder mimeType:', mimeType);
    mediaRecorder = new MediaRecorder(stream, { mimeType });
    audioChunks = [];

    mediaRecorder.ondataavailable = (e) => {
      console.log('[voice] data chunk:', e.data.size, 'bytes');
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      console.log('[voice] recording stopped, chunks:', audioChunks.length);
      micBtn.classList.remove('recording');
      isRecording = false;
      stream.getTracks().forEach(t => t.stop());

      if (audioChunks.length === 0) { console.log('[voice] no audio data'); return; }

      micBtn.textContent = '⏳';
      input.placeholder = 'Transcribing...';

      const blob = new Blob(audioChunks, { type: mimeType });
      console.log('[voice] uploading', blob.size, 'bytes to /api/voice');

      try {
        const resp = await fetch('/api/voice', { method: 'POST', body: blob, headers: { 'Content-Type': mimeType } });
        const result = await resp.json();
        console.log('[voice] server response:', JSON.stringify(result));

        if (result.transcript) {
          console.log('[voice] auto-sending transcript:', result.transcript.substring(0, 80));
          socket.emit('jeff-message', { text: result.transcript, from: 'jeff' }, (ack) => {
            console.log('[voice] jeff-message ack:', JSON.stringify(ack));
            input.placeholder = 'Type a message... (@wren @silas @kade or just type)';
          });
        } else {
          console.warn('[voice] transcription failed:', result.error);
          input.placeholder = result.error || 'Transcription failed';
          setTimeout(() => { input.placeholder = 'Type a message... (@wren @silas @kade or just type)'; }, 3000);
        }
      } catch (err) {
        console.error('[voice] upload failed:', err);
        input.placeholder = 'Voice upload failed';
        setTimeout(() => { input.placeholder = 'Type a message... (@wren @silas @kade or just type)'; }, 3000);
      }

      micBtn.textContent = '🎙';
    };

    mediaRecorder.start();
    micBtn.classList.add('recording');
    isRecording = true;
    console.log('[voice] recording started');
  } catch (err) {
    console.warn('[voice] getUserMedia failed:', err.name, err.message);
    if (location.protocol === 'http:' && !location.hostname.match(/^(localhost|127\.)/)) {
      console.log('[voice] HTTP on non-localhost — redirecting to HTTPS port for mic');
      // Redirect to HTTPS on port 3471 where getUserMedia works
      location.href = 'https://' + location.hostname + ':3471' + location.pathname + location.search;
    }
  }
});

function renderTiles(tiles) {
  tilesContainer.innerHTML = tiles.map(t => {
    const stateColor = t.state === 'building' ? 'var(--green)' :
                       t.state === 'directing' ? 'var(--green)' :
                       t.state === 'blocked' ? 'var(--red)' :
                       t.state === 'waiting' ? 'var(--orange)' :
                       t.state === 'watching' ? 'var(--orange)' :
                       t.state === 'observing' ? 'var(--accent)' :
                       t.state === 'away' ? 'var(--text-muted)' :
                       'var(--text-muted)';
    const action = t.lastAction ? t.lastAction.substring(0, 50) : '';
    const locked = selectedRoles.has(t.role);
    return `
      <div class="tile tile-${t.role}${locked ? ' tile-locked' : ''}${foldRole === t.role ? ' tile-folded' : ''}" onclick="toggleLock('${t.role}')">
        <div class="tile-top">
          <span class="tile-name">${t.role.charAt(0).toUpperCase() + t.role.slice(1)}${locked ? ' ◀' : ''}</span>
          <span class="tile-card${t.divergent ? ' divergent' : ''}" title="${t.divergent ? 'declared: #' + t.cardDeclared + ' — inferred from activity: #' + t.cardInferred : ((t.cards && t.cards.length > 1) ? 'all WIP cards owned by ' + t.role : '')}">${t.divergent ? '#' + t.cardDeclared + '<span class="card-arrow">→</span>#' + t.cardInferred : ((t.cards && t.cards.length > 0) ? t.cards.join(' ') : (t.card || '—'))}</span>
        </div>
        <div class="tile-bottom">
          <span class="tile-state"><span class="dot" style="background:${stateColor}"></span> ${t.state}</span>
          <span class="tile-age">${t.lastActionAge || ''}</span>
        </div>
        ${action ? `<div class="tile-action">${escapeHtml(action)}</div>` : ''}
        <div class="tile-fold-btn" onclick="event.stopPropagation(); toggleFold('${t.role}')">${foldRole === t.role ? '▲ hide' : '▼ stream'}</div>
        ${foldRole === t.role ? '<div class="tile-fold-btn" onclick="event.stopPropagation(); toggleFoldMode()">' + ({unified:'🌐 all roles', commands:'⚡ commands', terminal:'📄 terminal'}[foldMode] || foldMode) + '</div>' : ''}
      </div>
    `;
  }).join('');
}

let foldRole = null;
let foldTimer = null;
let foldMode = 'unified'; // 'unified', 'commands', or 'terminal'
const foldPanel = document.getElementById('fold-panel');
const foldContent = document.getElementById('fold-content');

function toggleLock(role) {
  if (selectedRoles.has(role)) {
    selectedRoles.delete(role);
  } else {
    selectedRoles.add(role);
  }
  updateInputHint();
  document.querySelectorAll('.tile').forEach(el => {
    const tileRole = el.className.match(/tile-(wren|silas|kade)/)?.[1];
    if (tileRole && selectedRoles.has(tileRole)) {
      el.classList.add('tile-locked');
    } else {
      el.classList.remove('tile-locked');
    }
  });
  // Only refocus on desktop — mobile focus steal pulls up keyboard unexpectedly
  if (!isMobile()) input.focus();
}

function toggleFold(role) {
  if (foldRole === role) {
    // Close fold
    foldRole = null;
    foldPanel.classList.remove('open');
    if (foldTimer) { clearInterval(foldTimer); foldTimer = null; }
  } else {
    // Open fold for this role
    foldRole = role;
    foldPanel.classList.add('open');
    loadFold(role);
    // Poll every 3 seconds
    if (foldTimer) clearInterval(foldTimer);
    foldTimer = setInterval(() => loadFold(role), 3000);
  }
}

function toggleFoldMode() {
  const modes = ['unified', 'commands', 'terminal'];
  foldMode = modes[(modes.indexOf(foldMode) + 1) % modes.length];
  if (foldRole) loadFold(foldRole);
  // Force tile re-render to update button label
  document.querySelectorAll('.tile-fold-btn').forEach(el => {
    if (el.textContent.includes('commands') || el.textContent.includes('terminal')) {
      const labels = { unified: '🌐 all roles', commands: '⚡ commands', terminal: '📄 terminal' };
      el.textContent = labels[foldMode] || foldMode;
    }
  });
}

async function loadFold(role) {
  try {
    if (foldMode === 'unified') {
      const resp = await fetch('/api/stream?lines=80');
      const entries = await resp.json();
      foldContent.innerHTML = entries.map(e => {
        const color = e.role === 'wren' ? 'var(--wren)' : e.role === 'silas' ? 'var(--silas)' : 'var(--kade)';
        const icon = e.type === 'gemba' ? '👁 ' : e.type === 'turn' ? '💬 ' : '';
        const lineClass = e.type === 'gemba' ? 'fold-line fold-gemba' : 'fold-line';
        const eLevel = e.level || (/^\[critical\]/i.test(e.text) ? 'critical' : /^\[warn\]/i.test(e.text) ? 'warn' : '');
        const levelStyle = eLevel === 'critical' ? 'border-left:4px solid var(--red);padding-left:6px;' : eLevel === 'warn' ? 'border-left:4px solid var(--orange);padding-left:6px;' : '';
        return `<div class="${lineClass}" data-role="${e.role}" style="${levelStyle}"><span class="fold-ts">${e.ts}</span> <span style="color:${color};font-weight:700;">${e.role}</span> ${icon}${escapeHtml(e.text)}</div>`;
      }).join('');
      filterStream(); // Re-apply filter after reload
      foldContent.scrollTop = foldContent.scrollHeight;
    } else if (foldMode === 'commands') {
      const resp = await fetch(`/api/commands/${role}`);
      const data = await resp.json();
      foldContent.textContent = data.text || 'No output';
      foldContent.scrollTop = foldContent.scrollHeight;
    } else {
      const resp = await fetch(`/api/session/${role}?lines=60`);
      const data = await resp.json();
      foldContent.textContent = data.text || 'No output';
      foldContent.scrollTop = foldContent.scrollHeight;
    }
  } catch {}
}

let lastMsgTime = '';
let lastMsgFrom = '';

function appendMessage(msg) {
  if (!msg.visible) return;

  const roles = ['wren', 'silas', 'kade'];
  const isJeff = msg.from === 'jeff';
  const isRole = roles.includes(msg.from);
  const isGuest = !isJeff && !isRole;
  const time = new Date(msg.ts).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

  // Show timestamp if time changed or sender switched
  if (time !== lastMsgTime || (isJeff !== (lastMsgFrom === 'jeff'))) {
    const tsDiv = document.createElement('div');
    tsDiv.className = 'msg-timestamp';
    tsDiv.textContent = time;
    msgContainer.appendChild(tsDiv);
    lastMsgTime = time;
  }
  lastMsgFrom = msg.from;

  const div = document.createElement('div');
  div.className = `msg ${(isJeff || isGuest) ? 'msg-jeff' : 'msg-role'}`;
  if (isGuest) div.className += ' msg-guest';
  if (!isJeff && !isGuest && msg.from) div.className += ` msg-from-${msg.from}`;
  if (msg.type === 'demo-ready') div.className += ' msg-demo';
  if (msg.type === 'accept-request') div.className += ' msg-accept';
  if (msg.type === 'blocked') div.className += ' msg-blocked';
  if (msg.type === 'pm-thinking') div.className += ' msg-thinking';

  // Pulse level highlighting (#1897) — detect level from content or type
  const msgText = (msg.text || '').toLowerCase();
  const level = msg.level
    || (msg.type === 'blocked' ? 'critical' : '')
    || (/^\[critical\]/i.test(msg.text || '') ? 'critical' : '')
    || (/^\[warn\]/i.test(msg.text || '') ? 'warn' : '');
  if (level === 'critical') {
    div.style.background = 'rgba(248, 81, 73, 0.15)';
    div.style.border = '2px solid var(--red)';
    div.style.borderRadius = '8px';
    div.style.boxShadow = '0 0 12px rgba(248, 81, 73, 0.3)';
  }
  if (level === 'warn') {
    div.style.background = 'rgba(210, 153, 34, 0.1)';
    div.style.borderLeft = '4px solid var(--orange)';
  }

  // Sender label — roles get colored name, guests get purple name, Jeff gets nothing
  const sender = isJeff ? ''
    : isGuest ? `<strong style="color:#d2a8ff">${msg.from.charAt(0).toUpperCase() + msg.from.slice(1)}</strong><br>`
    : `<strong style="color:var(--${msg.from})">${msg.from.charAt(0).toUpperCase() + msg.from.slice(1)}</strong><br>`;

  // Mute messages from unselected roles when tiles are selected
  const isMuted = selectedRoles.size > 0 && !isJeff && !selectedRoles.has(msg.from);
  if (isMuted) div.classList.add('msg-muted');

  // Render images — check raw text BEFORE escaping
  const rawText = msg.text || '';
  const rawWithoutMention = rawText.replace(/^@(wren|silas|kade)\s*/i, '').trim();
  const imageOnly = /^\[img:[^\]]+\]$/.test(rawWithoutMention);

  if (imageOnly) {
    const imgUrl = rawWithoutMention.match(/\[img:([^\]]+)\]/)[1];
    div.className = `msg ${isJeff ? 'msg-jeff' : 'msg-role'}`; // reset — no bubble styles
    div.style.background = 'none';
    div.innerHTML = `<img src="${imgUrl}" style="max-width:300px;max-height:250px;border-radius:12px;display:block;" />`;
  } else if (rawText.includes('[img:')) {
    // Image + text: render image above, text in bubble below
    const imgMatch = rawText.match(/\[img:([^\]]+)\]/);
    const imgUrl = imgMatch ? imgMatch[1] : '';
    const textPart = rawText.replace(/\[img:[^\]]+\]/g, '').replace(/^@(wren|silas|kade)\s*/i, '').trim();
    let html = `<img src="${imgUrl}" style="max-width:300px;max-height:250px;border-radius:12px;display:block;margin-bottom:4px;" />`;
    if (textPart) {
      const renderedText = isJeff ? linkify(escapeHtml(textPart)) : renderMarkdown(textPart);
      html += `<div class="msg-bubble">${sender}${renderedText}</div>`;
    }
    div.innerHTML = html;
  } else {
    // Jeff messages: plain text. Role/guest messages: markdown rendered (#1720)
    let rendered;
    try {
      rendered = (isJeff || isGuest) ? linkify(escapeHtml(rawText)) : renderMarkdown(rawText);
    } catch(e) {
      rendered = linkify(escapeHtml(rawText)); // fallback on error
    }
    div.innerHTML = `<div class="msg-bubble">${sender}${rendered}</div>`;
  }
  msgContainer.appendChild(div);
}

function scrollToBottom() {
  msgScroller.scrollTop = msgScroller.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function linkify(text) {
  return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:#58a6ff;text-decoration:underline;">$1</a>');
}

/** Lightweight markdown→HTML for message bubbles (#1720) */
function renderMarkdown(text) {
  // Escape HTML first
  const escaped = escapeHtml(text);
  // Split into lines for block-level processing
  const lines = escaped.split('\n');
  const out = [];
  let inList = false;

  for (const line of lines) {
    // Headers
    if (line.match(/^#{1,3}\s+/)) {
      if (inList) { out.push('</ul>'); inList = false; }
      const content = line.replace(/^#{1,3}\s+/, '');
      out.push(`<strong style="display:block;margin:0.4em 0 0.2em">${content}</strong>`);
      continue;
    }
    // Bullet list items (- or *)
    if (line.match(/^\s*[-*]\s+/)) {
      if (!inList) { out.push('<ul style="margin:0.2em 0;padding-left:1.2em">'); inList = true; }
      const content = line.replace(/^\s*[-*]\s+/, '');
      out.push(`<li>${inlineMd(content)}</li>`);
      continue;
    }
    // Numbered list items
    if (line.match(/^\s*\d+\.\s+/)) {
      if (inList) { out.push('</ul>'); inList = false; }
      const content = line.replace(/^\s*\d+\.\s+/, '');
      out.push(`<div style="margin-left:1em">${inlineMd(content)}</div>`);
      continue;
    }
    // Empty line = paragraph break
    if (!line.trim()) {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push('<br>');
      continue;
    }
    // Regular text
    if (inList) { out.push('</ul>'); inList = false; }
    out.push(inlineMd(line));
  }
  if (inList) out.push('</ul>');
  return linkify(out.join('\n'));
}

/** Inline markdown: bold, italic, code, strikethrough */
function inlineMd(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="background:rgba(255,255,255,0.1);padding:0.1em 0.3em;border-radius:3px;font-size:0.85em">$1</code>')
    .replace(/~~(.+?)~~/g, '<del>$1</del>');
}

// Image paste support — upload, then stage in input (don't auto-send)
document.addEventListener('paste', async (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/') || item.type === 'image/heic' || item.type === 'image/heif') {
      e.preventDefault();
      const blob = item.getAsFile();
      if (!blob) continue;
      const resp = await fetch('/api/upload', { method: 'POST', headers: { 'Content-Type': blob.type }, body: blob });
      const data = await resp.json();
      if (data.url) {
        // Stage in input — user adds @name and hits Send
        const existing = input.value.trim();
        input.value = existing ? `${existing} [img:${data.url}]` : `[img:${data.url}]`;
        input.focus();
      }
    }
  }
});

// Image drag-and-drop support — capture phase on window
window.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); }, true);
window.addEventListener('dragenter', (e) => { e.preventDefault(); document.body.style.outline = '2px dashed var(--accent)'; }, true);
window.addEventListener('dragleave', (e) => { if (e.target === document.documentElement || e.target === document.body) document.body.style.outline = ''; });
window.addEventListener('drop', async (e) => {
  e.preventDefault();
  e.stopPropagation();
  document.body.style.outline = '';
  const files = e.dataTransfer?.files;
  if (!files) return;
  for (const file of files) {
    if (!file.type.startsWith('image/') && !file.name?.match(/\.heic$/i)) continue;
    const uploadType = file.name?.match(/\.heic$/i) ? 'image/heic' : file.type;
    const resp = await fetch('/api/upload', { method: 'POST', headers: { 'Content-Type': uploadType }, body: file });
    const data = await resp.json();
    if (data.url) {
      // Stage in input — user adds @name and hits Send
      const existing = input.value.trim();
      input.value = existing ? `${existing} [img:${data.url}]` : `[img:${data.url}]`;
      input.focus();
    }
  }
});

// Domain panel — load board state grouped by domain
async function loadFlow() {
  try {
    const resp = await fetch('/api/flow');
    const data = await resp.json();
    const flowContent = document.getElementById('flow-content');
    const domains = data.domains || {};

    // Sort by activeTotal descending (matches /flow page)
    const sorted = Object.entries(domains).sort((a, b) => {
      return (b[1].counts?.activeTotal || 0) - (a[1].counts?.activeTotal || 0);
    });

    // Compute median card ID for aging threshold
    const allCardIds = sorted.flatMap(([, d]) => (d.cards || []).map(c => parseInt(c.id)));
    const medianId = allCardIds.length > 0 ? allCardIds.sort((a, b) => a - b)[Math.floor(allCardIds.length / 2)] : 0;
    const agingThreshold = medianId - 100; // Cards 100+ IDs below median are "aging"

    let html = '';
    for (const [domain, data] of sorted) {
      let cards = data.cards || [];
      // Apply role filter
      if (activeRoleFilter !== 'all') {
        cards = cards.filter(c => c.owner === activeRoleFilter);
        if (cards.length === 0) continue; // Hide empty domains when filtered
      }
      // Skip empty domains
      if (cards.length === 0) continue;
      // Sort cards: WIP/Blocked first, then by priority (P1-P3), then card number ascending
      const statusPriority = { 'WIP': 0, 'Blocked': 1 };
      cards = [...cards].sort((a, b) => {
        const aPri = statusPriority[a.status] ?? 2;
        const bPri = statusPriority[b.status] ?? 2;
        if (aPri !== bPri) return aPri - bPri;
        if ((a.priority || 9) !== (b.priority || 9)) return (a.priority || 9) - (b.priority || 9);
        return parseInt(a.id) - parseInt(b.id);
      });
      const counts = data.counts || {};
      // Default collapsed — only expanded if user explicitly toggled
      const isCollapsed = !expandedDomains.has(domain);
      const arrow = isCollapsed ? '▶' : '▼';
      const filtered = activeRoleFilter !== 'all';
      const cardBadge = `${filtered ? cards.length : (counts.activeCards || cards.length)} cards`;
      const wfBadge = counts.activeWorkflows > 0 && !filtered ? ` · ${counts.activeWorkflows} wf` : '';
      const totalBadge = `${filtered ? cards.length : (counts.activeTotal || cards.length)} total`;
      const wipIndicator = counts.wip > 0 ? `<span class="wip-indicator" style="font-size:0.6rem;color:var(--orange);margin-left:4px;">🔨 ${counts.wip} WIP</span>` : '';
      const badges = `<span style="font-size:0.6rem;color:var(--text-muted);margin-left:4px;">${cardBadge}${wfBadge} · ${totalBadge}</span>${wipIndicator}`;
      html += `<div class="flow-section"><div class="flow-section-title" onclick="toggleDomain('${domain}')">${arrow} ${domain} ${badges}</div>`;
      html += `<div class="flow-section-cards${isCollapsed ? ' collapsed' : ''}">`;
      // #2325: group cards by sequence within domain. A card with multiple
      // sequence labels (e.g. sequence:werk + sequence:clearing) renders
      // under EACH sequence tile, not just the first one. Fall back to the
      // legacy single `sequence` field for cards older than the fix.
      const bySequence = {};
      for (const c of cards) {
        const seqs = (Array.isArray(c.sequences) && c.sequences.length > 0)
          ? c.sequences
          : [c.sequence || ''];
        for (const seq of seqs) {
          if (!bySequence[seq]) bySequence[seq] = [];
          bySequence[seq].push(c);
        }
      }
      const seqKeys = Object.keys(bySequence).sort((a, b) => {
        if (a === '' && b !== '') return 1; // unsequenced last
        if (b === '' && a !== '') return -1;
        return a.localeCompare(b);
      });
      for (const seq of seqKeys) {
        const seqCards = bySequence[seq];
        const seqLabel = seq || 'unsequenced';
        const seqKey = domain + '/' + seqLabel;
        const seqCollapsed = !expandedDomains.has(seqKey);
        const seqArrow = seqCollapsed ? '▸' : '▾';
        const seqWip = seqCards.filter(c => c.status === 'WIP').length;
        const seqWipBadge = seqWip > 0 ? ` <span class="wip-indicator" style="font-size:0.55rem;color:var(--orange);">🔨 ${seqWip}</span>` : '';
        html += `<div style="margin-left:0.5rem;margin-bottom:0.3rem;"><div class="flow-section-title" style="font-size:0.65rem;padding:0.2rem 0;" onclick="toggleDomain('${seqKey}')">${seqArrow} ${seqLabel} <span style="font-size:0.55rem;color:var(--text-muted);">${seqCards.length}</span>${seqWipBadge}</div>`;
        html += `<div class="flow-section-cards${seqCollapsed ? ' collapsed' : ''}">`;

        for (const c of seqCards) {
          const cardId = parseInt(c.id);
          const isAging = cardId < agingThreshold;
          const statusDot = c.status === 'WIP' ? '🔨' : c.status === 'Blocked' ? '🔴' : c.status === 'Harvesting' ? '🌾' : '';
          const agingStyle = isAging ? 'border-left:3px solid var(--orange);opacity:0.85;' : '';
          const agingBadge = isAging ? ' <span style="font-size:0.55rem;color:var(--orange);">aging</span>' : '';
          html += `<div class="flow-card flow-card-${c.owner}" style="${agingStyle}"><div class="flow-card-id"><span class="card-id-link" data-card-id="${c.id}" style="cursor:pointer;text-decoration:underline;color:var(--accent);">#${c.id}</span> ${statusDot}${agingBadge} <span class="flow-card-owner" style="color:var(--${c.owner})">${c.owner}</span></div><div class="flow-card-title">${escapeHtml(c.title)}</div><div class="card-detail" id="card-detail-${c.id}" style="display:none;"></div></div>`;
        }
        html += '</div></div>';
      }
      html += '</div></div>';
    }

    flowContent.innerHTML = html || '<div style="color:var(--text-muted);padding:1rem;">No cards</div>';
  } catch {}
}

function renderCardDetail(el, card) {
  let html = '<div style="font-size:0.72rem;padding:6px 0 4px;border-top:1px solid var(--border);margin-top:4px;">';
  html += '<div style="color:var(--text);font-weight:600;margin-bottom:4px;">' + escapeHtml(card.title) + '</div>';
  html += '<div style="color:var(--text-muted);margin-bottom:4px;">' + escapeHtml(card.status) + ' · ' + escapeHtml(card.owner);
  // Extract and display type badge (#1909 AC5)
  var typeMatch = (card.domains || '').match(/type:(\w+)/);
  if (typeMatch) {
    var typeColors = { 'new': '#3fb950', enhance: '#58a6ff', fix: '#f85149', chore: '#8b949e', swat: '#d29922' };
    var typeColor = typeColors[typeMatch[1]] || 'var(--text-muted)';
    html += ' · <span style="font-size:0.65rem;padding:0.1rem 0.4rem;border-radius:8px;border:1px solid ' + typeColor + ';color:' + typeColor + ';">' + escapeHtml(typeMatch[1]) + '</span>';
  }
  if (card.domains) html += ' · <span style="color:var(--accent);font-size:0.65rem;">' + escapeHtml(card.domains.replace(/type:\w+,?\s*/g, '').trim()) + '</span>';
  html += '</div>';
  if (card.ac && card.ac.length > 0) {
    html += '<div style="margin-top:4px;">';
    for (const item of card.ac) {
      const check = item.done ? '✓' : '○';
      const color = item.done ? 'var(--green)' : 'var(--text-muted)';
      html += '<div style="color:' + color + ';">' + check + ' ' + escapeHtml(item.text) + '</div>';
    }
    html += '</div>';
  }
  if (card.blastRadius) {
    html += '<div style="margin-top:6px;padding:4px 6px;background:rgba(255,255,255,0.03);border-radius:4px;border-left:2px solid var(--orange);">';
    html += '<div style="font-weight:600;color:var(--orange);margin-bottom:2px;">Blast Radius</div>';
    html += '<div style="white-space:pre-wrap;">' + escapeHtml(card.blastRadius.replace(/\*\*Blast Radius\*\*[^\n]*\n?/, '')) + '</div>';
    html += '</div>';
  }
  if (card.domainRadius) {
    html += '<div style="margin-top:4px;padding:4px 6px;background:rgba(255,255,255,0.03);border-radius:4px;border-left:2px solid var(--accent);">';
    html += '<div style="font-weight:600;color:var(--accent);margin-bottom:2px;">Domain Radius</div>';
    html += '<div style="white-space:pre-wrap;">' + escapeHtml(card.domainRadius.replace(/\*\*Domain Radius\*\*[^\n]*\n?/, '')) + '</div>';
    html += '</div>';
  }
  html += '</div>';
  el.style.display = '';
  el.innerHTML = html;

  // Fetch domain context if card has a domain tag (#1908 consumer)
  var domainMatch = (card.domains || '').match(/domain:(\w+)/);
  if (domainMatch) {
    var domainName = domainMatch[1];
    fetch('/api/domain-detail/' + encodeURIComponent(domainName))
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(d) {
        if (!d || !d.sections) return;
        var dHtml = '<div style="margin-top:6px;padding:4px 6px;background:rgba(255,255,255,0.03);border-radius:4px;border-left:2px solid var(--green);">';
        dHtml += '<div style="font-weight:600;color:var(--green);margin-bottom:2px;">' + escapeHtml(d.domain) + ' — ' + escapeHtml(d.product) + '/' + escapeHtml(d.step) + '</div>';
        dHtml += '<div style="color:var(--text-muted);font-size:0.65rem;">' + escapeHtml(d.description) + '</div>';
        var secs = d.sections;
        if (secs.api && secs.api.table) {
          dHtml += '<div style="margin-top:3px;font-size:0.65rem;"><strong>API:</strong> ' + (secs.api.table.length - 1) + ' endpoints</div>';
        }
        if (secs.integration && secs.integration.table) {
          dHtml += '<div style="font-size:0.65rem;"><strong>Pipelines:</strong> ' + (secs.integration.table.length - 1) + '</div>';
        }
        if (d.cards) {
          dHtml += '<div style="font-size:0.65rem;"><strong>Cards:</strong> ' + d.cards.total + ' active, ' + d.cards.wip + ' WIP</div>';
        }
        dHtml += '</div>';
        el.innerHTML += dHtml;
      })
      .catch(function() {});
  }
}

// Alerts panel — collect critical/warn messages (#1897)
const alertsSeen = new Set();
function checkAlerts(messages) {
  const panel = document.getElementById('alerts-panel');
  const content = document.getElementById('alerts-content');
  if (!panel || !content) return;
  let hasNew = false;
  for (const msg of messages) {
    const text = msg.text || '';
    const key = msg.ts + ':' + text.slice(0, 50);
    if (alertsSeen.has(key)) continue;
    // Only real system alerts — not conversations mentioning the word "alert"
    const from = (msg.from || '').toLowerCase();
    const isSystem = from === 'system' || msg.type === 'system-error' || msg.type === 'blocked';
    const level = msg.level
      || (msg.type === 'blocked' ? 'critical' : '')
      || (msg.type === 'system-error' ? 'critical' : '')
      || (/^\[critical\]/i.test(text) ? 'critical' : '')
      || (isSystem && /\bDOWN\b/.test(text) ? 'critical' : '')
      || (/^\[ALERT\]/.test(text) ? 'warn' : '')
      || (/^deep-health:/.test(text) ? 'warn' : '')
      || (/^session-health:/.test(text) ? 'warn' : '')
      || (/^\[warn\]/i.test(text) ? 'warn' : '');
    if (!level) continue;
    alertsSeen.add(key);
    hasNew = true;
    const color = level === 'critical' ? 'var(--red)' : 'var(--orange)';
    const time = new Date(msg.ts).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const div = document.createElement('div');
    div.style.cssText = 'padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;gap:6px;align-items:baseline;';
    div.innerHTML = '<span style="color:' + color + ';font-weight:700;font-size:0.65rem;">' + level.toUpperCase() + '</span>'
      + '<span style="color:var(--text-muted);font-size:0.6rem;">' + escapeHtml(time) + '</span> '
      + '<span style="color:var(--text);">' + escapeHtml(msg.from || '') + ': ' + escapeHtml(text.slice(0, 120)) + '</span>';
    content.prepend(div);
  }
  if (hasNew || content.children.length > 0) panel.style.display = '';
}
function filterAlerts() {
  const q = (document.getElementById('alerts-filter')?.value || '').toLowerCase();
  const items = document.getElementById('alerts-content')?.children || [];
  for (const el of items) {
    el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
  }
}

// Resize handles — drag to resize panes
function setupResize(handleId, getTarget, side) {
  const handle = document.getElementById(handleId);
  if (!handle) return;
  let startX, startW, target;

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    target = getTarget();
    if (!target) return;
    startX = e.clientX;
    startW = target.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    function onMove(e) {
      const dx = e.clientX - startX;
      const newW = side === 'left' ? startW + dx : startW - dx;
      target.style.width = Math.max(150, Math.min(700, newW)) + 'px';
    }
    function onUp() {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

    el.innerHTML = entries.map(function(e) {
      var color = e.role === 'wren' ? '#3fb950' : e.role === 'silas' ? '#58a6ff' : '#d29922';
      return '<div style="margin-bottom:2px;"><span style="color:#484f58;">' + e.ts + '</span> <span style="color:' + color + ';font-weight:700;">' + e.role + '</span> ' + escapeHtml(e.text) + '</div>';
    }).join('');
    el.scrollTop = el.scrollHeight;
  } catch(err) {}
}

// Focus input on load — skip on mobile to avoid pulling up keyboard
if (!isMobile()) input.focus();
</script>
</body>
</html>
